body:
  text: 雜文碑記贊銘賦樂語疏祝文䇿題湖州德清縣重修孔子廟碑予少時嘗聞諸長老言吾邑初脫五季之亂人樂更生敦朴力穡未知學也大中祥符間予從祖書記始以儒學中進士甲科名稱籍甚鄉黨榮之邑之子弟遂風勸於學其後正議大夫盧公父子踵取名第翺翔要途而學者日寖以盛故有孔子廟基下制狹既不足以掲䖍妥靈而衿佩野逸弗克羣處迨明道壬申之歳河南竇充來是邑訊之卜人以為餘不溪來自天目之山注于邑之東南兩山挾之秀氣横出宜益有搢紳之祥乃作今廟直巽之隅高明亢爽非復舊比而文雅之士班班出焉閥閱相望若應厥卜予結髪亦肄業其中絃誦之聲猶可想也中間朝廷興學而有司便事僅於舊宇丹堊而已矣然自初考卜迄今百有三年而墻屋頽圯草茀于唐廟貎雖存丹青缺落使人喟然有寧不嗣音之歎春秋祀事著于令甲而器幣牲牢之薦弗備弗蠲神用不享太末鄭如幾隱居溪隂一日過予曰吾儕儒服顧不若佛老之徒嚴奉其祠以侈大其師之說耻也已而率邑子沈良能相與告於邑令楊錟及凡境内之士大夫士大夫悉勸趨之爭出緡錢以佐其費乃盡徹去門廡更立而一新之面勢隅落雖因其故而棟楹顯敞視昔則又加焉爰即兩廡析為齋廬以待學者中嚴廣殿像設巍然翼翼羣公繪事惟序觀者為之屏息嗚呼休哉實經始於紹興癸丑之仲冬越明年春上丁行釋奠之禮落成焉是日也予兄次律攝衣升堂談春秋大㫖凡邑之士大夫濟濟在列咸有肅容邑令跽而請予文以記予謂國家遭强胡之難義士枕戈武略是急然未嘗斯須忘右文之事誠謂捨是則無以為天下也吾邑令乃能間搶攘之餘導人所欲立學崇祀以夸四方是可嘉已乃為書其本末而系之以詩曰餘不之源來自天目注之兩崖其勢若束惟邑東南山縈水洑始建廟宫兹焉考卜士也來游文風載郁更時搶攘園蔬是鞠豈其山川秀氣回復厥有吾徒輸金委粟載新棟楹工靡程督有神司之不疾而速掲掲元聖端冕衮服羣公從之祀事孔肅嗟我令尹崇化表俗曰興自躬往繼前躅勉我士子荒迨則辱惟以嗣音豈惟干禄祥源泱泱庶來其續披雲樓記宣和四年春祕閣曽侯自山陽移守嘉禾嘉禾在三吳為支郡封域儉狹而物産饒衍居民敦本好約雅稱易治侯之至因其俗施教條數十示所禁勸民畏慕之相戒毋犯侯令越數月政成從容語僚吏曰郡雖小然介江湖之間水舟陸車孔道四出賔客之至無虚日顧其地洿下無高明之居以稱燕游不足以壯千里觀望盍圖之先是内相葉公道卿於子城西北築亭榜曰披雲後人更名樓其實亭也庳屋三楹歳乆且圯又西北其户下瞰通闤煙塵宛轉於几席間非登臨之美侯乃以完堞餘工悉徹去故屋其基増高倍薄取它名材無用者更南鄉為亭外施重檐而中敞之深明洞達丹碧粲然亭西挾以水閣曲欄横檻映帶左右它日與客登焉送天末之孤帆迎海上之遥岑目力所窮與空為際更唱遞嘯􅜠酌流行神意徜徉如在塵垢外信哉披雲霧覩青天僅足以方其快且適也侯舉觴屬某曰兹游樂乎子為我記之某以謂成壞哀樂奄忽之變在物也物不可以為常顧吾所建立有不可磨滅者物則託焉以垂不朽此羊公所以興峴首之歎而湛輩反自哀已不暇也登斯亭也徘徊四顧蓋吳越交兵百戰之塲而勾踐夫差之争雄也高城深溝有荒田野草之悲穴狐狸而伏鰌鱓也其人骨巳朽而其事為可哀也前年盜㺯潢池兵傅吾城連三日夜民大震擾天子至出禁旅討平之盜去而城完因得剏亭其上一觴相屬是可樂也侯生于相家文章事業稱天下設施當有大於今日者則名之傳山川猶將託之不朽况斯亭乎故亭之成壞情之哀樂有不足言而侯之功名為可勉也於是乎書水陸報應記趙丞相云頃年關中聞有一士人被酒夜卧於道傍堆阜之上夢有人呼曰城南某人家設水陸我輩當乘此託生可同徃堆阜之下有人歎曰一醉人卧於吾上出不得奈何未幾前所呼者復至曰水陸甚盛但不甚精潔聖賢不降不為利益若有嘘嗟之聲已而曰久饑粗得一飽其人復應曰饑甚雖一飽亦不可得是無福也旦而視之堆阜乃一古冢也鬼神之事茫昧難知然水陸報應甚多大抵不可不精潔今因兒子往妙香營設此供故録示長老佛智大師紹興五年七月丁酉必先書劉希顔眞贊目送孤鴻心徹寒泉風神散朗儀狀毅然掀髯一笑呼吸雲煙是為宗廟之貴器自號山澤之臞仙葛魯卿研銘野人闕古溝獲黟石研而異之以歸於丹陽葛公公屬其客吳興沈某為之銘曰緻而澤靈液之藏橢而而豐瑞璞之章先生婆娑翰墨之埸天授兹器殆文字之祥也邪客游玄都賦南陽公數徴不腆之文然街談巷語陶冩性情已即擲去如棄唾漫不復顧省寧暇著稾刺人目耶既數月公更書下餞客在門恐遂泯黙則為他日恨輒賦客游玄都因公懸弧之旦用以為壽其詞曰客有夢游玄都之宫覩一公子緇衣繡裳下觀蠻觸之閧儼衷甲乎戰埸俄而免胄四顧周章少焉休矣息閉影藏粤有一老長身臞然深衣而黒縁緩歌擊節起舞偏􅋖揖公子於下坐曰予方外之毳客不知人間禮法之嚴公子之貴也抑嘗觀蜡齒於列座訪宴毛於廣筵莫如予年長矣公子其自言之公子曰嘻先生其眇予也耶予生於三江長於五湖跨瑤光之象負温洛之書蓮房晨嬉蓍室夜娛嗟日月之幾何戴神屋其如初此猶未足以語壽也蓬萊岱輿員嶠方壺以與夫瀛洲五山之根出没乎歸墟彼舉首以戴之從禹疆而遞命者實予之徒也先生以爲何如先生爵里奚居譜諜奚自豈周穆王之遺民抑丁令威之嫡嗣也不然何得渠略視予而以大老自恃耶先生曰有是哉子壽可期可以䇿計若予壽者蓋不知其紀也一瞬目而千歳一舉足而千里錬金氣於丹臺之爐導玉腴於華池之水引脰長嘯聲聞帝庭子夜沉沉天門未扃刷騏驥之捷步輦鸞鳳之翽翎縹緲碧落徘徊紫清羣仙命予以九還之使持絳節而擁霓旌公子曽未免夫泥塗之累網罟之患豈足以族十五鼇而友四靈者哉公子曰然則奈何先生曰公子中温文而外徤武能納新而吐故其亦壽之類也曷不捨奥渫趨爽塏以為生之衛也予聞南陽之墟下有菊潭公子其往游焉朝緩步而夕至也酌餘波之清泠擷遺芳之靃靡屬霞觴而自侑渺天香之泛齒插子翼乎崑丘庶幾閱少廣之終始公子曰唯唯覺而賦之以薦乎南陽公之壽几燈華賦耿宵寒之不寐兮起攬衣而踟蹰無以散余之幽憂兮憑插架之叢書引短檠使置前兮聊縱觀以嬉娛注膏油續餘燼兮發雙照之清矑曷孤光之炯炯兮舍生意其斯須曾不根而自華兮騁便娟與扶疎初蓓藟之星懸兮葩萼爛其紛敷中鬱勃而旁分兮熒明滅而欲無乍晻曀而蔽虧兮卒勤余之翦除悼飛蛾之撲縁兮猶若擷芳而採腴童子旁睨而竊笑兮曰此吉占奚忽諸茍禦福其不祥兮余豈廢書而改圖憂喜聚門唯所召兮獨何為此華之覬覦彼九華之威𬎼兮灼百和之淳蘇散春風之列炬兮導珠翠與笙竽挾光景以舒秀兮紛榮落之自如豈其規福而樂黮闇兮蓋以衆而函胡相風釭之一枝兮屬山澤之臞儒辨牛毛之瑣細兮忌鶴彩之縈紆縁桐君之藥灺兮詫微光於鄰壁之餘童子曰噫嘻吁呼已見背於羣趨兮悲夫主人之愚余掩巻而三歎兮悼此言之甚迂物不可必兮神不可誣忽若太乙之下臨兮醮青藜以燭余余何為感此嘉貺兮豈以夫余所讀者道載而與之俱儻此花之可授兮眇傳燈之老瞿天寧節致語一氣周天水行恊而景風至千齡接旦火徳盛而榮河清是開震夙之祥實顯神靈之異無疆受命有截傾心恭惟皇帝陛下秉籙頒常握圖建極席慶紫霄之上匹休黄序之前經緯萬方如家至而日見出入六合本神動而天隨妙用中藏全謨外發振張祖考之丕績興起帝王之極功故得九廟延禧二儀薦祉壬辰紀運已驗寳符之文甲子復元遂増神筴之算爰屬誕彌之節共霑燕衎之恩喜浹衢尊誠均封祝衍皇基於億載發民謳於四夷臣猥以微生逢兹昌祚莫奏充庭之技徒賡擊壤之音遙望天墀上陳口號欲識樞星紀誕彌天人端命撫昌期聲函萬歳騰驩頌節應千秋舉慶儀金篋賜齡輝碧簡珠囊薦壽肅丹墀何須更效南山祝艮嶽連雲自不移館待接伴少卿樂語屬國勤王來效貢輸之職端朝命使往宣逆勞之恩方仗節之逺臨宜征塗之少憩恭惟接伴某官望隆朝右名滿人間以師友之淵源為文章之光熖襟懷磊落森森若千丈松宇韻風流濯濯如三月栁蚤動冕旒之䆳徧躋臺閣之華公言所歸睿意彌注輟自月卿之列授兹星使之權正行人之官雖云將幣過諸侯之國固許致饔知府某官喜覿儀形願聞規畫肆筵設席考禮度於故常鼓瑟吹笙按樂音之純繹儻劇厭厭之飲庶觀秩秩之容但某等猥以賤工叨居樂部宜有口號上瀆台顔九重簡注輟名卿仗節東來為逺人貢篚百年旌屬國使軺千里導陪臣遵塗行對三山曉開燕爭看一笑春無疾其驅今有詔趣歸掃槖侍嚴宸館待高麗進奉使樂詔八月浮槎舊識遼東之使節九天出綍新叅漠北之賔儀方朝廷旌守圉之勤宜邦國謹充庭之實聿遵彛制共樂昌期恭以進奉某官將命嚮風馳誠就日跨萬里鯨波之險趨九重鳳闕之深爰屬經塗適當授館知府某官甘棠訟息茂草囹虚喜逢嘉客之臨特展芳筵之好調絲擪竹騰聞皦繹之音舉白飛觴備講獻酬之禮願盡此時之樂事留為後日之美談某等猥以賤工叨陳末技幸閱從容之集宜修蕪累之詞仰瀆台顔敢陳口號仙槎渺渺出鷄林路指神京歳奉琛四海已同朝禹志萬年宜罄祝堯心儀叅大客恩方茂位亞羣公澤更深况有王人宣徳義經塗莫惜費登臨薛林二太尉特排樂語旌旗炫日屬元老之相逢樽俎浮春念故鄉之孔樂一時榮觀千里驚傳恭惟特進太尉中書太尉道合眞儒功存舊弼四海仰廟堂之同徳九重知帷幄之恊心鳳閣鸞臺曾記並游之盛龍韜虎帳更瞻分鎭之雄離合萬端猷為一揆甫申之輔周室豈止藩宣姚宋之相唐朝行資謀斷㑹有過家之便宜從授館之勤知府某官喜覿儀形欲親談笑兹奉千鍾之壽以交四座之歡樂備歈趨窮里社謳謌之勝禮行酬酢忘朝廷體貎之尊將紀英游永為嘉話但某等叨居伶籍獲侍鈞顔不揆荒蕪敢呈口號三吳分野直中台一日驚傳二相來桃李蹊間紛組綬湖山影裏炫尊罍清談道舊真難繼淺笑追歡許易陪須為故人成徑醉巳聞雙詔下銀臺館待杭帥樂語大艑凌波方重西州之別髙牙照路遽分南顧之憂共瞻元帥之啓行式壯列城之勝勢恭惟安撫某官宏材驚世偉望映時氣貎沖和濯濯如三月栁操修挺特森森若千丈松蚤繇天府之華遂陟霜臺之峻九重簡在四海想聞為鈞為衡將圖一命之衮之屏之翰暫臨十國之連褰帷甫屬於按行弭節益敦於交際知府某官方歸總制荐奉儀形况當卜夜之期適値班春之候金絲間作庶欲佐於清歡醆斚交飛亦何辭於徑醉示一時之榮觀為百年之美談某等猥以賤工獲陳薄技敢呈口號上瀆台顔熊羆千騎駐南州謀帥來寛旰食憂草木也應思潤澤湖山正恐費遨遊旌旗眩日催前導樽爼浮春許蹔畱劇飲不須辭徑醉詔環聞已戒鳴騶秀守館待交代樂語旌斾留春千里聽告新之政尊罍競日四筵陪道舊之歡蓋雅躅之相承之所重式敦交好以鎭群情恭惟知府某官一時吏師三代人傑學擅南豐之舊氣陵北固之高見襟懷之磊落撥煩剸劇出談笑之從容政成朞月之間名在重霄之上解組去郡行艫造朝寄傲風流徒發南樓之興論思密勿將陪西掖之遊知府某官契重金蘭情均膠漆不改袁公之約束欲追召父之歌謡樂備歈趨願奉千鍾之壽禮行酬酢期存百世之盟儻投轄以忘歸庶盍簪而徑醉但某等叨居伶籍獲侍台堦不揆荒蕪敢呈口號一麾相望繼芳塵召杜風流主與賔芸閣去方思就日竹符來及趂班春清談款密看論舊善政從容許告新早晚銀臺雙詔下共期持槖侍嚴宸代天寧功徳疏有王者興既恊生商之命使聖人壽咸罄祝堯之心惟是假於靈文兹用申於善頌皇帝陛下伏願永膺帝祚誕保皇圖衍周詩多子之祥享箕疇五福之證歸謳歌於四裔率土底寧卜歷數於萬年後天難老乾龍節開啓疏十四月紀帝堯之生慶鍾是日三萬歳頌遂人之壽喜浹斯民仰扣覺雄式祈睿筭淵聖皇帝伏念降年有永受福無疆孔子之居九夷適丁厄運穆王之馭八駿亟返畏途載臨誕聖之辰彌罄歸君之祝乾龍節滿散疏舜風解愠適四月維夏之期商鳦發祥契千齡復旦之運式祈睿筭宜藉勝縁淵聖皇帝陛下伏願多難而興大德以壽天旋寳仗百六之㑹亟平嵗奉琱觴億萬之年永固天申節開啓疏帝眷命而生商允符長發之慶民謳吟而思漢光啓中興之圖敢仗眞乘仰祈睿算皇帝陛下伏願降年有永受福無疆亟還天邑之居端享法官之御神民萬物同臻開泰之期壽富多男並恊延鴻之祝進天申節功徳疏多難啓聖共占震夙之祥一徳格天自獲龎鴻之祉表微臣之善祝集浄侣於嘉辰庶藉眞乘式増睿算皇帝陛下配天覆幬象日照臨一清戎輅之行盡平僭亂大正法宫之御永享壽康泗州傳衣塔祈雨疏比歳告饑民方罹於艱食常暘為沴天復降於疾威念吏道之興妖致農工之失職祓躬省咎雪涕祈哀仗大士之悲憐憫羣生之危阽慈雲廣布法雨周施霈然嘉澤之流戢此驕陽之熾庶令老弱旋見豐登昊天殿祈雨疏二首瞻彼甫田蔚然多稼行遂九秋之望尚愆一雨之期惟是高原亦既亢旱冀昊穹之昭格俾時澤之周流降此康年恃之卒歳荐饑之後艱食是憂望嗣歳之豐登脫斯民之流殍而常暘為沴時雨久愆麥齊壟而復萎禾入土而隨槁三農危懼百吏倉皇唯仗籲辜之誠可瀆蓋高之聽伏望垂慈下土徧敕羣神令出風雷大霈雨師之澤候分雲漢亟收旱魃之威尚幸時之小康用拯民之大命三清殿神霄殿祈雨疏運在金穰已屬豐年之望時方火老爰申亢旱之憂乃聞髙原既泣枯穗仗霄晨之丕佑斡隂陽之至權雲上於天用敷剛徤之徳月離于畢終至滂沱之祥佛寺祈雨疏豐年巳兆嘉澤尚愆雖䝉一雨之濡未厭三農之望敢憑精意叅扣覺慈冀法㴻之周施抑驕陽於已熾滋我多稼溢于大田代修武烈帝廟疏遺像森嚴示無忘於馨烈叢祠圮陋懼弗稱於明威比祈保障之恩嘗致繕完之懇昭兹肸蠁曉以禨祥初既恊於象占已乃形於夢告終䝉靈貺遂成屏盜之功載省初誠敢費鳩工之事眷惟此郡實其故鄉嘉與永懐之流樂輸崇飾之費奉迎嘉山龍井水祝文矯矯神龍惟水為所吹嘘成雲噴薄成雨惟兹井泉為龍所主一勺之多澤徧九土挈此瓶罌置我庭宇燁燁電壺坎坎雷皷發揚英靈浹洽周溥溉我田疇滋我稷黍毋使我民仍歳饑阻則惟報之如御田祖金山廟祈雨祝文秀居湖海原隰之間厥壤斥鹵三農於水無所蓄藏故雨渉旬則病水不雨渉月則病旱水旱之禱不容不凟春夏之交千里龜坼嘗瀝懇於爾神神實憫之賜以甘霔守無以荅揚神之休德既上其事請加封崇今者不雨亦既兼旬多稼向萎通渠就涸居民行商皆以病告守不忍避凟神其嘯召風雲雨我邦域揉此沴氣卒爲豐年守亦俾民承事益謹謹告太學秋試䇿題古之所貴於骨骾之臣何也人臣剛正有守尚氣節敢諌諍國勢恃之以強猶骨強四支也宫之竒懦而不能強諫鄰國知其必可假道汲黯戇而好諫叛國畏之至於寢謀國勢强弱從可知矣然而君子處心積慮欲人之無過而已指人之過而正救之自敵以下有不能堪不幸人主有過舉犯顔色觸忌諱干不測之誅以數批逆鱗豈得已哉古之君子願為良臣不願為忠臣抑有以也不得巳而有言言行善歸吾君福在天下可也其言不行去其位可也去其位亦非君子之本心猶日望之庶幾其改也事不求可功不求成悻悻然訐而賣直徒使人君有拒諫之名而無補於國宜君子之所不取古之人善納諫者莫如唐太宗善進諫者莫如魏鄭公史稱太宗見為嫵媚則鄭公豈好訐哉是以諌行言聽君臣俱榮衆君子學史舊矣求古諌諍之臣拳拳愛君直而不訐可以為後世法者試件其人以告若夫充位不言曰吾惡為訐如陽城等輩又非君子之所欲聞也召試館職䇿題二首東南實古吳越百粤之地號為富强自春秋以來略可考也隋唐都於陜洛歳資邦國之用多在東南委輸常過天下之半主上遭時多故治兵東南恭勤節儉出於聖性之自然故凡冗費悉從蠲罷唯以養兵為急然而公私力屈日以更甚其故何哉異時財賦粟帛之出於東南者猶可件數也今有司坐失經常之入每以乏告顧獨取之民民愁無聊得為便乎豈理財者無其術耶抑取之㳙㳙洩之浩浩有不勝理者歟理財曰義孔子之言也雖然理財亦多術矣商鞅力本務農之説與管仲等也劉晏抑商賈而籠天下之貨與桑洪羊等也李巽之徒其術又下於晏而後世論者予管仲而黜商鞅予劉晏李巽而黜桑洪羊豈用之或異耶今議者欲舉理財之政以革東南一切之弊鮮不流為數子之刻心計之失必以病民姑舍是而求合先王理財之義以捄今日軍興之急宜必有說焉願條其要以備上之採擇自古撥亂之主未有如周宣王者而詩之所稱在車攻則曰内修政事外攘夷狄在烝民則曰任賢使能周室中興夫唯政事既修矣而又分別賢能而任使之故能攘夷狄復境土紹文武之絶業而致中興也國家遭中微之運夷狄内侵蓋八年于兹矣主上聖神英武自足以運動六合儻因天意人心之歸恢復中原不為難事然猶勵精圖治虚已用人兢兢焉日不遑暇仰惟聖慮必以上䇿自治莫先於政事人才之間故耶夫政事之在天下可則因否則革不可膠也揆之於時措之宜尚有可施行者歟叅之於救弊扶偏之說尚有可更張者歟賢能並用濟濟在列然臨事有乏才之歎其或濟時之才隱而未用尚有可以博蒐訪而廣儲養者歟凡此皆當今之切務而中興之功恃以成者今發䇿以試三館之士將為時用非直取其空言而已願條其利害之實悉著于篇以觀所藴擬御試䇿題朕徳菲陋紹承大統遭家多難求濟未獲是以博延豪俊咸造在庭覬聞治道之要子大夫其必盡精極慮樂為朕言之蓋聞在昔聖王之治天下正心誠意躬行乎上者固自有道而措諸事業之間則或寛或猛或質或文變通隨時不膠於迹故其成效布在方冊昭昭乎其可觀也朕甚慕之越自即位九年于此矣愚欲雪父兄之耻而復祖宗之烈夙夜祗懼罔敢荒寧而施為繆盭治效缺然深惟其故不憚改作間者乃下銓量之令以擇吏而眞才猶未顯也嚴科歛之禁以恤民而實惠猶未孚也謹簡練之法以治兵而冗食猶未革也夫吏道未肅民力未蘇兵勢未强朕之治所以未效也顧何以輯事功弭禍亂哉而建議之臣并欲考課以核殿最省官以抑奉稍力役不足以供餉饋也為之屯戍營田以寛之賦入不足以給調度也為之平準均輸以佐之爵賞未艾也為之定武功之等紀律未明也為之叅府衛之制凡若此者其合於古便於今乎其或有不然者耶雖然此治之迹也上之欲三辰明四時序災沴不生而動植遂性下之欲風化行習俗厚姦宄不作而中外恊心兹可以占天人之助矣夫何敵不克何難不濟興復大業其庶幾乎子大夫以為何修何營而可以臻此其條列而茂明之務適於用朕將有稽焉
