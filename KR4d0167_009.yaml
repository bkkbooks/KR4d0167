body:
  text: 啓賀除畱守啓伏審賜環亟下信節遄歸飭燕館以留居御朝端而趣對身關國體想忘跋履之勞徳享天心宜擁福釐之集恭惟某官朝廷碩輔社稷宗臣以臯䕫之才逢堯舜之主引君當道蚤輸密勿之忠措世太平已底經綸之績勲銘具在紀律畢張聿從眞館之游乃託介藩之任申伯之居南國雖賴蕃宣周公之詠東山終還左右及此介圭之覲實符仄席之求諒展辰猶數膺晝接然以素望之所屬必惟舊人之是圖竚秉國均轉洪鈞之一氣益熈帝載平泰階之六符載念微生嘗叨異顧與燕雀而同賀庶桃李之埀隂問候中書啓伏念某猥以微生叨從末宦效九九之技夐若江湖之濵瞻兩兩之符恍然雲漢之表顧門牆之彌峻致竿牘之罕通引領云勞傾心則壹恭惟謀謨帝所勱相王家順迎六氣之和茂擁三靈之祐伏以某官夙鍾間氣親際昌辰遂以非常之才助成無競之烈發揮一徳使邦朋之寖消感槩百為由國是之先定及此精神之㑹應於寤寐之求天睠孔昭民瞻允屬據百寮之上已知體貎之崇居三事之先即俟儀形之正上以副一人之意下以慰四海之心更乞深念宗祊加䕶寝餗某卑情無任祝頌䖍切之至賀漕使加職啓伏審顯膺徽數寵進崇資凡託庇庥舉深欣屬恭以某官存心甚逺養氣至剛亮節端誠實表儀於當世危言鯁論皆根本於生民不圖近功可贊大事憤愚民之冒昧連狡冦之猖狂爰飭使軺式嚴師律九攻九拒多自於指蹤萬舉萬全豈容其假息至於轉餉曽不乏供果消南顧之憂遂躐西清之秩䇿勲方茂第賞惟新觀賜札之系傳知召環之狎至退惟陋質叨沐餘光承命之初為喜益倍謝薦舉啓課功無狀偶逃大吏之譴何進秩有階忽冒上臣之薦籍過形襃字加賁沈蹤顧塞責之靡遑睢銜恩而獨至竊以聖人以學而成俗是為教化之原儒者以道而得民非若簿書之比故於州縣之職莫先庠序之聯雖列處侯邦第使視曹於幕府而選從帝學更令通籍於橋門至煩一代之宗師並舉四方之寒畯號曰吾屬牧為巳知然而泮水泛居或類河中之木需章典奏必蒐席上之珍宜得魁壘軒昻之才加以疏通該洽之識名實四達言行兩純使之無遺庶云有補如某者天資昏懵人品覊單少也讀書徒粗知於為已長而干禄蓋茍求於及親以應俗多老生之常談而經世乏古人之大節長恐没齒分為散材乃霑黄甲之恩漸免白丁之役及補郡吏復居校官設施皆熟於平時游處既多於暇日稍尋黄巷轉授青衿必有我師雖欲從其善者此非子座豈待請而避之跡未至於顚隮心已慚於忝冒方期斥去遽辱名聞此蓋伏遇某官提衡九流推轂多士小德役大徳每蹈孟軻之言先知覺後知將成伊尹之志遂以丹霄之定價勉兹白社之寒生不間庸愚亦加采録顧矜憐之若此嘆報效之云何某敢不増所未長鞭其不及駑馬十駕庶申伏櫪之悲敝帚千金終發掃門之喜謝運使差權知縣事啓恭承郵報俾攝縣章調宓令之琴焉知政理擁毛生之檄聊遂親謀䝉幸有餘包羞無所伏念某嶔崎可笑約結亡竒懵學難成顧短檠而自媿薄游寡偶撫長鋏以誰憐栖遲太學之十年竊取奉常之一第尚須官次伏處鄉邦誰是餽漿之人空餘乞米之帖兹因弭節方獲曳裾擢於田里之中寘在門墻之末公移逺逮就假一雷之封疾置驚傳親著五雲之字顧惟凡瑣乃爾遭逢此蓋某官逺業濟時髙風勵俗裕民足國已操邦計之贏謪德量能更欲人材之當故令散吏輒補曠官某敢不勉盡所長以待乃事體一日葺居之戒寧憚小勞臻五月報政之期庶收微效問候運使啓嚮自揚舲督府引襋行臺濫從俎豆之間數奉珪璋之表朅來敝邑阻拜前塵緬惟䂓略之餘休有神明之相恭以某官望隆當世行配古人才地有餘雖多多而倚辦辭源無極猶戞戞以知難言皆合於上心動必關於國體暫屈經綸之手遂恢富足之原言聽計行實逢千載之㑹家給人足更邁九年之儲柄用可期師瞻已峻更乞上為宗祐加䕶寢興某下情無任祈嚮依歸之至新令逺迎狀伏審某官比膺芝綍屈領銅章調宓令之琴行觀美政整王喬之舄共仰仙風退念飄蓬之餘空懷揚粃之懼承顔之幸翹足以須賀毛給事啓伏審温綸亟下大斾遄歸騰聞四方聳動羣聽竊以殿中獻納之地是為門下論駮之司非風節梗槩則不足以典樞機非論議該通則不足以承顧問故楊雄於漢擢先待詔之聯而李藩在唐望隆批勑之手得人如此視古庶幾恭惟某官學為儒宗才配人傑持心耿介壓嵩岱而不移藴量恢閎包滄溟而無際炳文章之光焰極師友之淵源名蓋一時用先諸老徐堅眞舍人様蚤擅中朝望之實宰相才聊從外補席方及煖政已報成紫泥俄見於賜環青瑣復叅於持槖想金甌之久覆指玉鉉以旋登公論所期斯言可必某繆從末路景仰英風兹聞明命之頒彌激懦衷之喜榆枋斥鷃敢知鵬運之高庭户飛蠅但欲驥程之逺依歸抃躍倍百等倫賀賈舍人啓伏審茂膺詔檢寵進詞垣聨侍從之榮班極文章之盛選音騰疾置光動故鄉恭以某官學配古人才高當世早馳妙譽擅滄海之遺珠獨冠賢科應崑山之片玉用先諸老擢自一人校讎兼六籍之微刋正盡羣言之失踐揚滋久問望益隆進直螭坳記載之功唯允首陪鷄㦸調䕶之徳攸全爰從禮樂之司入掌絲綸之地舍人様有如此大手筆無甚難紅藥裁詩暢中和之逺韻紫微草詔追顥噩之醇風紹蘇賈之才名超伊管之相業乃符輿論亦出家聲某蹤跡陸沉音塵斗曠側聞成命之出彌増末契之榮目想俊游輒起彈冠之興心懷美廕尤傾賀厦之誠謝改差常州學官啓問塗湘水方懷陟屺之思易地蘭陵復預采芹之樂幸既安於子職喜遂發於親顔揣分云優循涯以愧伏念某天資檮昧人品覊單妄刻意於詩書旋躡蹤於衿佩一隨計牒九換年華菘韭春秋屢動故園之興齏鹽朝暮貪觀上國之光偶脫白丁遽聨黄甲洎親榮三釜之禄飾身叨五兩之綸謂寸進之可期宜分隂之亦競而乃赴銓十月補吏一涯取道重江念毛生之檄徒捧待期荐歳顧墨子之突未黔敢圖小物之私曲綴大賢之念達籲天之危悃遂擇地之初心訖使便安盡從願欲兹蓋某官恩深教載徳懋爕調推大鈞之無垠衆由平進謂小人之有母獨軫深慈便菽水之奉於近鄉脫風波之危於逺役矜憐若此報稱云何某敢不激昻其衷砥礪所學庭闈愛日已寛暮之懷庠序承風益廣朋游之樂賀馮承㫖啓伏審鋒車入覲斧扆對揚超玉筍之新班冠金鑾之舊直除音四出歡頌一詞竊以舉三代之遺英而當號令文章之事取四海之雋望而摠言語侍從之官此上所以篤於近臣而世亦將期以大用况夫親承密㫖獨望清光地接六符之中階秩高兩禁之上列帝選于衆公惟其人恭惟某官炳嶽瀆之靈盡東南之美德量蓋存夫逺大道術已造於純全氣讋九州繇直養而無害才周萬事殆曲成而不遺忠既格於天淵信亦行於蠻貊晝膺三接歳閱九遷詞掖代言思若湧泉之決儒宫正席化如時雨之施騰聞東序之絃歌歸聽北扉之鈴索方將攄尊主庇民之術豈特煥經天緯地之文遽銜恤於倚廬致興思於仄席聿頒召節仍趣賜環天子虚懷安問鬼神之所以都人拭目復觀風采之凛然迨出親除式昭異數定見金甌之覆即期玉鉉之登徳裕之文用雖長於大手吉甫既相禮自絶於同僚斯言不誣惟日以俟某離竒弱質么麽微生頃䝉特達之知曽乏先容之助側聞顯渥倍激驩悰久託範模行費大鈞之坱圠僅同燕雀更欣夏屋之帡幪賀新守盛學士啓伏審細札疏恩左符分命起自列僊之館來臨多士之鄉芹藻生輝布韋増氣恭以某官剛明蓄徳端厚凝姿粲然星斗之文粹矣珪璋之表賢關闊步早收俊造之科仕路横翔遂入英雄之嫌名光堯乘軺擅膚使之譽列棘聳名卿之稱醖藉有餘於風流縁飾無先於儒雅一昨辭榮北闕均逸南州田里絶歎息之聲治功藹著庠序脩孝弟之義名教勃興集此美談發於遺愛况蘭陵之孔道接苕水之上游喬木相望稔服善鄰之教令甘棠具在飫聞雅俗之歌謡用是此邦絃誦之徒思見我公色笑之樂兹聞除目實激懽悰顧惟齏鹽之冷官曽是門闌之下客燕雀相賀同看大厦之䕃成桃李方華獨認舊蹊之路穏依歸抃躍倍萬等倫賀盧左司啓伏審祗承嚴召亟被峻除顯陟中臺之端榮居上宰之屬音騰郵置驩動搢紳竊以尚書㑹萬事之本元左司貳六曹之綱轄所以抗議軒陛叅謀廟堂因唐建官始重都公之號迨宋稽古實為法從之儲惟名御東求豈輕除授恭以某官氣壓萬象心潛九流本師友之淵源發文章之光熖出符國瑞同威鳳之九苞居恊地靈配元龜之五摠爰自早歳朅來上都勃焉起三俊之名凛然歸四海之望既横翔於雄御名光堯遂獨步於英躔絳帳談經咸忘鼎來之學赤裳賦命遽詠遄歸之詩方追臺妙之游復領使華之寄雖登車之志逺念側席之恩深是宜趣還庸副虚佇欲知相業試觀省闥之彌綸行慶帝俞即步禁塗之清切自顧門䦨之下客曽塵衡石之上游寅縁蕪辭竊取英眄喜樂正之好善亦既有爲謂公叔之為文豈能無望賀毛顯謨知鎭江府啓伏審某官懇辭清禁榮綂要藩嚴助懷歸本厭承明之直蕭傅復出蓋觀宰相之材唯其被寵光而益新所以全譽處而彌固有識相慶不謀同詞恭以某官望重吏師學深王佐秋陽江漢㑹道術於環中景星鳳凰聳徳名於天下勁氣發後凋之操沈謀迎先見之幾忠無他腸才有餘地視文章之小技素所優為舉節義之大閑方將獨立笑曲士之未徧為賢者之不能故於用舍重輕之間以見進退難易之際抗章避寵奏屢卻而復前襃詔賜俞意重違而愈厚訖從荷槖爰假竹符峻秘職於西清委良翰於南國明哲具美既歌山甫之遄歸治行騰聞即慶弱翁之大用某承顔雖晚受顧則深初聆謦欬之音已荷齒牙之論竊冒叢雲之䕃更許包䝉黙希霖雨之恩終期振槁賀正啓月窮于紀方占嗣歳之祥星囘于天遂履初元之吉維世巨哲實享純釐恭惟某官正色立朝虚已游世功名自致早親日月之光節義獨高更勵冰霜之操對越三陽之序導迎六氣之和即擁春祺入熈帝載某逖違恩閥阻奉壽觴瞻頌惟勤名言曷喻同前上同維時舊弼實享繁釐恭惟某官道濟寰區功存廟社陶鈞獨運早陪黄閣之游鼎鼐再調終慰蒼生之望對越三陽之序導迎六氣之和即擁春祺入扶帝祚某跧囘末路坐逺崇閎阻稱椒柏之觴遥薦松椿之壽瞻祈是切敷敘曷周謝祭酒舉改官啓飛章帝所推華衮一字之襃傳檄儒宫増弊帚千金之享載惟忝冒罙積驚慚竊以知人之道固難而儒術非他技之比入仕之流寖廣而學校乃公議所歸至於宗師之薦論必繫朝廷之簡拔秩六百石徑脫州縣之冗曹歳四十員盡收雍泮之清選專以蒐羅一時寒畯之士因以激昻三代豪傑之風凡舉所知必從其類故竿牘小夫之智至無所容簿書俗吏之為略而弗取自非文章炳蔚問學淹通望實有加於人行能無媿於古則何以酬丹霄之定價附青雲以垂名如某者藝畹寒荄辭源淺派所學眞土梗耳弗造本根於道猶醯鷄歟未離幽蔀頃聨黄甲偶代白丁既預搢紳之游即分庠序之教歎齏鹽於朝暮寧逃獨冷之譏閲絃誦於春秋粗知三樂之趣技殫鼯䑕化止奔蜂方幽黜之是虞曷明揚之遽及平生慕願此日遭逢兹蓋某官推輓九流括囊六藝自任斯文之興廢獨為吾道之重輕先知覺後知於身親見小德役大德與時偕行乃睠微蹤嘗叨異眄終未忘於下體遂不壅於上聞芹藻預榮蓬蓽増氣某敢不恪遵師法名御守官箴節勵冰霜必欲免夏畦之病光分螢爝或能助秋陽之明謝蔣迪功啓伏審首被貢書遂偕計牒膠庠倚重黨友増華貢元某官杞梓竒材芝蘭秀質藉甚家聲之振藹然世德之昌黄巻一經得賢父兄之樂青衫九品從貴子弟之游初接迹於群居已程能於異等迨膺妙選實愜衆情縱步武於夷塗可立待也收功名於絶㑹是以似之方深贊喜之誠繆辱飛文之貺銘藏惟切敷述奚殫賀盧舍人啓伏審近膺制檢遂陟詞垣入陪清禁之塗允屬鴻儒之任權輿廊廟鼓舞搢紳共以某官如唐一䕫為宋三儁講奪重席蓋國中之真儒談傾四筵亦天下之辯士文章有古之風烈徳行為時之表儀素望藹然英聲藉甚上所屬意見謂有宰相才民亦系心何止為舍人様兹假判花之重㠯叅視草之榮政事預聞允資國體之通達訓詞具在共期帝制之坦明洪惟二者之長信謂一時之美方將日膺三接歳閱九遷亟躋玉筍之班即進金鑾之直斯言可必指日以期某受恩特深為喜益倍燕雀相賀初瞻大厦之䕃成桃李不言自識舊蹊之路穩賀周司業啓伏審被恩宸扆正位學宫凡在下風孰不同慶恭以某官自天仙伯為世儒宗學貫九流獨脫拘攣之見文備衆體雅好深湛之思論不詭於聖人達可行之天下確乎不拔暗然而章鐵心石腸素蘊功名之志金口木舌豈唯誦説之才選自郎闈登此師帳誠恐明綸之出不煩重席之温趣據要津庸副清議某伏自早歳即聞大名因縁爨下之棄材出入嫌名光堯中之餘地蹉跎一命契濶七年身繫寒鄉徒有修門之夢心懷美䕃莫陪廣厦之游賀林資政除南京啓側聞休命就起宗工還祕殿之崇資委陪京之重寄恩言誕布僉論交孚恭以某官受天全材為帝良弼韜文武之兩器秉忠孝之一心氣貫堪輿繇直養而無害智窮眇忽皆曲成而不遺勲名具存風采可想雖讒波之横起而天鑒之孔昭曽無淹時遽有徽數欲付倚平之任姑煩釐尹之行坱圠大鈞行歸浴鳳之治鬱葱佳氣况隣飛鷁之都定觀麻檢之頒即對衮衣之寵多士之願斯民所同某受知特深為喜益倍屬吏曹之有守趨賔列以無階謝薦舉啓黌舍空餐乆竊養賢之鼎輶軒過聽誤登薦士之書自顧何堪人以為幸竊以汲引之重今古所同取夫拔茅宜在泰通之世譬之推轂當遵平陸之塗豈唯卿士之舉能抑亦王公之借譽不在此族則為匪人而况摠一道之詢謀㑹列城之殿最按亷既廣簡核惟精必得異才乃副公舉如某者江湖漫仕蓬蓽寒生斷斷他技之猗無録録竒節之未有短檠徒對口耳之學易窮長鋏空彈齒牙之論安在詎意車中之半面尚矜堂下之一言略其迂愚賜之翦拂此蓋某官識先致逺量極包䝉事君以人自得上臣之體與人為善獨髙君子之風兼收尺寸之長靡有錙銖之失推其餘地庇此微蹤某敢不力跂前修誓圖後效俯稱鄉人之好仰酬國士之知賀毛顯謨除眞定帥啓伏審近奉帝綸就更戎幄輟西清之密侍紓北顧之深憂先聲所馳羣醜攸讋恭以某官公輔之望蓋自少時將帥之才乃其餘事徒以詩書之府形為文武之韜凛然堂上之竒兵威加草木䆳矣幕中之婉畫名動蠻夷暫分清禁之光以壯朔方之勢然而痱為一面之病骨乃四支之彊賢人入朝黠虜何算果吾父也尊俎可以銷萌以我公兮鼎鉉待而増重行因入覲遂即登庸某早伏下風近叨殊眄許其氣類之比借以品題之私望元戎之啓行心隨目斷嗟太史之留滯力與命違賀盧給事啓伏審比繇西省進直東臺帝恩所加士論増重竊以凡號法從均游禁塗獨於青瑣之崇資叅用黄門之故事辯駮邪正彈訶同烏府之嚴論議古今顧問亞貂冠之峻欲稱是職必惟其人恭以某官如古天民為時人傑學洞九流之䆳文追六籍之醇宇韻獨髙忠忱素著如璞玉渾金而莫能名其器於盤根錯節而有以見其才神具聽其靖共世固知其久大果膺殊睠遂陟近班職在掌綸已擅舍人之様任當批勑更繼夕郎之風固非一日而得君是宜旬月而取相行聞大用實副僉言某繆荷深知本縁末技側聽鵬摶之迅彌増蠅附之榮抃躍依歸倍萬倫等賀黄司成啓伏審近膺帝制遂正儒宗多士聳觀豈特膠庠之矜式四方同慶兹爲廊廟之權輿凡託恩庥共深欣屬恭惟某官望隆王佐名重世師德行配先民之純文章祛後學之弊取武城二三䇿雅謂知言得商頌十二篇蚤推能賦恢然凝逺之度䆳矣深湛之思有徃皆成無施不可上所注意尤知山甫之小心民皆具瞻已必弱翁之大用果叅法從進直掖垣亟由鳳閣之近班來處鱣堂之故地囘瞻僚吏盡四海之淵源追數遊從信一時之豪傑斯文有託吾道益尊木鐸之任既優金鉉之除伊邇進北扉而承密㫖綽有前規開東閣而館翹材佇觀殊渥某寅縁姻婭出入門䦨自跧迹於末塗阻承顔於隅坐側聆休命倍激懽悰賀湖守葛待制啓比審高牙已臨大府寛條一出驩頌四馳恭以某官心存古人氣蓋當世名號一時之豪傑學為四海之宗師兩禁同游最先徳舉八科並中豈止文鳴上心雅欲其居中時論久嗟於補外然公卿皆憚徒以君嚴之立朝而吏民不欺亦賴長公之治郡遂請便安之地用蘇疲瘵之氓正恐賜環不容煗席某頃由絃誦獲進門牆服在下陳方執簿書之役瞻言故國莫修桑梓之恭依嚮之誠倍萬常品賀盛守再任啓伏審祗奉新恩荐臨舊治提封所暨驩頌如初恭以某官卓犖受才洪深迪德道義滿於天下英雄游於嫌名光堯中煥星斗之文追古作者起雷霆之譽為時聞人功有為以皆成治無施而不可輟從棘寺出領竹符千里興謡坐見流亡之復朞年報政騰聞課最之優妙達睿聰併崇徽數稍緩韓侯之入覲姑狥冦恂之借留善政流風民自安於教令深謀至計帝亦俟于咨詢㑹有追鋒不容暖席顧惟疎賤叨辱知憐方懷勿翦之思更勵必恭之戒依歸下悃倍百常情沈忠敏公龜谿集卷第九終
