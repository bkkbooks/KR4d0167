body:
  text: 律詩長短句附正月十四夜觀燈南寺子虛有詩次其韻兼呈駿發次顔娟娟佳月挂南樓蕭寺真成秉燭遊火樹忽驚新節物春衫不趂舊風流公方高臥追三巳我亦狂歌發四愁為報襟期得名勝何妨著處一開眸不出以次初約子虛而往顔見招再用子虛韻和呈駿發次顔燈市燒春接郡樓歲豐人樂事遨遊繁絃急管方連夕痛飲高談自一流短帽縱堪陪勝賞長檠那解照牢愁歸來臥對西窗月獨想清光燭電眸十里笙簫沸市樓已占風物兩優遊人從月窟開青嶂燈挾星河映碧流曲席深杯成徑醉長廊古寺溢清愁暗中我亦知公在強對蘭膏為舉眸子虛復有詩再次其韻誰能延月倚危樓細履相將偶當遊倦聽山歌懷舊俗間看水戲濺寒流戲然燈土人以水燈光競作千門曉酒力微寬一掬愁明日八分疲阿買詩饞元只在清眸次夕雨作用子虛韻奉懷次顔知魚軒小集夾道繒山聳蜃樓小軒終憶數條遊月將人意十分滿雨入溪光一派流靜聽屐聲喧夜市旋挑燈灺醖春愁閉關不問隂晴事時怪玄花掠病眸別群從十年勞遠夢今日又征鞍雨入花梢困風生麥浪寒飄零逢酒怯老大別家難去矣功名事終須把鏡看瓜步呼去聲漸逐潮頭遠帆影低隨日腳斜已喜扁舟近瓜步江鷗無數立寒沙將達行在所潮落江城暮帆開一葦輕雲屯六龍駐天近五星明率土朝方嶽何年洗甲兵君王似光武折箠看升平陳子尚博士休官還京口作此詩餞之勇退曾無屋數椽挂冠神武便飄然陶潛去家一百里張翰收名四十年平世深知還有幾少時健決已無前使者論不合徑去官子尚昨主臨淄簿與部侏儒飽食堪羞死莫浪狂言為著鞭西風江上荻花秋鱠玉頻年念昔遊世事真成一可慟身名那問二冝休公卿禮餞何為者僮僕歡迎有此不鬢影毿毿紛翠葆曉來鍾漏亦懷羞得家書國步猶艱棘不堪頻問家霜毛失翠葆蒿目亂玄花孤客知時節殊方度歲華干戈就休息歸理邵平瓜觀瓊花千里隨河走濁流檣烏東下指迷樓春風簾幕今何在只有瓊花伴客愁即事和卓彥翼曈曨曉日上簾旌簾外幽禽作意鳴呼斷故鄉千里夢起來搔首問歸程即事造物勞人亦懵哉又驅疲馬上崔嵬經從野店初嘗筍行盡江村始見梅千里短書先夢寐半生多難足風埃桔橰俯仰成何事已念漁蓑歸去來次桐廬決決溪流不滿灘獨憐舟子上風灣日斜指點西村渡竹户茅牆趂碧山吏鞅縈人未許間當遊聊復到春山倡條冶葉無風味賴有寒梅醒病顔於潛道中首路潛溪驛雞聲欲曙天藍輿衝宿霧棧閣寄層巔高下林端屋橫斜石罅田野泉隨處有草木盡蒼然新城道中馬蹄隨意到回首隔南岡日落鳥猶語春歸花自香長紅媚幽谷新緑漲回塘假榻知何地昏鍾出上方宿葉璋橋庵舍渡澗穿林夕未休野人篝火引前騶驚從略彴灘聲急喜見屠㢝草蓋修雲臥自驚魂夢冷星馳先惱肺肝愁乞身老我雙溪上記取端能賦遠遊水閣小憩雲氣昏昏雨腳垂客行終日倦奔馳竹間小閣臨清瀨俯檻觀魚立許時祈門道中遇雨了事癡人有底忙箯輿勃窣到南岡樵風槭槭群狙喜山雨蕭蕭萬木僵谷底暗分冰澗落舍旁時度野梅香殊方歲晚多悲感歸老丘園此計長東西二林寺湓浦維舟訪梵宫香爐峰下暫從容重來不為二林景永遠禪師有舊蹤在昔得名齊連牆亦共蹊修篁同碧嶂寒溜合清溪閣影高低並鐘聲左右迷遊人俄省悟東即是林西遊人多入東林寺將謂西林景不如我䇿短笻行半日水聲松韻更清虛千秋嶺者盜發旁近復於此守禦錢氏嘗築四壘以限江南比山河四塞限中原籬落而今不復存豺虎晝行何日息但餘征戍滿荒村吳越江南絶壁間可憐爭國似蝸蠻百年父老陶王化尚記流傳一醉顔次韻鄭維心臘月十六日有作國難更頻歲胡塵動四溟豺狼飽吞噬溪壑變羶腥黃屋無安所清笳不忍聽使臣歸路阻慟絶鬢星星朝廷歸叛將關塞失簽軍銅馬猶逋命沙蟲亦占群上心存廟略兵氣亂天文誰挽斜河水通宵洗赤氛血戰遮東道今誰廟食雙無人扞強虜縱馬飲長江冦掠元干紀兵臨反誘降將軍自不武慚色上旌􅓚次韻避冦二首窮途厭遷次歲晚惜分攜茅舍荒村北柴門曲港西雞豚暫同社桃李舊成蹊那得干戈定浮家著兩溪宦遊成屢卻戎壘悵頻遭聞詔趨吳會經途事董逃心期紓國難力欲挽人豪漂泊多危涕真成失木猱遊城山夜歸泛舟南溪杖藜尋勝款禪扄歸去扁舟伴月明臥樹低摧山腳轉跳魚撥刺櫓牙驚煙埋橋影雙霓斷風尉溪光一鏡平聚落半空無市井在亡燈火短長更次韻李通直題慈相寺雪月亭曲檻飛甍介碧空盡供勝覽屬禪翁蒼藤翠木四圍外遠水平蕪一望中幽鳥林梢鳴不斷亂雲天末去無窮素娥青女今何在女主霜雪淮南子青歸步聊乘兩腋風扈御舟泊錢清江口值雨打窗悉窣連江雨吹柁嘔啞拍岸風篷底醉眼那得穩時聞雞唱夢魂中法駕親巡海上還鈎陳萬騎列江干潮生風熟樓船過雨助洪濤失故灘過平望未辦扁舟挂緑蓑人間何處不風波終須徑為鱸魚去笠釣歸尋張志和和得道之地平望乃張志次吳江水闊風豪浪拍天魚龍戲舞墮饞涎尋常行處多翻覆看我孤舟得穩眠小邑蕭條兵火餘狐狸入市自相呼茅牆竹户斜陽裏十室生涯久已無冬至遇雪題明因寺僧房宦學差池已倦遊一犂真欲老西疇天公為作豐年信更喜將軍入蔡州師入杭是日聞王遙想燕山落大花更堪直北渡龍沙六師挾纊懷輕暖取日誰能反翠華方允迪隱鸕鷀谷江子我子之劉希顔行簡皆往依焉為此詩寄贈脫葉驚飛海角秋君王虛佇急良籌列仙山澤底無用孺子滄浪渠不憂百鷙可能如一鶚二江知復帶雙流渺然相望暮雲碧兀坐蒲團搔白頭八月十七日扁舟渡錢塘江一言初欲寤明君去矣終緣丞相嗔鳬鴈江湖真我輩龍蛇山澤定何人市中未識馮延夀門外已呼祁孔賔尚有憂時心未歇西風吹淚濕綸巾沙觜波生柁腳開扁舟老去許歸來風帆一點日邊下雪浪千堆天際回城郭荒蕪迷舊隱江山寂寞寫餘哀此心元自無機事寄語輕鷗莫見猜允迪招行簡卜居鸕鷀谷僕意羡之作詩送行兼以自見嚴陵灘下鸕鷀谷聞道元英舊隱廬鼻祖名高詩格在耳孫才傑宦情踈漫山松桂鴈行立入塢茅茨星散居知為劉郎賦招隱莫教花落到通渠少日長懷社稷憂怪來饒舌謾多仇風塵冉冉百年老霜雪蕭蕭兩鬢秋不辦癡床供一笑方營隱谷賦三休添丁護得金鴉觜佳處端能著我不維心過邵子非溪亭夜話有傷時感舊之作索余次韻官儀全復漢盟會競尊周郊野多戎壘衣冠半客遊地偏朋舊鮮人老歲時遒莫厭經過數相看又麥秋朝廷䇿數馬冦盜谷量牛世亂思竒畫身間喜勝流鵷鸞霄漢侶鳬鴈稻梁謀得趣皆為達那能陸蕩舟聞道津亭集青燈夜色浮鸛鳴驚獨鶴魚伏避群鶖月淡帆歸浦風腥網挂洲語深投匕立此意得無憂虜悵師頻衄民窮粟屢搜會須夷喪亂寧敢厭征求黃屋中天立彤弓幾日酬寸心終耿耿不獨為春愁心事空牢落身名盍罷休得間羞強聒避謗巧淹留老矣嗟如此誰歟問以不儻容親杖履不擬向丹丘欲上投間之請余得守丹丘方劉希顔持節按縣招維心舟中小酌次維心韻大艑浮溪曲華旌映道周勞農才徹警問俗偶成遊王事今云棘官稱古號遒正須哀疾苦輒莫詫防秋防托事希顔按隨處喧銅馬何人炫木牛輕捐小山句急捍大江流行邁心疑醉周爰事喜謀招呼隱君子高浪兀虛舟故國真如寄餘生宛若浮巢鳩不護鵲池鳳肯容鶖老木低春水孤花帶晚洲杯行應酹我知復念幽憂山林懷獨往圖史縱旁搜此士俗間忌吾儕句裏求大篇終寡和小酌漫相酬腳踏溪流亂端能醒客愁大邦通間道小縣得中休交分傷離合王程惜去留索居埀老矣劇飲尚能不倦夜評今古誰憐貉一丘子虛航重湖之險遠過山中輒次維心韻以謝客裏傷為別相望歲一周冕旒存異顧賜對天語稱去歲子虛蒙奬丘壑老英遊憂國心長折驚人語太遒年來有公事合眼注春秋小窗眼蠍虎敗壁上蝸牛老樹隂埀合前山翠欲流狂言違世用強飯了身謀不謂輕千里能迂訪戴舟此客今那有迎門喜氣浮心間清似鵠眼淨凛如鶖塵榻開蓬室風帆卷橘洲襟期適相契一笑發群憂寶曆方重啓英才必盡搜題輿偶淹泊榜道會營求浪漫貧逾適經綸老未酬雲林得攜手切勿志窮愁暮雲凝遠碧覔句擬湯休不分千山隔才為十日留高風誰繼者清夢自驚不聞説星躔動何人識太丘次韻學士兄見一亭自稱居士擬香山隻影江湖得暫間大隱可能追褦襶小亭聊欲對孱顔持杯有月同歌舞䇿杖無人共往還聞道修篁解新籜密遮門徑不須刪塵土敗名如敗敵雲山招隱似招降謾傾魯酒醒猶獨聊發吳謳調本雙誰念佳人在空谷自同漁父老清江它年對榻分餘地風雨蕭蕭夜打窗次韻學士兄述懷故國風煙素已諳結茅端欲占重嵐聚蚊那肯追金谷號虎真成賦石龕厄運經過度陽九幻生顛倒識朝三它年自有雞豚約小阮新居卜道南蔥麥推還井大春拂衣歸伴臥雲人胸中歷歷蟠三略肘後時時校六淳已作移文排俗士更將要術混齊民知間聊復求間地歲晚功名恐逼身六淳之葉風實雲子漢武內傳仙藥也見次韻黃子虛所居隨緣堂應羡扁舟泛五湖隨緣卜築伴樵蘇青山衮衮成嘉遁華髮蕭蕭負壯圖松檜鶱騰元自植魚龍吟嘯巧相娛清宵背立巖前月大呌三高更疾呼次律兄餉魚魚不至而詩至頗類南海使君送酒輒成二絶一笑而已賜茗少分以報厚意慿虛公子騎鯨後烏有先生控鯉初可是凡魚亦仙去空餘一紙腹中書先生遠餉錦鱗鮮剝啄扣門驚阿連只有珠璣落窗几空教口角墮饞涎尚方小鳳睗精芽戲比瓊瑤報木瓜夢境紛紛非實相往煩鈎起睡中蛇曉過鄰村推枕夢初斷籃輿踏露行歲登人意樂風急鴈行驚曲澗哀湍㵼危橋獨木橫清霜莫欺客雲日自晶明即事鵲噪空庭曉霜明百尺樓連枷響晴日遺穗落平疇黃菊踈籬晚丹楓別岸秋怡情有底計開甕玉蛆浮竹樹參差合溪流半隱扉雨昏鳩婦閙風急鴈奴歸䇿杖循沙步褰裳到石磯遊魚吾共樂身世自依違過梅知宫東軒舍南舍北花無數眼看遊蜂上下狂風信晚來簾額動黃庭相對一爐香允迪遣書問訊并寄示與子我唱酬佳句猥及微蹤輒用廬字韻為二詩以報嘉惠泛愛何人枉素書銀鈎奕奕到田廬朋遊久許貧方耐宦學空憐老更踈回鴈峰前應夢到放龜池上也齋居龜溪方事投間之請會允迪書到亦云允迪得郡衡陽僕丹丘皆待遠次僕居相期保社同香火口禱功名乞與渠不從吏議汙丹書恩許懷章返故廬投老有緣知分溢排姦無術愧才踈勝流踴躍聞歸棹妙語吹噓慰索居懷望北轅心已折忍將時事付軒渠書懷二首應俗由來懶謀身尚敢先栖栖從見嫉僕僕豈能賢駿馬常追日方舟可濟川人生各有趣心目名御相憐暗中人易記名下士非虛此道慿誰辦它時或自如真能食萬户定復愧三閭富貴雖吾有當令功可書事業貴不苟聲名難預期功非冝食肉道豈忘羮藜政恐儀無舌那論緯有髭漢庭今用少覽鏡獨何為劉希顔提舉見過出示卞山居二詩次其韻逼仄風塵際分攜歲月賒向來聞避地勝處偶為家對客談鋒鋭憂時酒量加中觴莫辭醉回首又天涯小別千山隔相看一笑溫丹心獵風斾華髮粲霜根鴨鴨爭呼伴鴉鴉自識村更須判劇飲落月倒窪尊張仲宗有詩懷歸因次其韻勉之相逢無日不懷歸又是春山聽子規休歎豺狼迷道路似聞貔虎仆旍旗那從薄俗求青眼還向高堂念白眉南望孤雲應目斷殊方歲月易推移南北山探梅俱未花維心從家圃折數枝以餉坐客蓋半開矣會次律兄有詩輒次韻山北山南雪意忙梅花未肯鬪寒芳懸知小圃爭前發為折踈枝分外香故國年華驚晼晚老人心事伴摧藏更看末上傳春信倚杖空懷遲暮傷次韻鄭維心探梅未花木落山空不著行寒梅長是占年芳未容霜女窺孤豔定恐花神嗇舊香竹杖穿林聊問訊槿籬縈路巧遮藏誰能折寄江南恨北客相看總可傷聞道年時醉一觴野梅飄几薦餘芳兵塵不礙含生意花骨猶存底死香入夜從教月浮動爭春空被雪埋藏慿君妙句先催發調護髙枝莫中傷復次韻呈維心拙澀不工當為抵掌岐亭幽夢墮微茫百草先春自不芳山雨壓低臨澗影天風吹下滿林香梨花少韻非儔匹竹葉多情故斂藏長記江橋間立馬落英誰掃重情傷粲粲踈梅短短牆騷人長恨失遺芳低徊草棘精神透倣佛關山魂夢香月淡乍看清影亂春深終恐緑隂藏歲寒為爾添愁絶倚樹微吟亦自傷次韻維心憶梅野花飄盡江梅發為報先春一信芳近水踈林風格老故山歸路夢魂香雪霜貿貿添愁絶蜂蝶紛紛預屏藏折寄慿君呼健步生枝莫放手痕傷次韻行簡懷次律兄門對青山水繚牆隔畦花卉盡流芳澆胸快㵼鵝兒酒襲鼻長聞柏子香夜雨對床成契闊晚雲歸岫識行藏抽身未試平戎略空為憂時倍感傷邵子非謂豫有天台之行見貽以詩次其韻巉巉老氣鬱青霞過我依然醉帽斜為説驚魂招楚些忍聞悲曲動胡笳扁舟犯雪來何許健筆凌雲語益嘉莫笑海山風引去要尋源上問桃花次韻劉希顔蠟梅二絶仙衣曵紫練裙黃天遣清臞勝國香月上小窗寒影動不禁風味惱剛腸翦成香蜜綴踈枝度臘爭春已恨遲清夜無人花睡去小園風露更相宜次韻雪紫簫吹斷玉梅魂夢入江南幾處村半夜落英飛不定旋添清絶到柴門月下獨步娟娟微月小庭西月下幽人影自隨賴有寒梅伴愁絶一枝清豔耿踈籬次韻次律兄除夜述懷此身傳馬與時移過盡三餘又一歸野炬占風迷夜色候風色占歲事農家除夜以火炬村肴宿歲待晨晞鬢華老去能餘幾心賞春來轉覺非慚愧君恩許間佚食蔬那比首陽薇餞歲鄰翁席屢移拍歌猶聽夜深歸尊浮凍蟻霜逾重林噪寒鴉日未晞剩歎飛騰憐杜老歲詩見守過為孤憤陋韓非干戈滿眼傷時節遣戍長聞賦采薇次律兄以蘆蔔見餉并有詩次其韻歲晚嘉𬞞已向萎獨餘蘆蔔老霜畦收隨芧栗供山谷贈比蘋蘩擷澗溪葅亂金叉入珍饌羮融玉糝脫汙泥程舂定覺人強飯功校蹲鴟自不齊荆楚歲時金叉事見記次律兄以鼠盜防風感而作詩命某同賦嘉𬞞靈卉兩紛紛小摘山花自出群芽茁短根紅玉卷葉敷踈節翠旟分細看藥譜鐫遺録終擬騷經補缺文堪笑飢鼯穿敗篋寧知野彘力跑雲名山花野防風苗亦食之彘喜戲酬嘗草茶慣看留客費瓜茶政羡多藏不示夸要使睡魔能偃草肯慚歡伯解迷花一旗但覺烹殊品雙鳳何須覔瑞芽待摘家山供茗飲與君盟約去驕奢某蒙學士兄相要陪賞芍藥花多白者月色相射光彩映發殆玉盤盂之苗裔耶維心有詩輒次其韻悵望揚州千朵盛數枝聊足慰淹留相逢月下陪真賞一醉花前得勝遊鑿落細斟金暈側盤盂斜颭玉光浮春衫並色渾無賴映帶霜毛笑隱侯溪亭夜坐波面搖風暑氣微秃巾來坐釣魚磯相看月墮行人盡只有流螢上下飛松架聨絡樛枝架短簷蒼髯緑骨尚依然袪除畏日心三伏領略清風直四筵好在老龍蟠夭矯誤來孤鶴舞蹁躚那堪側雨敲窗夜貪聽颼颼自不眠代人作夀詩老人明處識斜河曾占充閭爽氣多蚤以才名凌屈宋戲將詩律鬬隂何丹臺舊綴神仙籍黃屋仍埀將相科禮絶座間公未晚且提鴻筆上鑾坡英氣超超不可親溫然笑語便生春絳帷久屬宗師任紫橐方參侍從臣八面文章寧有敵一門忠孝信無倫山東出相公家事只擬尊前詠大椿張倅生日以詩為夀宿歲雕盤供五辛充閭佳氣已生春俊遊自合陪金馬英骨人猶記石麟別乘重分千里政五湖追數十年身知公隱德冝難老鳩杖看扶法從臣詩悼鄒仲容教授骨相自清臞居然淡滿軀高文凌鮑謝勝略本孫吳鸑鷟期千仞驊騮殞半途傷心九泉恨那忍奠生芻徐縣丞挽章插架遺編滿依然手自臨瓌辭寧世用高調罕知音白髮浮湘意青衫忌鵩吟些招空往事魂斷舊家林蔣司成挽詞法駕天臨五學初曾聞重席絶諸儒雍容久載從臣槖晼晚猶分刺史符不使高材陪鼎鼐卻收清節傲江湖賤生無地從巾屨獨對遺篇想步趨召節西來屬老成乞身終欲返巖扄新書未奏三千牘舊説曾翻十二經漢室首推施氏易衛人端識孔悝銘儒宗學府今誰輩空使諸生記典刑曾逢原挽詞代劉侍郎落落江湖一偉人當年玉立映簪紳四朝耆舊推先達三國英雄出後塵金板袐謀空淟汨土門竒􅍔足悲辛懸知精爽猶堪畏嚼齒傳聞不滿齦驚聞義骨殞狐狸悵失中朝一吏師廣漢威名由擲伏寬饒直氣不容欺丹心共憤時多難白首相期論少卑滿眼西風空濺淚何心忍讀蔡雍碑安次山挽詞代劉侍郎都門惜別淚沾巾回首孤城草木春封豕遙聞食上國疾風懸料識忠臣程嬰已死終存趙楊子雖生輒美新青史高名知不朽遺榮猶賁土中身曉殿傳催玉筍班東風小立照衰顔臨分愧我江湖上伏節悲君矢石間往事凄涼千古恨舊交零落幾人還殊方更致生芻奠目斷高丘涕淚潸劉資政韐挽詞國耻忍言城下盟忽驚河洛變羶腥心摧寶仗離宸極血濺轅門落將星請死自緣鳴越甲乞師誰為哭秦庭高名會與丘山重一誦遺針一涕零志士長悲處死難唯公勇決一言間結纓季路空遺迹投閣揚雄亦厚顔義烈峥嶸昭國史忠魂寂寞閟家山隻雞已負它年約下客傷心兩鬢班挽詞二首職為蘋蘩謹門推黻冕華煢嫠初鞠幼夀考竟肥家玉暗傳經簡金餘賜誥花班衣無復戲遺恨徹天涯耄期何所樂有子使三吳方享千鍾洎俄成五鼎踰御名光堯堂遺素幔祔域閟黃壚欲拜臨終像它年記結趺吳冝人挽詞夀富居然五福先簪纓况復世蟬聨斷機忐節酬平日舉案風流記昔年上郡方蒙湯沐地諸郎應廢蓼莪篇送車千乘松門道會有雙飛鶴戾天長短句浣溪沙和鄭慶襲雪中作雲幕埀埀不掩關落鴻孤沒有無間雪花欺鬢一年殘欲把小梅還鬭雪冷香嫌怕亂沈檀惱人歸夢繞江干花信催春入帝關玉霙爭臘去留間不禁風力又吹殘客舍不眠清夜冷縈愁一縷裊旃檀空庭月落斗闌干葛使君示書有元夕寒廳孤坐之歎昨日石林寄示所和長短句輒亦次韻和呈因以自見窮寂之態華燈高宴水精宮浪花中意無窮十載江湖重綰漢符銅應有青藜存往事人縹眇佩丁東臥聽蕭寺響踈鍾渡溪風轉空濛月上孤窗鄰唱有漁翁追念使君清坐久歌一發恨千重又和葉左丞石林魚龍戲舞近幽宫亂山中似途窮緑野堂深門敞獸鋪銅無限青瑶攢峭壁花木老映西東
