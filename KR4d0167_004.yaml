  text: 沈忠敏公龜溪集卷第四
  hash: sha256:aab8bbbca482255d28de44acba9fce30ff55d32cd524bdb23a8d09b165a7e23a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0167_SBCK_004-1a}
body:
  text: 內制麻制批答詔除郭仲荀武泰軍節度使依前侍衛親軍步軍都指揮使權主管殿前司公事制門下勝負者兵家之常將帥莫先於賈勇豫奪者國柄之大帝王尤厚於植恩眷我閫臣麗于邦典解齋旄而茲久扈巖陛以彌勤爰因霈音式朌渙號具官郭仲荀資稟沉毅節槩軒昻風流紹於故家氣略聞於殊域訓齊士卒適程李寬猛之冝保障疆陲合孫吳擒縱之要戰閥屢上勳盟孔昭自從朕於艱虞更飭身於忠謹屬虜騎飲江而南下慮敵人並海而東侵授以偏師扼其要路兵勢弗競避地踰一舍之遙物論既騰啓途收六纛之峻頃召還於裔土旋典司於禁兵謀謨慨然儀觀偉甚念世類之祥未艾知功名之志不衰將勵山西之徑臣遂付黔南之巨鎮周廬徼道總中慰之八屯錫盾雕戈復元戎之十乘兹為寵渥庸示眷私於乎伏波遲留克成銅柱之略營平名御重願上金城之圖儻無愧於古人盍有為於當世往復休命益勵壯猶可賜朱勝非辭免新除右僕射不允批答朕纘奕世之丕基屬四郊之多壘眷求輔佐期共濟於艱虞涉歷歲時久未聞於績效既虛厥位益難其人允惟舊德之良冝膺大政之托授之國柄蔽自豫衷再從廊廟之遊大慰寰區之望而乃露章荐至避寵牢辭彌徇謙撝殊咈延佇矧卿元功在國隱德及民雅量足以凝遠圖沈機足以斷大事萬方引領冀臻休息之期二相同心克副焦勞之志毋留邦渙用穆師瞻賜席益辭免侍講不允批答朕惟商之高宗師古建事克致中興逮及光武干戈鞍馬之間亦惟道藝不廢講論復漢中天之統朕心慕焉肆於萬幾之暇他好弗親惟學是嚮躬御經幄延訪儒臣庶求多聞宏益治道以卿學問之富師友淵源擢居勸講之聨俾卒金華之業稽于僉論孰不謂宜奚事謙撝過形控避往推所學紬繹而茂明之副朕虛佇卿亦與有榮焉賜參知政事孟庾辭免通議大夫恩命不允詔朕以閩越湖湘之間大憝逋誅根連蔓結脅我赤子盜弄庫兵宿師連年未克平殄眷然南顧實疚于懷乃輟帷幄之臣而總干戈之事卿義形于色慷慨請行揆䇿投機指授諸將群凶隨以蕩滅數路為之肅清坐使黎元復見休息論功甚茂朌賞猶輕時惟股肱必識朕意抗章避寵豈所望焉夫謙沖之節雖云可尚令出而寢卿豈不為朝廷惜乎再賜孟庾辭免不允詔朕比遣師徒往平寇盜想山川之悠逺爰念懷歸憫臣下之勤勞豈忘勸賞矧我哲輔夙有壯圖入則參與政機謀謨足以決大議出則總提師律精神足以折遐衝蠢茲嘯聚之群詎費坐籌之畫指顧而定逋逃一空歌枤杜之詩士方休舍變潢池之習民乃奠居褒律肆行需章薦至載惟謙抑殊咈眷懷夫位髙而志卑固云美矣功多者賞厚猶用歉然往其欽承勿復固請賜新除翰林學士知制誥綦崈禮辭免恩命不允詔朕纂承丕圖戡定多難將欲德意志慮鬯達乎斯民蓋在號令文章鼓動乎當世翰墨之選茲維艱哉卿學窮本原文備體要代豫述作亦既有年再隸職於卿曹復兼官於辭禁演綸滋久摛藻益工報淮南之書卿其視草而遣矣下山東之詔民將扶杖而聽之肆加即拜之恩示豫親擢之意奚為遜避猶徇故常冝副僉諧之言往就久虛之次賜新除禮部尚書洪擬赴闕詔卿居列英髦望隆耆艾中臺曵履嘗冠從班外屏分符久寬憂顧乃念踐揚之舊豈忘簡記之勤爰錫贊書聿頒召節虛常伯之席式佇遄歸促舍人之裝應冝夙駕賜新知平江府趙鼎辭免不允詔朕親撫六師肆覲群后乃眷三吳之都會實為二浙之喉襟控扼要衝兹號股肱之郡慰存凋瘵冝得腹心之臣卿節概剛方器量閎達臨事絶回邪之見為政多豈弟之稱自初進為皆朕識擢置之言路論尤切於愛民付以事樞志每先於許國退即祠宫之逸荐更歲籥之賒執德不回宅心無競是用起從間適紓朕顧憂念孔戣立朝見謂公卿之皆憚知寬饒治郡必使吏民之不欺奚為抗章尚稽就道勿循謙撝之節其承屬任之恩賜尚書左僕射領江淮荆浙都督諸軍吕頥浩生日詔風威翔於北陸方迎朔律之嚴台象耀於中階爰啓高門之慶是生賢佐來相朕躬位崇補衮之華日應埀弧之吉式朌珍賜往介蕃祺倚毗廊廟之謀孰踰元老戡定邦家之難必享長年賜敘復平海軍承宣使蘭整辭免恩命不允詔朕比以乾象示變震惕于懷乃駿發於霈音用導迎於善氣肆加群辟一洗庶辜卿飭身忠勤致位休顯頃從羈旅之役還典禁屯之兵宿衛惟恭訓齊甚力偶挂吏議頗鐫使名屬號令之布新冝班聨之復舊奚為謙挹猶事遜辭往膺湔拭之恩勿忘奮勵之勇賜張深程唐劉子羽奬諭詔朕治兵南服屬意西陲眷秦雍之疆歲被胡塵之擾連巴蜀之阻日聞邊遽之驚念此傷夷痛如焚灼倚注樞臣之重總提師律之嚴雖云堂上之竒兵自能制勝允藉幕中之婉畫相與圖全卿起自儒家明於將略閥閲通於禁管未減頗牧之賢韜鈐贊於廟謨必合孫吳之法山川跋涉歲月淹留挫強敵於方驕賈餘勇而再振執訊獲醜斬將搴旗成兹克捷之功繄乃參佐之力算計見效嘉歎不忘然念虎狼哮噬之無厭豈勝其忿熊羆奮勵而有獲所戒者輕更懷持重之思助成戡難之烈嗣朌異賞寧限彝章賜新除慶逺軍節度使克醴泉觀使特封德清縣開國子食邑五百户食實封二百户邢煥辭免恩命不允詔朕會朝方嶽竣事合宫告宗祀之備成遍敷惠澤念后家之流落未啓戚藩頗采彝章誠為闕典自椒塗正長秋之位屬翟馭從朔方之行感此傷心居焉纍歲推朕懷兩宫之意彼豈忘親廣朕加四海之恩茲為篤近爰設將旄之重肆開帥閫之雄匪朕所私繄國之舊曷形遜牘猶避寵名况卿謙厚律身忠謹事上萬里歸于逆旅諒險阻之備更五載服于故官亦靖共之足尚孚號既發僉言允諧勿復徇於勞謙其往承於茂渥再賜邢煥辭免不允斷來章詔朕追考祖宗之舊凡建節旄之雄自非勳德之優用為報稱必以宗姻之懿昭其寵榮卿世為德門居有賢譽以儒臣之英而識通機祕以后父之貴而志絶豪華熙事備成惠術遍舉聨長安之戚里所存幾人開慶遠之帥藩姑循彝制其往承於異渥毋曲徇於牢辭親征詔朕猥以寡昧屬茲艱虞迫臣民愛戴之誠續正統於將墜痛父兄播遷之難履尊位以何安夙夜以圖䇿慮並用豈不能躬擐甲胄親冒煙塵乘將士欲戰之心慰黎元厭亂之意然以兩宫萬里一別九年覬迎鑾輅之還期遂庭闈之奉故暴虎慿河之怒敵雖逞於凶殘而投鼠忌器之嫌朕寧甘於屈辱是以卑辭厚幣遣使通和庶殫孝悌之思必徇哀恫之請至于土地梗絶生齒流離師徒懷暴露之憂閭里起繹騷之歎繇朕不德嗟彼何辜仰懷故國之廟祧至于霣涕俯見中原之父老寧不汗顔比得敵疆之情稍有休兵之議而叛臣劉豫懼禍及身造為事端間諜和好信逆雛之狂悖率群偷而陸梁借彼援師倚為威勢簽我赤子脅使征行涉地稱兵操戈犯順大逆不道一至於斯警奏既聞神人共憤猛士在列怒髮上衝以謂逆順之理既分勝負之形可見皆願挺身而效死不忍與賊而俱生朕乃下詔總師卜日引道前驅方戒積隂頓開天地鬼神罔不助順將帥輔弼罔不協心今朕此行士氣百倍雖自纂承之後每乖舉措之方尚念祖宗在天之靈共刷國家纍歲之耻殪彼逆黨成此雋功載惟風霜跋履之勤仍蹈鋒鏑戰爭之苦興言及此無所措躬然而能建非常之功必有不次之賞初詔具在朕不食言賜川陜宣撫處置使司詔朕紹國丕基遭時多難飭戎車于江左為懷經略之圖列將鉞於關中欲存根本之勢豈虞強國專逞淫威敵徑弗支兵拏未解嗟蒼天之不弔冝悔禍于我家憫赤子之無辜重流毒于茲土寡德所致悼心何言賴我股肱之臣總護瓜牙之任一戰克捷群醜殱夷王靈由是復加士氣於焉再振然念興師纍歲轉鬬一方被夷狄之係纍寧無淪陷之黨思祖宗之涵養豈有背叛之心慿陵使然蹭蹬至此儻存疑阻殊咈招徠將束身而欲歸或懼刑誅之慘比復業而奠處或憂賦役之煩或立效而褒賞未加或負才而祿秩未稱疾苦無告愁恨何聊仄席以思當饋而歎於是下哀痛之詔布至意以宣昭施曠蕩之恩洗庶辜而抆拭沿邊將士應陷蕃之人非抗王師及侵掠入冦者並不得誅殺虜騎馮陵之際陷沒州縣官吏將士軍民皆緣事力不能捍禦致有脅從或遭驅虜至今困居本土或旅寓逺邊實為殘破無曰背叛陷蕃之人能立功來歸者仰沿邊帥守保舉申宣撫司一面旌擢優賞其次雖未能立功而心在本朝有意懷來者各以元舊官職任使兵級弓箭手依舊職名收管民兵願歸業者聽其間才力可用特與拔擢或有以前罪犯懷疑自危一切原貸或先曾立功未曾推賞即特與推賞因陷蕃廢業失所者寬其租賦免其征役昨緣道路不通號令壅隔致遠方之民疾苦無所赴訴專委宣撫司講究措置並從寬恤遍下諸處官司施行咨爾有衆咸識朕心各堅奮勵之誠亟臻休息之效故兹詔示想冝知悉親征戒諭州縣詔朕以逆臣劉豫稱兵南向警奏既聞神人共憤朕不敢復蹈往轍為退避自安之計而重貽江浙赤子流離屠戮之禍乃下罪已詔親總六師臨幸江濵督勵將士然興師十萬日費千金動衆勞人懼所不免每一念此惻然疚懷尚覬監司帥守與夫郡邑小大之臣夙夜究心體朕此意凡借貸催科有須於衆者母或縱吏並緣為姦凡盜賊姦宄輒生窺伺者務絶其萌母令竊發其或乘時搶攘恣無名之斂容姦玩冦失幾察之方至使吾民橫罹困苦有一于此必罰無赦候軍事稍平當遣廷臣循行郡國招從偽士大夫詔朕惟靖康兵革之難神器幾墜天命有在屬于眇躬夙夜兢兢罔敢自逸期與爾士大夫共雪大耻還我兩宫保有黎元永庇中土而疆敵侵軼迫朕一隅叛臣乘時盜據京邑使我搢紳淪陷塗炭繇朕不德以至於斯北望傷心收涕無所亦惟爾士大夫蒙祖宗休澤服在周行其有失身偽廷事非其主顧驅脅使然有不得已者朕甚痛之故若張孝純李鄴李儔等內外親族不廢祿仕每飭有司常加存恤朕之於爾厚矣爾尚忍忘之耶其能洗心易慮束身以歸當復其爵秩待遇如初或為竒謀祕畫立功自效乃朌異賞不限彝章嗚呼逆順之理禍福之機昭然甚明要知所擇朕方布大信以示天下言不爾欺有如皎日咸務自省體朕至懷賜吳玠詔覽所奏盧法原以疾不起良用䀌然巳降旨揮邵溥權管宣撫司常行細務至於軍旅調發之事疆陲控制之方此乃國家大計朕既委卿獨當一靣卿其以身任之惟卿忠存廟社威震羌胡勤勞纍年勳伐甚茂使隴蜀之境恃卿以安則朕有長城之託益所倚重卿必深諒此意自信不疑近報遣兵分道四出秦雍一帶次第來歸備見規橅嘉歎不已夫關河天下之根本朕未嘗一日忘也收還故土撫寧遺黎此所望於卿者顧朕亦安能鬱鬱久居此乎相時觀釁卿冝勉􅏧比已遣張浚措置荆襄恐有事冝就令報應卿可知之賜韓世忠詔覽奏欲依舊留屯淮甸誓與敵人決於一戰已悉朕迫於疆敵越在海隅每慨然有恢復中原之志顧以頻年事力未振姑鬱鬱於此自去冬敵人深入卿首挫其鋒鼓我六師人百其勇既至潛師引遁而卿復率先移屯淮甸進取之計恃此為基朕甚嘉之前日恐老小或有未便委卿相度今得所奏益見忠誠雖古名將殆無以過使朕竦然興歎以謂有臣如此禍難不足平也古人有言閫外之事將軍制之今既營屯安便控制得冝卿可施置自便勿復拘執至於軍餉等事已令三省施行方此酷暑將士良勞行飭使人齎賜夏藥撫問卿並冝知之賜張浚詔覽奏為韓世忠移屯事遽有外祠之請良用憮然卿謀慮精審冝無遺䇿而世忠遣濟等來固自有意繼遣敀至陳義激昻其所設施略如初議至其曲折方適厥中卿復何疑而有斯請比以亢旱鼎等方求罷政使朕茫然莫知所措已降詔趣卿還朝當體朕懷即日引道勿憚徒御之勞也賜三省銓擇監司郡守詔朕惟監司外臺耳目之寄郡守承流宣化惠養吾民其委任重矣間者朝廷輒輕以假人將何以使民聳然聽服朕甚恧焉繼自今其御名選擇勿狃于故常勿牽于私意以纍國其已除授人亦銓量而去留之或資序已深屢更此選雖無顯過而才非所冝當處之外祠稍優其祿庶幾稱朕求治責成之意而士無失職之歎仰三省常切遵守賜張浚詔比得胡世將奏知卿已過長沙觸熱引途其勤至矣雖卿以身任天下之重而自忘其勞然大臣暑行朕心則有愧焉湖湘之冦卿到彼指授諸將必能克日蕩平顧朕所慮者前此王􅊛輕入失利賊勢益張今漲潦瀰漫之際彼方阻固恐有狡謀遣發師徒更冝審細且招且捕一舉成功紓此南顧之憂專意北事乃朕指也已令趙鼎諭卿卿冝悉之賜劉光世韓世忠張俊詔朕自渡江以來志在恢復深惟足食足兵之計夙夜疚懷凡財賦所入未嘗一毫妄費悉用以養兵而已故比年訓練士卒精強而器械亦皆犀利比之曩昔實不相侔是以去冬敵人之來卒賴卿等極力捍禦致彼遁歸蓋前此所未有也朕甚嘉之然中原之未復二聖未還而僭偽之徒方挾強國之援狡謀日急顧我所以勝之者惟是上下內外合為一家如報私仇乃克有濟儻或各以其職自分彼此日復一日成功實難卿為國重臣安危所繫諒必察此不待朕言今國用空殫民力耗竭雖有司錙銖積纍而費出之數日以寖廣茍無以繼何以聚人每一念之心常怵惕想卿亦為朕慮及於此也至於差辟官屬保明功賞軍須用度之類更在精核勿至泛濫使賞當而爵祿不私用足而資給不匱則存養事力漸圖進取朕與卿等同享無窮之利顧不美哉布朕此意卿宜悉之賜李綱詔朕昨總戎車前臨敵壘洎潛師之引遁勞戍役以言還惕若眇躬懼兹多難幸求善後之計敢蹈護前之非博訪舊臣屢形深詔卿首陳三䇿適投却敵之機繼上六條大闡興邦之略意拳拳而曲折言懍懍而髙明有發豫衷如對卿語此乃卿精忠許國誠節表時雖在燕間之中不忘開濟之事肆披夙藴因致良規省閲再三嘉歎不已至若議和避地之失練兵積粟之方將議改圖共期底績臨朝願治顧䇿慮之是資當饋思賢念話言之可想宜從疾置時告嘉猷終藉經綸之才助成戡定之烈故茲親筆以示至懷沈忠敏公龜溪集卷第四終
