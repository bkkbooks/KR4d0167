body:
  text: 劄子辭免除資政殿學士知明州劄子臣今月二十六日准尚書省劄子奉聖㫖以臣累上章乞解機政退就祠宫除資政殿學士知明州者聞命感激涕淚交流伏念臣猥從踈逖誤被簡知寖閱九遷叨塵二府念大恩之難報顧薄效之靡聞食息省循夙夜震惕至於審圖恢復之計思濟艱難之期同寅協恭既初心之莫展投閑置散乃素分之是冝比貢囊封數干黈聽竭愚誠之迫切荷聖意之周旋付以名城寵之峻職曲全終始之眷以為去就之光豈臣糜捐所能稱塞而臣深虞朴拙必致顚隮是以不避瀆煩仰祈矜憫覬追還於異渥俾退就於眞祠庻保孤蹤尚堅晚節臣無任祈天望聖激切屏營之至取進止辭免除資政殿學士知明州第二劄子臣猥以一介無能之質誤被聖知擢陪政路叨冒無補夙夜懷慙遂瀝血誠仰干天聽乞解機務退就祠宫伏䝉矜憐曲全體貎名城峻職併冒恩榮豈臣糜捐所能稱塞感涕横溢九殞難酬臣雖已具懇辭未奉處分重念臣朴拙之性第盡愚忠孤危之蹤實恃異睠儻忘素分定致煩言欲望天慈終垂憫察檢會臣累奏除一在外宫觀差遣庻存晚節期報大恩臣無任祈天望聖激切屏營之至取進止貼黄臣於今月二十一日留身奏事歷陳危悃既䝉恩許其去拜辭天陛之際玉音宣諭當全體貎盡禮而行仰荷睠遇始終感深淪骨所以跼蹐待命遂至浹旬竊恐中外不知招致物論重費陛下保全之賜伏望天慈早降處分亟遂宫祠之請庻免顚隮辭免除資政殿學士知明州第三劄子臣伏䝉聖慈以臣辭免資政殿學士知明州恩命特降詔書不允者危悃瀆煩粗殫萬一恩言慰諭殆至再三荷聖意之周旋撫危蹤而怵惕伏念臣奮繇寒士本乏異能曲被冕旒之知叅陪廊廟之列一毫何補百謫是冝然考平日敷奏之言曷嘗不在於恢復推老生朴野之學亦欲共濟於艱難而孤根易揺薄命難偶每於曲折之際倍費保全之恩傾輸肺肝控告君父忠雖許國義盍引身仰䝉日月之明俯察螻蟻之志詔函使騎眷禮有加峻職名城寵榮併至既逾私分荐具懇辭天聽未回欲全終始之遇人言可畏恐乖去就之方伏望聖慈特賜矜憫悉收還於成命亟畀付於眞祠庶幾餘生免累洪造臣無任祈天望聖激切屏營之至取進止辭免轉官上宰相劄子伏念某頃者待罪政途之日適㑹朝廷重修禄令恭被聖㫖叅預典司及今書成奏御而某去國已歷三時矣則是某首尾初無一毫之功乃䝉疏恩例叨増秩聞命失次措躬靡安仰惟朝廷不忘舊臣借此寵私以光衰朽然某居閑養疾而受無功之賞私情公義皆所不安伏望鈞慈特賜敷奏追寢成命施行庶安愚分除已別具奏聞外某無任懇到之至辭免勑令所修書成轉官劄子臣九月二十九日准進奏院遞到尚書省劄子為勑令所修禄秩新書成奉聖㫖轉臣一官者聞命感懼措躬靡安竊以賦禄之等所以馭羣臣成憲之頒所以詔萬世而臣頃以愚陋濫預典司方庀徒屬稾之初雖粗窺於凡目逮成書奏御之日已阻望於威顔敢謂第名例叨増秩曲荷乾坤之施不忘簮履之遺伏念臣孤負大恩退安眞館居閑有禄每懼挻災受賞無功豈忘畏義輒陳愚悃上瀆聖聰伏望特軫慈憐收還寵命非止獲安於私分亦欲免累於公朝臣仰望行闕無任懇到迫切之至謹具劄子陳免以聞伏取進止辭免勑令所修書成轉官第二劄子臣十月十三日准行在都進奏院遞到告一道以禄秩新書成轉臣一官及奉詔書以臣辭免上件恩命未䝉矜允者天地之恩固欲從厚螻蟻之志終冀獲申罔避黷煩薦形敷叙竊以上之行賞無濫則人勸下之被賞無愧則身榮授受之間得失所繫儻事功之未稱顧分義之何安貪得不言冒榮孰甚惟新書定禄秩之等命近臣兼提督之官雖用故常曾䝉委使而討論㳂革裒輯散亡則有司存在臣何力矧復屬稾之始臣已去朝歷時之多書方奏御而臣論功無有受賞何名襃典横加驚惶失措是以輒陳奏牘力具懇辭俞音未頒危衷益懼此雖陛下親乘戎輅赫然有為之時而臣退安祠宫冒此無功之賞人誅鬼責將不赦臣公議私情皆恐累國思念朝夕怵惕冰淵伏望宸慈特回天聽察臣愚悃實非飾辭矜從既竭之誠追寢已成之命庶於素分行以少安仰望行闕臣無任懇到迫切之至所有告命臣見寄納湖州軍資庫不敢祗受謹再具劄子陳免以聞伏取進止辭免勑令所修書成轉官第三劄子臣近䝉恩以禄秩新書成轉臣一官臣自揣無功輒嘗再具陳免今月二十四日准尚書省劄子奉聖㫖依巳降詔㫖不允恭惟聖恩至渥承命感激涕泗交流然臣於義終有未安須至備瀝血誠復凂天聽伏念臣衰病無庸之身投閑田野仰䝉陛下記憐假此光寵在臣私分豈不知榮臣儻有一毫之功可以稱塞及於近例可以扳援臣亦何敢於此軍旅事繁之際喋喋控叙至于再三上凟威尊自干斧鉞誠以此書之作臣實略無勞效固已於前兩次奉劄具述本末兼臣竊見紹興新書之成自詳定官而下第增爵秩提舉官則不與也今臣身既去位乃獨䝉此襃遷反覆思之無一而可陛下遇臣之恩則過於厚矣而臣辭受之義所當盡者敢不披露於君父之前伏望陛下囘日月之照察螻蟻之誠曲軫宸慈收還成命豈惟免微臣冒寵之懼庶不累朝廷勸賞之公所有告命見寄納湖州軍資庫不敢祗受仰望行闕臣無任懇到迫切之至謹再具奏劄陳免以聞伏取進止乞回受勑令所修書成轉官與兄監嶽劄子臣今月初二日准尚書省劄子以臣辭免轉官恩命奉聖㫖依累降詔㫖不允者庀官無尺寸之功難勝誤賞瀝懇有再三之瀆冝就嚴誅過䝉寛宥之恩終閟矜從之㫖愧益深而汗溢感彌極而涕流伏念臣家世至寒資材甚下被服父兄之訓偶玷儒科遭遇聖神之知寖汚政路比投閑散猶荷記憐稱效云何儌倖如此粉身碎首曷足報償履薄臨深每知恐懼輒恃天地包容之量復陳犬馬冒昧之誠重念臣兄右廸功郎監潭州南嶽廟某少習藝文久困埸屋晚霑恩命甫列選階念暮年手足之情豈忘牽愛顧平日肺肝之懇不敢及私茲縁異恩庶均同氣仰祈聖造曲軫天慈特許以臣今來所轉一官囘授與臣兄某循轉施行將侈朝廷之寵光用増門户之榮耀屢瀆宸聽萬死奚逃臣無任瞻天望聖祈恩俟罪跼蹐屛營之至謹具劄子奏請以聞伏取進止辭免除在京宫觀侍讀第一劄子臣今月日准行在入内内侍省金字牌遞到尚書省劄子奉聖㫖除臣提舉萬壽觀兼侍讀日下起發赴行在所供職者聞命跼蹐感涕交流伏念臣頃以耡耰固陋之質誤被眷知擢自小官至陪大政一毫無補百謫有餘仰䝉從欲之仁俯狥投閑之請思愆里舍僅閱歳時雖存闕之心不忘造次而歸田之幸甫迫衰殘敢圖聖恩驟加收召露門勸讀殊庭奉祠此在累朝實為貴老優賢之地如臣碌碌併冒寵除分非所安兢惶失措然方陛下親乘戎輅力圖恢復之日在臣子之義豈不欲一望清光少伸志願而叨塵非據定致煩言深自省循進退惟谷伏望陛下特軫天慈追寢成命俾臣仍舊外祠休養疾病他日儻或未塡溝壑誓期糜殞少荅鴻私臣近為感冒風濕左足筋攣日下起發未得見服藥調治稍可支梧卽迤邐前路聽候指揮謹具劄子陳免以聞伏取進止辭免除在京宫觀侍讀第二劄子臣今月十二日辰時連准行在入内内侍省金字牌遞到尚書省劄子以臣近具辭免新除恩命正月十一日三省同奉聖㫖不允令學士院降詔依已降指揮疾速赴行在所者仰感聖恩涕泗横臆臣聞君命召不俟駕而行考於禮經固有明訓而臣戇愚朴陋一無寸長伏䝉陛下曲軫宸慈不忘舊物召以一節之峻俾近天日之光生死肉骨之恩至深至厚非臣糜殞所能稱塞義當奔命引途豈應少緩而臣衰病日迫志意瞀昏誠恐無以上副眷知遂瀝懇私乞賜追寢成命今來疊於疾置被奉聖㫖趣行而臣稽違詔令罪將無赦夙夜震懼若無所容臣已於今月十四日力疾上道迤邐前路聽候指揮臣無任戰灼之至謹具奏聞謹奏為病未及朝見奏知劄子臣近䝉聖恩除臣提舉萬壽觀兼侍讀臣以疾病餘生愚陋朴拙自度無以稱塞睠知夙夜惶懼嘗瀝懇誠乞寢成命而九日之間兩奉詔書四次被受御前金字牌降到聖㫖指揮催促起發念方陛下戎輅親廵之際在臣子之義迫於嚴命不遑安處遂力疾迤邐前來已次行闕然臣所患左足筋攣之疾痛楚呻吟至不可忍㳂路服藥調理尚未全安有妨久立欲於門外將息一兩日趁赴朝見臣無任戰灼之至謹具劄子奏聞伏取進止辭免除同知樞密院事劄子臣准尚書省劄子正月二十一日三省同奉聖㫖除臣同知樞密院事仍降中使宣押赴院供職者聞命震驚罔知所措竊以輔臣之任國論所資况當用武之時尤重本兵之寄欲贊能事冝得偉人庶協成謀用戡多難如臣資材凡瑣性識瞀昏智慮不足以度萬事之冝權略不足以應一時之變頃䝉聖奬擢與政途昧於謀國已試無能久冒殊榮曽微薄效陛下略其碌碌尸位之罪察其拳拳憂國之誠得請外祠甫踰旬月遽頒召節趣侍經帷既獲望於威顔即再申於愚悃覬收蹤跡復返丘園豈圖異除薦及庸品承命之次顫汗憂惶臣疾病交攻衰殘日迫儻或更叨委任必誤睠知伏望陛下特軫深慈追還成命疇咨人望用厭輿情庶資經濟之謀以成恢復之業臣無任懇到廹切之至謹具劄子陳免以聞伏取進止辭免除知樞密院事劄子臣伏䝉聖恩除臣知樞密院事聞命之次跼蹐靡安伏念臣頃以至愚極陋之質久汚近聯績效無聞退安散地聖恩記録遽有經筵之召扶持疾病甫及造朝亟被詔除進陪右府而臣已試無狀瀝懇再三天聽莫回俯僂就職方欲勉竭駑鈍少報萬分而才分所拘未有尺寸之效內懷慙懼背若負芒忽䝉超遷莫測所以驚惶顫汗無地自容陛下之恩遇臣過厚而臣所自揣素不知兵既無䇿畫仰贊廟謨又無事功下厭人望冒處機衡之地已為非分而居位未幾復此叨逾歷尋前修未有其比天下公議其將謂何必至顚隮重累國體伏望陛下廓天地之照察螻蟻之誠特軫深慈追還成命俾臣仍舊職任夙夜黽勉庶幾萬一或能少副陛下責任之意而臣之罪戾亦恐得以少寛不勝幸甚謹具劄子陳免以聞臣無任祈哀俟命迫切屏營之至取進止啓代賀帥臣平冦啓二首帥旗爰舉計出萬全賊壘既平功成一戰吏復專城之治民還按堵之居和氣遂充驩聲頓溢伏惟某官胷吞萬象心貫兩儀誠節著乎朝端威名行乎海表龍韜决䇿廟堂推必勝之謀虎帳運籌彛鼎載已成之績憤無知之狂冦干有赫之明威慨然請行期以奮殛具嚴師律靡須遺鏃之勞克定侯藩俄靖入郛之警屈此羣醜釋其下人使恩信之兼施知勲庸之益大顧惟弱植獲佐偏州覩捷奏之交馳激懦衷而竊抃陳師鞠旅既燀威靈折馘執俘遂平冦虐悉復藩垣之治用昭帷幄之謀慶溢人神驩均遐邇恭惟某官忠存衛社業茂安邦威加草木之微信及蠻夷之逺辟國百里嘗叅總於戎昭教民七年因繕修於武備舉無遺䇿動有成功屬鼠竊之貪饕命鷹揚而翦滅果慿勝筭亟正嚴誅一空逋藪之羣永息潢池之盜事皆按堵民乃奠居建大將之旗徃既侔於伐蔡仗元戎之節今復類於平吳允集茂勲冝膺殊奬佇觀英衮之就拜庶慰高牙之請行乃眷偏州實臨孔道欣覩奏功之日幸臻徹警之期抃躍之私倍萬常品代漕臣謝冦平除職啓轉餉千艘初無異績賜書一札遽有横恩籍通内閣之嚴名竊外臺之重是為踰分祗以起羞竊念某遭世聖明奮身踈逖洊被乘軺之選悉縁推轂之私自去東州朅來南土適冦攘之竊發㑹師旅之並興已責薄征詔必深於恤隱蒐兵筭食法又戒於愆期懼心計之弗充念力行而勿憚迨聞捷奏仰寛顧憂底藩維之告寧皆帷幄之制勝罪逃逋慢災已免於求魚命出超踰夢輒因而分鹿靜言忝冐備見矜憐此蓋伏遇某官亮節立朝深誠許國有容徳乃大包賢否於嫌名光堯中不私物亦公置是非於度外顧未遺於下體茲不壅於上聞致使孱微亦叨甄録某敢不誓修乃職圖報此恩食蘗飲冰將益堅於操履飛芻輓粟何敢誤於使令代賀人得郡啓伏審就被帝綸改臨侯服先聲所暨衆志已孚共以某官行配古人名滿當世汪洋徳量韜玉海之千尋卓犖詞源㵼銀河之萬丈蚤由簡注寖歷清華薦乘使者之軺爰正儒宗之席斯文所託吾道既行載在典刑尤以老成為重溢為吏事皆其縁飾之餘是膺師帥之除用壯藩垣之勢顧惟弱植久仰崇規兹獲佐於下風實使償其素志依歸抃躍倍萬等倫代賀兵部尚書啓伏審䟽恩內朝正位右省推政本於天下綂兵權於禁中國勢増崇輿情恊慶恭以某官配古遺直為時老成清忠格於天淵沈謀驗於蓍蔡器優大受文武唯所用之德合中行左右無不冝者逢辰熈洽歷位髙華欲加澤於斯民力告猷於乃后霜臺峻峙歎松栢之後凋天路廓清見藜藿之不採俾周旋於從槖示登進於公槐爰陟夏官進司武部上意所注正想聞於履聲僉論攸歸茲願嘗於鼎實某早登驥坂久去龍門莫遂趨風長恨一涯之隔迨茲承命第勤三賀之私代賀中丞啓伏審茂膺宸綍榮總臺綱除音下傳士論胥慶恭以某官爽邦巨哲名世碩儒道積於躬固絶磷緇之變義陳於色曽無吐茹之嫌志欲有補於時言皆不詭於聖自結上心之眷倬觀吾道之行慷慨百為夷險一意迨被賜環之召益敦前席之知更直掖垣共推敏翰冠登學省獨號純師屬中司之久虛委專席而顯拜絳騶分路已崇堂陛之威白簡飛章必識朝廷之體即期柄用彌峻巖瞻某逺跡崇閎庇身支郡莫預拜塵之列但馳賀厦之誠代賀林中書知揚州啓伏審誕揚休命就起宗工總秘殿之崇資控中都之巨屏巖瞻所逮輿頌惟欣恭以某官道濟寰區忠存社稷殊勲光於盟府舊徳冠於公朝凜凛格言常破萬人之浮議堂堂壯節自讋四夷之野心名家獨冨於文章餘事兼資於翰墨周旋滋久左右具冝遂符夢卜之求早預機衡之任一心一徳聳表儀於百工嘉謀嘉猷大䂓摹於四海方需正席孔樂均休復辭管籥之嚴歸踐林園之勝上心彌簡民望益孚大纛髙牙復壯藩維之勢命圭相印即還輔弼之聨斯言有期指日以俟某猥繇使事阻望台光聞天上之除音唯知舞蹈望日邊之歸路預切瞻依代人與尚提學啓絳帷䆳宻横經嘗列於下陳金節光華歛板復叅於前導何幸師資之舊輒居部屬之餘喜溢心顔榮生步武竊念某天資至昧人品甚微拙如吐墨之魚勤類蝕書之蠧十年太學功屢失於幾成五郡泮林身更同於歷聘昨假鄒君之館適留吳㑹之區嫌名光堯中之地許游繆因志鵠户外之屨常滿特俾升堂侵尋歲月之賖蹭蹬功名之會猥從世禄羞負已知鼓餘勇以當方銳之師出遺筭以雪累戰之耻技已殫矣幸而得之從新進之衣冠號貴游之子弟嘶風志在雖知塞馬之還望月心驚殆有吳牛之喘徒以為貧而仕豈能擇地而安來掌市租實司津鑰坐念塵容之抗益負初心聿瞻星使之飛庶償大願伏惟某官心源卓犖才刃縱横聳野鶴之竒姿肖石麟之異稟胷吞萬巻居有儁聲氣壓千人徃無堅對未陟禁塗之要聊從使傳之榮會殿最於列城職髙論秀分涇渭於羣吏任劇廉能顧惟虚薄之資夙荷作成之賜矧於此地辱在所臨雖不能戴劍分庭干部使者之譽或庶幾摳衣造席執門弟子之容代人轉官賜第謝宰執啓比膺帝睠亟進官聨仍拜賜於芝函遂登名於桂籍寵光横及感涕交流伏念某性昧知方才踈適變少而遊學不能收埸屋之功晚乃遭時已叨塵侍從之列荷大鈞之曲造懼小器之疾顚每究勤劬勉圖稱塞技已窮而難彊力弗給而易疲至如餉饋之薄勞乃是轉輸之常職俾之增秩固慚恩數之優假以决科更使品流之異自惟何者獨得兼之此蓋伏遇某官道濟寰區功存廟社削除醜類既恢經武之圖旌別群材更助右文之化故捐殊賞以賁微軀某敢不竭節奉公推誠享上謹邦國貢輸之備識朝廷法令之冝庶幾此心何敢云報代謝除發運啓誤膺詔㫖陞總計權顧名謂之加隆揣事功之靡稱寵榮所逮慚懼惟并伏念某井谷地寒蜩鳩才小出遇明良之㑹擢從冗散之聯寖被躐除濫當將漕雖百骸盡瘁訖無足國之深謀而一意首公徒有愛君之大節比更再歳遽閱三遷心已愧於超踰力方圖於稱塞更叨異數就進崇資狎承旒扆之恩黙識陶鎔之自此蓋伏遇某官精忠冠古端行表時言為社稷之逺圖動合國家之大體高文碩學雅推多士之宗明德茂勲益著百僚之望遂於踈逖亦不棄遺謂其既塵清切之班使之増重光華之任敢不恪遵乃職期副所䝉誓畢餘生已作報恩之計庶幾薄效不辜責實之朝代謝轉官啓入告元勲已誕揚於顯冊徧行殊賞乃横及於微軀亟被恩言徒懷感臆伏念某起從踈逖誤玷選除寖膺寵數之過優每愧器能之弗稱頃縁移使方屬整兵峙乃糗糧偶無餉饋之乏于彼原隰與有馳驅之勞蓋職分之當然顧事為之安在驟叨増秩罙懼罔功此蓋伏遇某官威格華夷志存廟社憤兇徒之竊發出妙略以請行運籌帷幄之中旣空蟻聚還師袵席之上爰振虎臣遂軫念輸將之勤亦聨名慶賜之列某敢不恪遵乃職圖稱所知庻以奉法循理之心可為推賢與能之報代賀翁中丞改知杭州啓伏審拜恩中道更鎭近藩凡屬綂臨交深欣畏恭以某官才推英傑德懋中和親逢聖主之知自致風雲之會紫荷持槖久叅帷幄之謀白簡飛章悉正朝廷之體頃被天綸之渥暫分晝錦之榮克殄㓂攘用蘇疲瘵作軍謀帥方加賁於殊功視邦選侯遂改臨於大屏定見賜環之亟靡容開府之淹歸踐廟堂下澤寰海某繆當支郡行託餘庥顧惟慰幸之多豈在等倫之後代賀胡提刑啓伏審光被帝綸寵更使節威聲所底樂誦惟均恭以某官雅望鎭浮周才應變所至可紀有前古吏師之風無施不冝皆一時國論所倚比奉凝旒之對式符側席之求嘉謀適陳明命已出軺車一乘蓋欲重持斧之權細札十行恐遂趣賜環之召顧惟晼晚辱在庇庥行拜旌旗之光敢修竿牘之禮欣幸之劇倍萬常情代賀張舍人啓伏審拜恩宸陛進直掖垣休命播騰輿情欣屬伏惟某官氣蓋一世心雄萬夫煥星斗之文追配作者起雷霆之譽蔚為聞人有連中八科之名無紛亂諸事之誚蚤從麟閣盡讀未見之書旋列螭坳更著不刋之典蓋善為訓誥誓命之煩悉必能道徳意志慮之精微果被顯除遂居華選靖共一節共識傳昭之古風通達百為當問崔琳之今事嗣觀綸綍之出趣預廟堂之游某蚤辱論交茲聞得位上以贊朝廷之喜下預有鄉閭之榮代賀韓舍人啓伏審近奉制函遂登辭掖人望所屬士論為榮伏惟某官諸儒楷模三代豪傑揚雄於蜀本著書成後世之名馬周入關因抗章言天下之事襃語一下英聲四馳蓋不為世俗無用之文則已識公輔有為之器其間流落公言謂何及此選除上意决矣然以辭令贊書之任而付討論潤色之才此優為之何足道者一時製作孰能居蘇賈之先他日設施自當在常楊之上某預㳺滋久聞命甚休睠江湖之一麾阻門䦨之三賀忻懽素志倍蓰常情代賀宣撫啓伏審告廷明命復位元樞嗣開莫府之嚴遽捨安車之佚事關國體喜動民情竊以塡撫四夷爲上公之任典䕶諸將乃元帥之權去就之間重輕所繫故師連西海彊衛公之一行而冦警朔方頼長平之復出勲盟既固史牒用光恭惟某官位冠宗工望隆元老攄尊主庇民之志成開疆辟土之功鷹揚四方鶚立一世威稜遠憺顧草木之皆知忠列具存冝藜藿之不採頃縁振旅因欲奉身上心雖憫於獨賢輿論已知其復用果承溫詔再撫全師蓋邊陲無折箠之勞則宗社有覆盂之勢虜謂吾父當厭難於階楹人歌我公即還師於袵席斯言可必萬口所同某辱在播鈞喜聞推轂徒以一麾而出守莫陪十乘之啓行抃躍私情倍百常品代賀太宰啓伏審告廷坦制正位冢司百辟具瞻萬邦胥慶竊以歷觀論相之重深識守文之難終寧考之圖功時方紹復條先帝之故事自足施行乃登用於舊人以付畀於大政務飭治體不求智名恭惟某官盛德庇民殊勲冠世蚤收四海之問望更練三朝之典章上所注懷從甘盤之舊學國有决議咨方叔之壯猶直道事君正色率下備受大臣之體貎綽有故舊之風流衮職既虚巖瞻彌峻遂定金甌之卜首居玉鉉之聨華夏系心方資霖雨之澤搢紳屬目共仰中台之明某托命洪鈞庇身支郡逖想雲龍之㑹阻陪鳬藻之歡抃躍之私名言莫既代賀少宰啓伏審讀命路朝正儀揆席眞儒登用庻類昭蘇天下幸甚竊以聖賢之相逢本由天地之交泰爲時而降非人所能選於衆而舉臯陶雖曰疇咨之命審厥象而得傅說是爲帝賚之祥自昔傳聞於身親見恭惟某官柱石王室股肱帝躬身繫朝廷之重輕心關宗社之休戚開拓萬里成超今冠古之功敉寧四方致尊主庇民之業道洽政治謨明弼諧使邦朋之寖消識國是之素定遂符夢卜進摠機衡必將盡行平日之言然後散爲天下之福轉洪鈞之一氣時適純熈安泰山而四維邦其永固某叨分郡寄逖聽除音外與驩謡慶雲龍之㑹中懷美䕃賀燕雀之私抃蹈既深輸冩奚既代潁州王待制謝執政啓馳驛再朞偶逃吏議分符千里又玷國恩控畿甸之上游卽溪湖之勝踐過客稀少絶厨傳將迎之勞居民雅馴無訟牒剸裁之冗筋骸就佚顔靣興慚伏念某奮身孤平逢世熈洽偶縁奔走之薄效遂偕侍從之榮班然最下之考累書當有餘責而至愚之慮已試實無他腸仰荷廟堂之知俾叅禁密之籍未收績用更以名聞付之牧養之權遂此便安之願此蓋伏遇某官佐佑眞主師保羣黎明德茂勲已濟登三王之治深謀至計更成一六合之風旁求心膂之臣出守股肱之郡有如庸懦亦冒選除某敢不勉勵夙宵恪修職業期稱責成之政庶遵畫諾之䂓代賀右丞啓伏審寵拜制函進登政席四方引領百辟傾心伏惟慶慰恭以某官學贍儒宗才髙王佐昔在隱約公輔之望已隆乆於禁嚴神聖之知益簡豈惟擅燕許之大筆居常罄稷契之忠言天日下臨風雲交㑹議已馳於域外禮遂絶於坐間立太平之基方播鈞以成萬物開衆正之路將築館以待群材自省微生竊叨大化懷守臣之紱坐閱歳時掃相國之門動形夢寐依歸抃躍倍百等夷為户部葉尚書回諸路使者啓比者誤膺詔綍叨摠計庭蓄藏刓弊之餘九征多闕調度經常之外百費交興揣緜薄以奚堪冒寵榮而更懼豈謂某官過持謙柄逺賁慶函敦意愛之周旋粲文辭之曲折光華所照衰朽爲慚念王室之孔艱倚使臺而甚重舟車並凑方資指畫之勞門宇相望猶阻瞻承之便感銘徒切敷叙曷殫代謝還任啓罪當遐棄方解組以去官恩許終更復旋艫而就事召驚魂於一夕九升之際收渙汗於終朝三禠之餘喜動親顔寵孚民聽荷旒扆廓乾坤之施不求其初念門牆矜簪履之遺乃至於此捫心惕若攬涕潸然伏念某弱植易摇駑筋難彊頃從使傳誤被詔除延閣通班假一麾於南國故鄉在望足三釜於北堂徒黽勉於夙宵但糜捐於歳月蓋投閑置散者分所當得而撥煩剸劇者才豈能堪積此叨踰至於汰罷上累藏疾納汙之徳中懷省愆念咎之疑或謂他腸此所告者過也自憐孤迹誰與改而正諸詎意台光下臨蔀屋皆照致膺申命獲返故棲此蓋伏遇某官莊重鎭時髙明拔俗英文敏識本三代儒學之宗忠言嘉謀亦一時國論所倚居然眞輔相之器綽有賢父兄之風民皆系心上已注意殊庭澹漠叅九華妙㑹之先清禁凝嚴列五閣英游之冠然猶吐握下士寤寐招賢愽收豪傑之才共佐光華之旦就如艱拙亦在記憐務盡掩於過差使曲全於終始某敢不堅持一節力報萬分無它技能愧承乏江海之上不相背負誓託命鑪錘之間感激罙深喻言曷既沈忠敏公龜谿集巻第八終
