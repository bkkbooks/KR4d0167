  text: 沈忠敏公龜溪集卷第一
  hash: sha256:a9e6fda0515d5caaa691d82685f877af8591775e20f04da1b89830c2c87a2f15
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0167_SBCK_001-1a}
body:
  text: 古詩山西行山西健兒好身手氣如車輪膽如斗十五射獵少年場戲格黃羆同拉朽二十竄名尺籍中鐵馬追風快馳走臂弓腰箭了一生只喜論攻不論守兵符夜半出轅門將軍令肅誰敢後自誇豪健天下無誓為官家掃群醜蠻夷共事古來危監軍巧落胡人機黑山未靖黃河沸胡塵倐忽連紫微長驅中州斥候絶巳聞飲馬金明池种家猛將忠貫日髮上衝冠頥指揮主辱偷生事不武壯士裂眥爭相隨東跨潼關逹上國城頭夜插將軍旗諸胡下馬拜吾父請成退舍才有期肉食謀國帝子質勒兵不動護送之壯士束手猛將死胡來侮人猶小兒明明二聖堯舜主天翻地坼徒爾為天翻地坼徒爾為北望血淚滂兩頥真人中興似光武赤睂靑犢折箠笞一呼奮擊肯效死風鶴尚信驚王師嗚呼何為背征討紅帕切莫轄兜鍪半為盜東家昨夜虜小姑西婦朝逢握刀笑錦衣玉食事奢侈翠睂紅頰資強暴黃屋今懷旰食憂忍與豺狼活蓬藋時危冝爾悍且驕側耳試聽哀痛詔五陵佳氣自蔥蔥為雪大讎安九廟次韻劉殿院贈錢圃翁少日從畦丁頗悟園官理菘韭記春秋蔬食聊爾耳十年困塵埃幽事同脫屣一飽不可謀淸瘦只如此仰止長城翁趣尚兩奇偉弱冠事筆耕俯仰行六紀晚以圃自娛扶鋤寄深喜柔風蔬甲怒細雨蘭芽美小摘定可供餘事不挂齒那復肯著屐而一到城市為計一何疏行須傳高士木茹忌太潔肉食忌太鄙安得從公遊遠傲於陵子遊玲瓏山因訪朱氏草堂平生丘壑心餘事不挂目藜杖南山來要使富幽矚異哉小玲瓏蟠峙蒼辨腹修藤結懸崖飛溜響空曲伏石臥虎狀騰拏雜奔鹿砑然㸦吞吐側路劣容足拂拭古蘚紋字刻翳新緑標榜玲瓏名竒怪殆天屬捫蘿上絶頂坦坦類平陸俯首瞰來蹤穹然在幽谷傳聞昔逋客誅茅此營屋淸魂不可招千載想遺躅我思造物巧妙供幽人祿揮斤役山祗斫此一拳玉雲窗與霧閣一一相亘屬豈無部曲衆猿鶴即更僕豈無節旄貴松檜自張纛此事久棄置蛛絲網巖麓翩翩佳公子心古韻不俗駕言脫華簪茲焉卜幽築終日靣巑岏世故豈容觸指點空洞姿喜氣政堪掬挾䇿校昔遊健步念須續亦有招隱詩薄暮不可讀奉陪安守登膴原觀江南多佳山駢首闖城郭𬗟懷在坦夷要使一見廓邦侯王事餘幽致到丘壑散䇿占城隂含睇及民瘼愛此郊原平膴膴冨耕穫飛觀倏下臨丹碧蕩霄堮野色四座浮胸次濳領略千畦雲弄黃歲事初不惡斗酒行勞農歡謠入酺醵勝地惡發揮波神覆為虐蕭辰誰與娛一笑寄華酌落日耀旍旗輕飆漾簾幕卷白起夀公歌聲渺林薄老農止勿狂嗣歲有真約觀網魚暗雨埀埀梅欲黃春山吐源春漲狂雪鱗頳尾泝流上吹濤噴浪能奔忙魚師布網名白大萬目井井連重綱聯艘絶流勢甚武遮羅初若無留藏大魚巳得小魚棄要使遺育充陂塘鰥鮞安用誤回避蝦蟹亦復虛跳梁寧知不比綸索手欲以巧餌空滄浪子修步屧相過屬疾不能倒屣戲贈簿書日在手佳思挽不留而能痛撥置時來訪淸幽古木占城隂一曲縈寒流落影插淸泚緑蔭亦巳稠結亭坐蟠石傲兀忘拘囚雄談功名外俊氣橫九州事故未應爾長恐坐阻修造物小兒相妬我得暫休河魚竟中潰午枕猶扶頭雙鳬飛舄聲歷歷過牆陬此興豈復淺何當起從遊試令開丈室子能問疾不寄題淄川王景發肯御名光堯堂深林藝松柏不數櫟與樗坐待十畞隂等為匠氏儲寧復知種德責報不厭徐名令後必大善積慶有餘於焉望豐屋政可增修閭王孫世東州奕奕盈簪裾金埒通里巷珠樹連階除賢哉景發甫爽爽衆莫如直氣薄霄漢妙語鏘瓊琚定知磊落人一見懷抱攄謂我架華堂映發先人廬揭名取肯御名光堯蓋念經營初堂前植桃李堂上羅詩書桃李意取適詩書計非踈諸郎自蘭玉舌耕起災畬吾詩以為針會見聯高車何子楚為范明倫賦九疑石石吾不及見也讀詩可以知其巑岏秀峙之狀吾纍卞峯石為小寒林興寄不淺用其韻並及之峩辨千峰倚天碧上有修筠材可􅐟月明三弄靣巉巖驚起哀猿啼峭壁兒童斫石攢靑瑤寒林蕭蕭吹墮樵坐令結習落幽夢芒鞋竹杖歸路遙覺來隻影徒相守哦子淸詩筆如口眼中何必小玲瓏仿像九疑當户牖神丹已失大江漘誰與安期追後塵分天隔日不可到使我目斷蒼梧雲次韻題沈傅曜瘦節堂平生一字不療飢誰云粳核能瓠肥牙籤玉筯五鼎食是中有趣非錢癡萬事顚倒絶可嗤此腹却受將軍譏吾宗酷似騎曹掾俗物紛紜那復看眼中但有瀟灑侯高節亭亭真老伴山澤形容坐一癯相要檢校還丹書食薇飲水笑多事知君此計誠非踈劉行簡見借詩稿以長句歸之文章偏忌聲名早冨貴政須門第好了知二物不相關風月膏梁兼者少劉郎天韻真不凡飛騰冝在蓬萊島年來窮愁已到骨只有珠璣落殘稿紛紛餘子何能追定向詩壇分六纛造物小兒亦薄相浪付繁華給揮掃却令徑坐詩人窮只與淸泠消熱惱向來狗監非同邑渴盡文園尚傭保九原千古忽可作如君自是不枯稿茅齋夜誦誰得聞咄咄空能訴穹昊請君更作升天行勿使貧胡強知寶送章文虎秀才歸荆南我生本吳儂搦筆追楚些佳人脫塵屣幽韻耻獨和君家楚江湄詞語亦頓挫學海冨探討渠數百紙過春風歸鳳城櫑具恰解馱此地初識君細語輒三賀冉冉歲巳遒雲山憶高臥翩然理歸裝餘事等棄唾文圍久堅壁定恐一戰破行矣儻復來慿將楚詞課次韻曾守懷玲瓏山泉石有膏肓料理費和緩風埃客子遊夢想略相半端如饜羊酪投匕念鄉饌懷哉小玲瓏舊賞記酣宴玉女下雲窗輕我年未冠誅茅老三間此意已懸斷少須草堂資兩足那可絆謝公愛東山自結尋幽伴詩筒忽相先紙價豈容賤流傳從使君感此歸思亂擷蘭躡危根潄石俯長澗野性等麋鹿百嗜寧食薦攬衣中夜興測漏疾流眄扃步愧駑筋卑飛傷短翰正使屐齒折未救斧柯爛時節脫復徂遲莫空浩歎何當脂下澤去路鬱交貫何亨老築堂里第榜曰安虛蓋取司馬子微不受外不逐外之説屬某賦詩以見意云幻境如群狙喜怒眩名實憐渠千劫迷墮此一念失世路波濤翻時事風雨疾胡為隨物遷坐此方寸窒使君超世姿軒裳起儒術神交赤城仙妙解窮隱密向來心泰然初不計升黜危堂榜新顏要以名自律窗扉敞深明空華亂初日變滅驚須臾蔽虧隔纎悉了知內觀融天光發虛室山林猿鶴儔廊廟鵷鸞匹靜躁塗或殊出處心本一淸都五城開真仙羅輔弼行矣朝紫皇啓沃造前膝功名戲劇成志願談笑畢它年容買鄰儻不傲蓬蓽次韻何子楚食櫻桃輕衫駿馬飛彈丸上林花開紛繡團御厨賜筍未解籜山櫻亦復登金盤秦中嵗時記櫻筍厨事見宗廟薦新勤玉路凡果紛紛不論數風淸日美雨絲收朱實烘春燃緑樹筠籠採擷價萬錢北人羊酪雅所便自從燕罷曲江曲賜櫻桃燕故事進士五湖十載身回旋已作孤蓬任流轉萬顆徒勞野人獻故無淸夢大明宫醉倚酡顏浮玉碗擬古日月雙高懸朝昏自升沉有如轉轆轤引絙環相尋而我生其間所閲幾古今爾來三十年又作裘氏吟眠飯寄編簡此身疑白蟫皇皇走四方誰是真知音語欲離舌本退縮翻如瘖涉世聊爾耳依阿亦何心託質既巳迂自謂百鍊金耻作渭水鈎寧為太阿鐔用捨安所之齒髮忽已侵日月不我留澘然涕盈襟次韻黃子虛同飲葛次顏家釀玉友先生早年忘掃白懶飯青菁借顏色獨餘歡伯為友朋熟不暇篘巾自瀝何須引泉連百井飲若長虹太豪猛細斟玉筯滑無聲酌我應憐官獨冷奇篇更寫陟釐黃逼人心地生淸涼了知二事盡家法眼饞徑索銀瓶嘗我老華池少滋液年來愛酒如偷蜜陶然一醉樂未央此外要知俱長物相期徑造君勿違坐得名勝從忘歸公侯似聞倦設醴穆生正恐同分攜次韻李元叔田邦鎮唱酬之什李侯少年真自喜收名擬擅東南美大科異等不作難堂堂奏賦明光裏眼看斗粟飽侏儒空腸殷雷歸著書胸中未減食牛氣出手一擲當成盧只今聊問復何如入館李比要辨蟫蠧資軒渠剌頭文字亦瑣碎澤吻快意回焦枯大雅寂寥誰發喜逆折波瀾須子美晚分一派大江西約束曹劉歸句裏武安耳孫有臞儒載行無多一束書蹇驢破帽踏城市腰間蒯緱鳴湛盧呌閽自薦久未偶淮南叢桂猶關渠雕鐫戲出鄉學餘掩靣笑余詩井枯讀成士瑴詩卷和其書事一章長年賦子虛狗監絶同里杯水聊自酬博此一笑喜副墨粲我前頓使百廢起朱絃渺遺音名御勿娛俗耳論交儻自今相從期暮齒錢塘賦水母疾風吹雨回江城櫓牙嘔啞潮欲平客居喜無人事攖相與環坐臨前楹眼中水怪狀莫名出沒沙觜如浮􅎆復如緇笠絶兩纓渾沌七竅俱未形塊然背負群蝦行嗟其巧以怪自呈凝目悚視相將迎老漁旁睨笑發聲曰此水母官何驚江流如奔絶滄瀛潮汐往來月為程藏納衆汚無滿盈浮埃沉滓溷九清結成此物冝昏盲使蝦導迷作雙睛乃能接迹蚌與蟶亦猶巨蛩二體并離則無目為光精江天八月霜葉鳴罟師得蝦供水征水母棄擲羅縱橫試令收拾輸庖丁絳礬收涎體紆縈飛刀鏤切武火烹花瓷飣餖粲白英不殊冰盤堆水晶稻醯韲寒芼香橙入齒巳復能解酲遣漁止矣勿復評嗟哉此性愚不更定矜故態招三彭且摩枵腹甘藜羮泛舟村落阻風不能少進而菱梢芡觜繚舷上下篙人病之艇子掠岸行水瘦不濡尾狂飆振踈篷獵獵鳴兩耳十篙八九褪逆勢何乃爾野芡伺吾間回梢哆利觜亦有芰浮角一一肆輕鄙初欲事幽尋解纜出踈葦乘流覔清淺濯纓助深喜事有大不然移頃未離咫安得望蓬萊巨艦破潮起征帆駕長風一日三萬里夜坐感事沉沉夜氣歸虛堂閉深寂孤燈灺餘花寒霤韻殘滳醞釀萬斛愁感槩一人敵何當棄短檠隂山叱鳴鏑戊申初寒偶作去年十月冬猶溫單衣曉出錢塘門攜孥僅脫餓虎口更吟楚些招驚魂兒女爭從亂離苦咿啞繞膝多語言舟行畏塗侵夜泊孤燈明滅何處村蕭蕭細雨踈葦響風力漸搖枯柳根失聲號寒泣龍具促棹傍險爭前奔還家依然四壁立故衾敗絮那忍論無衣豈暇具裘褐海國坼裂波濤翻天公戲人亦太虐雪花徑尺連上元今年十月事羈官兩腳如舊身大存紙窗寂歷風竹嘯古木中夜號空園旅人不眠毛骨冷撫事念往多煩冤吾儕小人不論數豺狼滿目哀王孫似聞易水寒墮指北望大漠煙雲昏安得壯士馭八駿沙蟲猿鶴俱騰騫歸歟莫如中土樂天子孝友朝廷尊坐令鐵衣掃蟣蝨四海挾纊懷君恩十里巖石壁巨靈手擘青瑤璞平削無痕看斧鑿六丁取將天路遙雷電收威半空落至今崒嵂橫道旁絶壁萬仞青茫茫倚天屹立不可近下視培塿如群羊蘚花斕斑風雨漬藤梢夭矯蛟龍戲中開微竇走鳴泉白虹吞吐氣泉流萬古潭水深山寒無風鬱沈沈下田納納禾稼茂發源溉初何心峭直誰令據當路松柏蕭森半煙霧猶恐夜深魑魅驚更遣山靈謹呵護夜書山驛天寒夜向闌月出山更靜風露搖青空萬象光耿耿啼螿泣幽草賔鴻度前嶺歸來坐孤窗松竹舞清影績溪寨口青嶂插天塹白水翻地軸回環壯哉縣不許飛鳥觸往年羽書馳盜發清溪曲先聲雜妖幻餘黨萃符祝控攘最旁近被害良慘毒聚落燼煙空生齒塗炭酷豈無山川險會有法令束百年不用武駢領甘此辱至今風雨夜猶聞鬼群哭遺俗感舊憤禦盜勇氣足大兒佩刀劍小兒利鋒鏃老翁筋力衰奮梃怒張目營寨人自戍不待官期促矧今天驕橫灑涕國步蹙豺狼據道路虎兕出林谷儻持復讎心公戰圖報國聞招冦緑林煽餘習無乃國計左誨盜爵秩崇納叛金繒夥戢姦在斧鉞賞誘詎云可萌芽緩誅鋤猖披費結裹戰多數招安奚用腰箭笴悍兵昔巳然黠將近亦頗昌言假報國涅靣剌投火豺狼奮哮噬蜂蠆利掀簸橫行入通邑焚掠窮委瑣况聞南陵冦執事初意惰出沒勢巳張翦滅計未果宣城俯百里千室盡奔嚲王事吾有程馬頭戴印顆叱馭疾其驅語言紛炙輠何當説羆貅一洗根本禍寧國道中山石犖確行路難山風蕭蕭吹早寒十步九歇僕馬瘁兔蹊鳥道窮躋攀崖谷空籠瀑泉走碎玉零亂飛前灘石堤捍水幾百級落處疑有蛟龍盤兩山之間開畎畞石罅著鋤那得寬前村後村煙火冷土牆茅蓋常掩關我行不知記近遠官遊歲晚良自歎豈如家家一飽外雞豚社酒相追歡那知亦有簡書畏里胥剝啄驚顏夜宿千秋嶺下田家隂壑來悲風薄莫吹急雨冥冥攬寒色咫尺暗山路茅􅉉兩三家曲澗縈竹塢停車遣問訊欲止此何許老翁行步弱扶杖倚門户問我官何忙野宿今無所向夜號狐貍深林嘯豺虎甘心在擇肉闖首輒慿怒駕言往何之一榻翁敢拒延我傍中堂殷勤慰良苦解衣土銼旁支枕憩行旅昏然飽安眼境寂絶猜怖雞聲報明發征車犯寒去呼燈別老翁鼻息方栩栩溪上見梅睛溪漲淥如隂苔晴山插影相低回畫船疊鼓順流下波光浩蕩征帆開灘縈岸繚柂牙轉水石相激如奔雷須臾已復過絶壁歸路漸近嚴陵臺山重溪復境彌逈暗香忽自空中來日斜正見叢棘外炯炯疏片飄寒梅槎牙一種獨愁絶含情不語明巖隈凌波疑是水仙出縞衣素質行徘徊下窺清淺一笑粲坐使凡卉俱塵埃山谷之儒已臞甚龜腸鶴骨世所咍相逢頓覺百憂釋不嫁春風誰與媒舟行易遠空回首角聲吹夢心悠哉次韻張仲宗感事諸侯救周衰能事存筆削後學競專門膚引迷注腳寧知懼賊亂誅意未為虐上皇志包荒大度示恢廓誤墮虜計中九廟施箭鑿將臣擁強兵首鼠事前郤專雄懷顧望散黨失歸著坐令兩宮車北轅狩沙漠天王紹絶統憤此國勢弱嘗膽復大讎此意良不薄向來督真姦國典猶闊略群公爭護前循習久彌確黃屋泛滄溟黔首寄矰繳世無管夷吾老眼雙淚閣何當誅賞行浩歎成嗢噱大明還中天冰雪自銷鑠次韻允迪祕監同年所寄會稽唱酬之什秋鴻度寥廓天遠勞目送燕雀各有謀墮此朝餔供平生江海遊往事恍如夢簪裳強結裹翰墨困嘲弄一官冗不治匹馬旁無從迷行落小劫直意識大洞似聞脯麒麟頗欲翳鸞鳳眼無行祕書此語誰與共貧知世路艱老覺交情重功名等戲劇射覆偶微中龍媒駕鼓車款假朱絲鞚南遊探禹穴聊得登覽縱時危要奇䇿塗窮勿長慟相期論少卑材大古難用鄭維心約趙安道中大家兄次律學士及僕探梅城山乘月泛舟而歸窮居不厭車馬絶委巷衡門常晝閉朝來剝啄誰過豫倒屣逢迎走驚蹶里中勝士真可人為憶寒梅耿殘雪招呼聞早探幽芳平溪徑遣扁舟截西山佳處雲塢深松竹蕭森迷洞穴上方小閣鎖空明開窗下見千山列畫手無人貌平遠野闊天多供一瞥冰花只作小寒枝拄杖不辭穿巀嶭野僧省事畏客狂攀援自向南枝折踈香低入坐中來骨冷肌清伴高潔襟期况有公子賢伯也雄豪負奇節手拈凍蘂薦深杯妙語琅琅契禪悅人間此會不多有忍放杯空成小别歸來懷抱與誰論一棹翻然載明月臘月二十六夜大雪投曉霽色恍然鳥語啁啾便有春意感而賦之黃昏雪打窗夜雨破幽夢晨光逗􅉉花霽色恍池凍老木驚向榮好鳥發微哢草根露纎芒蟲聲試群哄空畦土勻酥側澗泉流湩臘盡殺氣衰春歸生理共人情自多端天意皆曲中懸知造物公未厭萌區衆艱難重時節俯仰疲迎送心間數造化骨寒遭鬼弄那驚梅柳新但飽藜藿供行須過田家泥飲空社甕次韻葛魯卿送示近作一通二首八騶盡屏如縈䇿微步招尋老賔客離離草色亂溝塍腳底春風隨蠟屐蟄龍昨夜起洄潭忽雷閃電飛千巖朝來遺珠落懷袖復見國風歌二南公洗膏肓砭傳癖詞伯儒宗蚤揚歷詩成聊復貯錦囊副在久應藏石室只今漂泊客煙村高哦七字哀王孫有如此言公不食東山那得留安石濟時之志公詩慨然有君侯胸次多籌䇿歲晚翻為江海客小隱方營一把茅景山而作公詩為結屋幽尋定費幾兩屐公心落月印寒潭出濟巨川歸築巖追還正始遊戲事聊為風騷作指南我有幽憂如酒癖起誦君詩春寂歷天公下取氣凌雲神物護持光滿室老矣懷歸葑上村倚公佳句譜桐孫須公拯危紓旰食快寫車攻刋藥石葛魯卿再和復用前韻奉酬上謁軍門冝杖䇿誰為兵家分主客黠虜翻乘下瀨船幽人退整登山屐山泉聞似百花潭山曲盤回十里巖丘壑夔龍人太息那將捷徑比終南吾邦舊事論三癖州崔員外詩見劉夢得與湖佳處還堪記遊歷深譏表餌誤朝廷急贊蒸嘗安廟室避地來居水繞村鳬鷖哺子竹生孫苜蓿堆盤從野食人愛當年二千石平生自愧無竒䇿魔去徑須呼逐客兀身聊欲避風塵作意何能分履屐驚魚畏網伏深潭窮猿失木號重巖殺氣漲天消息斷但想滄海浮東南囊無一錢誚錢癖鮭菜腥人今齒歷忍言走馬過章臺空駭祝雞餘土室傖父嗔儂語帶村錦心繡口拜天孫端為遠謀針肉食誰能饒舌攻牢石葛魯卿再和復用前韻奉酬聞公卜居問龜䇿隱屏畏人呼重客間招溪友鐵頭航戲躡鄰娃金齒屐舍旁修木蔭風潭坐有郎君掣電巖巳將此假慰逼仄更為岑參來巷南細説當年陳類癖釋為癖類辟顔伏閣忿爭書日歷國醫袖手藥籠空挂壁猶餘弓矢室吾州萬落與千村以葛名兒浸及孫刲羊擊豕作寒食定恐酌公忘斗石小檻觀魚呼䇿䇿來伴漁蠻作逋客風回别浦有飛帆雨濕斷堤無響屐夢回春到放龜潭潭上雜花開石巖十椽老屋煙燼滅越鳥無日忘巢南空説花驄酬馬癖豈有過都如塊歷出門咫尺行路難只辦蒼黃問家室鼓􅎏聲動何處村爭挽神器歸王孫今者不樂憤忘食奮臂擬關弓五石奉題思上人妙峰堂上人遊四方雲水渺長道一言契深心百法從此了十年歸故山不踏山前草經營妙峰堂想像德雲老閉關習跏趺宴坐兀枯稿混迹雖寰中寄意巳塵表深枝姹巖花雅音喧谷鳥翠竹伴幽禪白蓮敷衆好山空有雲歸地淨無塵掃回觀第一義湛湛孤月皎法門有等差問訊今誰曉躍身寶樓閣此堂終𥚹小維心方刋正三國史某以精筆遺之蒙餉大篇為謝氣格渾然三復感歎漫依元韻奉和蕪陋增愧諸豪雄誇劍芒銛毛錐斂避收餘尖櫝間黯黮渴銅雀案上爬沙枯玉蟾學堂山人有遺裔筆力大可千人兼掉頭不肯書柿葉酒酣起舞怒奮髯十年歸坐溪口屋傲視冠冕猶髠箝草玄草聖聊戲耳如醫識藥信手拈邇來直筆到三國去取法度何森嚴眼中青白世矜異皮裏陽秋誰顧瞻更憐中書今且老雞毛葦管爭出奩懸知入手便獰劣那復助子窮幽濳我持妙頴急送似標題珍重存華籤勢如執法貴心正俗病要以此語砭揮掃定見龍蛇走紬繹何憚歲月淹須知筆意似人意柔順未必非凶憸長樂梁世則為余言林氏達觀樓橫海嶠天下奇景也索詩為賦一章老眼紛世故百嗜了若遺忽聞佳山水未到神巳馳迢迢古長樂山水天下奇中有隱君于少讀升天詞茲遊不可遂樓居在厜㕒要欲盡一覽吞滅海嶠姿想當宴坐久遠意渺莫追定見月嶺墮洪瀾浴朝曦蓬萊蔚相向拍手招安期秀色故可餐却粒到玉芝何當往從遊下視培塿卑和張仲宗送柯田山人歸隱我家洄潭上卜鄰左顧龜中有隱君子孤風邈難追玩世逐虎鬼祈年訊蛇醫籬根縣瓠壺蔓野紛翠帷客至勿遽迎借問來者誰窮巷車馬絶杖屨得往來老儂起招呼情話真樂哉意行忘早晏佳處首重回月出一犬吠柴門風為開收還四方事老子良足哀誰為雙眼青自失兩鬢黑溪山招客子占勝淸涼國古人如可作晚歲意及是中但可飲名御勿亡酒德酒酣忿天驕驚問兵誰勒往年城下盟殺氣橫九有脫身賊中來親戚驚老醜抗言半渡擊失計推禍首誰能返秦璧爭欲仇魯酒著鞭空浪忙好語得雞口有弟在一方丹臆危涕橫念言還鄉夢遙夜懷紫荆忽興攬衣坐孤燈耿靑熒雁奴信何功捫心愧鴻冥棄置復棄置終尋白鷗盟鄭維心用張仲宗韻見贈復次其韻奉酬幽人臥南窗支床伏穹龜白墮意冥契黃庭心暗追身間有餘適國病何當醫此事姑棄置溪光挂屏帷顧影或自笑問言子從誰少日功名心偃蹇挽不來雄豪本戲耳靜樂真賢哉畏事口三緘憂時腸九回無客榻長挂有懷尊自開酒酣氣如雲高哦追八哀胸中飽世故了了分白黑十年客異縣中夜夢鄉國買鄰枕寒溪此計吾猶及大恐歲星惡翻令銷福德不如早移文徑效山庭勒浮名等浮雲過眼亦何有誰能學東鄰深顰不知醜朔風吹飛霜素色侵皓首幽憂無與娛萬事付杯酒客來勿多談要使耳如口江濤故洶湧胡馬猶縱橫健兒委戍甲老農持棘荆去年拒胡地白骨埋晶熒機權失猶豫理數歸杳冥誰如管夷吾九合先同盟次韻葉左丞見寄先生少英發身為國元龜玉堂動敏翰諸老難莫追向來三折肱舉世推良醫小試經綸才艱難佐籌帷憂時儻失聲捨我今其誰巖棲分麾去鼎食羞嗟來憂樂有大者得喪良小哉霣心驚地坼攬涕祈天回願言國步肅追理邊隙開潔身未足道王孫真可哀幻緣東即西妄境白成黑那於土偶間平地見佛國雲山樂未央歲月嗟何及恩讎一快意聲利多慙德名成復逃名翻恐鍾鼎勒胸中浩無垠冨貴公自有厭居廊廟榮戲習村野醜荒山披石林它年齊峴首殺雞侑晨炊炮羔行社酒此樂應獨知世味難可口仗馬失芻豆那顧一榻橫小兒衣挾褚老妻叉墮荆心事獨炯炯眼力雙熒熒君恩未報償浩歌託沈冥上天不難知誰能訊青盟希顏提舉博士謁葉公左丞於石林公遺之詩屬余次韻劉侯磊落人中豪半生塵土略如我酒酣氣與天低昻長笑拘儒費膏火虺隤一馬上高岡怪來喜色猶揚揚探得驪珠携滿袖明月挂空無價償夾竹桃花搖搖兒女花挺挺君子操一見適相逢綢繆結深好妾容似桃蕚郎心如竹枝桃花有時謝竹枝無時衰春園灼灼自顏色願言歲晚長相隨𧖟吳桑成緑隂吳𧖟盈翠箔闔門障風雨荒祠動村落千絲為衣被一繭自纒縛殺身以成仁此計殊不惡松下追涼佳哉十八公凜凛廊廟具大匠偶未收蒼髯鬱如許根盤曲澗幽勢宅層崖阻清風自掃門當伏不受暑顧我蕭散姿本是山中侣出逢畏日長隻影無地去偷間蕭寺遊淸隂直修廡人交先浩茫徑造不我拒斗酒起自行開懷為延佇寒緑浸杯盤徑氣逼牙輔語巳心地涼外熱寧足禦公家緑骨蛇千歲穴深土何當供晨餐散我腰腳僂它年聽颼飀危冠挂神虎此意亦大奇勿與夏蟲語沈忠敏公龜溪集卷第一終
