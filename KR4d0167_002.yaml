  text: 沈忠敏公龜谿集巻第二
  hash: sha256:85068db7cd4830d78f58d2ebc2c15b4e46d37a3c0cd0afee12f4a65e8b4daf38
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0167_SBCK_002-1a}
body:
  text: 律詩呈唐子朙同年饑來驅我出蓬蒿鬢影鬖鬖舞二毛黄甲浮名誇俗子白丁結習數吾曹老盆貯酒心猶徤嬾架抛書趣亦高萬事含糊自堪樂不須持板念徒勞攝尉歸安呈江嘉無地誅鋤一束茅清吟端作反離騷奔波且復同香尉蕭散還須似馬曹名下迹公初定價暗中索我便矜豪文章論世寧論晚肯慕群飛輒仰高小雨小雨簾纎未肯晴勒囘花信待清朙冷官何預芳菲事空聽春禽作意鳴清朙日晚晴正好園林藉落英細風吹雨濕清朙牆隂旱渴休無賴自有鳴鳩解喚晴舟過荻塘野航春入荻芽塘遠意相傳接渺茫落日一篙桃葉浪薫風十里藕花香河囘遽失青山曲菱老難容碧草芳村北村南歌自荅懸知歲事到金穰夏日書事洗竹明新牖䟽泉理廢池破礱炊玉粒釣影鱠銀絲假寐抛書帙蠲煩泥酒巵空餘八角扇嬾惰不能持秋日戯呈蔣達可檢討西風摵摵舞庭櫰沈李浮瓜事益乖不飲竟逃官長罵長年唯厭太常齋已看簾幕辭歸鷰猶訝池塘沸亂蛙坐想臞仙遙集處應頽醉玉泥金釵同官用僕秋日詩韻述懷因復和之荷鍤相隨死便埋達人於世豈長乖囊錢擬定文章價瓢飲聊甘祭祀齋兒輩那知群野鶴我曹寧復問官蛙何如細瀹烹茶鼎日向松隂爇亂釵從劉殿院借書骨寒冝伴列仙臞欲喜依劉計未踈自昔暗中人易記到今名下士非虚欲從給事論竒字擬向中郎得異書願借牙籖三萬軸為公一一辨蟫魚過徐氏莊居只着南冠不着纓掉頭防我問功名數椽茅屋有時漏一墢野田無具耕酒地定能容勝踐墨畦終擬過平生扣舷歸去蒹葭閙後夜相思看月明與道按田至湖山有詩凡九章次其韻行盡郊原指掌平亂峰争聳髻鬟青山家不識高軒過驚走兒童戸半扃右游天平山瓦皷喧喧殢土龍紙錢零亂野祠中誰能向此分餘瀝潤澤焦枯不計功右白雲泉出郭有餘適到山無限清野泉依井落古刹並湖成水鳥閑中趣風松意外聲問僧知此觀身世若為輕右題靈源寺風埃滿眼作凄涼招隠空山此計長祇恐誤隨雲出岫不如專以醉為鄉右雲隱軒仙去遺蹤亦漫留羽旗那復肯來遊欲知洞府煙霞邃漠漠蒼崖面橘洲右題林屋洞口聞道藤蘿一一攀要窮佳處識湖山青琳宫闕當西崦應費巾車數徃還右題靈祐觀山脊層壇古松根曲徑微衣冠久已化殿閣自相輝喬木交加合閑雲自在飛無端雪髯老猶效鶴重歸俗號毛公山有一老人右毛公壇觀我欲􅍁玄關誰能供逋客相將持綵囊珠露滿蒼柏右題上真宫湖光奕奕洗浮埃古寺重門相對開獻供秪慿山鬼去問禪時有野僧來老農借釡争炊荇痩鶴飜堦自啄苔令尹定能占歲事為捐逋賦小徘徊右題華山寺過徐氏郊居林梢眇眇墮斜暉剝啄還來扣隠扉門巷劣容居士屩塵埃不到野人衣恰當夜甑黄梁熟盛供春山紫蕨肥侍坐無人只山月兩翁相對自忘機到呉三載故鄉別歸帆恰到呉食寒新火換天闊斷雲孤酒市仍依岸漁村遠帶湖碧山千萬疊翻憶夢﨑嶇感事鬢毛端欲改歲月竟相侵薄宦顔難彊窮塗感易深舊交多得路古道罕知音吾事政如此飄零違寸心旦日趨府紫簫吹夢斷起視斗闌干痩馬踏殘月單衣中薄寒錦囊那復佩革帶頓成寛浪逐官曹底更題敢自安次韻秀守苖郎中喜雨旍斾傳呼起伏龍雨翻枯澤已全通招呼急吹添秋思袪逐驕陽助歲功蝝子有知先避境旱蝗鄰境多葑根無着盡浮空老農自笑豚蹄祝恵政流行盍婁豐次韻盧憲小雨狂風初作惡小雨似知時破睡心長折呼愁眼易饑勃姑穿渡急鴉舅出林遲雨鴉舅候晴土人以勃姑候春事今如此幽尋有底期雨不止已看城郭半浮楂水戽聨翩接渚涯天意若知民意切停鞭且知阿香車新春書事早歲驚逢上苑春蹇驢朝踏落花塵只今嬾問芳菲事桺眼相看也笑人次韻盧憲春意少陵花惱便顛狂天與多情付此郎宿露園林鶯舌亂暖風庭院蜜脾香閑愁幾欲縈春事幽怨還能入醉鄉應斷玉樓雙望眼便須催促理歸檣清明杏火燒空潑眼明游人蕩槳淥蕪城山歌慣習呉歈調水戯終含楚些聲草滿池塘春漲淺鷰歸簾幕午風輕踏青舊約誰能問已喜年來粥有餳報中有盛年休官者感而賦詩中都如海士如鱗乘鴈雙鳬亦見馴林下已無長徃客江頭誰伴獨醒人因循儻使能成事彊徤何須便乞身但喜高風激頽俗要令鍾漏一畨新有懷山中可奈風埃老客游故山歸思日悠悠軒裳結褁非吾事野性從來在一丘冠巻塵埃亦謾彈勒移終復愧家山它年猿鶴應相笑勌羽卑飛久未還次韻宏父喜雨黄壟初看巻麥禾老農還復厭晴多四郊戽尾開新瀆一雨苗根長舊科已發政聲歸召杜更驚詩律鬬隂何王孫欲識田家樂水亂溝塍涉可過行簡以曽守韻見貽復和一篇續經無復補嘉禾老去忘懷及見多摘尾簿書寧問署㸃頭章句僅成科求田下澤吾行且招隠空山子謂何山歸種秫之句行簡有早晩故千萬買鄰真左計一丘端約老相過申應時以圖尋山圖所載湖之西溪也為作二絶句王維買宅先成畫申子尋山亦載圖它日真能營小築此山佳處着儂無故國山川真可老十年塵土負歸期而今更笑申夫子似我平生費夢思客至具餉庖中止有豚肝客不食三九家風故自寒朝來饌客到豚肝不須凖擬供塗竈口腹那能累長官次律兄持節燕山且調兩河兵賦喜而作詩伯也吾宗秀心期萬里侯燕民方築郡漢使果鳴騶更借牙籌計聊寛玉座憂平生揮翰手此意莫淹留中年情緒惡逺別信音疎聞道隂山路貪迎使者車騎羊厭鳴鏑佩犢欲扶鋤願上需頭奏煩苛一切除喜次律兄見過大艑軻轎許暫畱一樽相屬話牢愁封胡羯末名終在許史金張迹浪投遵陸漸看鴻鴈集在原當記􅜇鴒求它年㑹有相從樂泛宅浮家萬事休倦夜獨坐苦無賴開軒懷抱空徘佪簾上月淅瀝竹間風清影迷篝火哀音咽砌蟲怪來寒次骨霜氣已冥濛單顔徒以盜失邑被譴赦令復官喜而有詩次其韻千里風雷起放臣反騷端欲陋靈均宦情遽逐鵬程遠喜氣猶驚鵲語新它日鍾魚應落夢僧舍顔徒寓半生塵土未酬身㑹須更整青雲步徃事當令問水濱土人腊蛙見餉為作此詩此族知何族生涯一廢池似能矜喜怒那復辨官私暑雨浮萍閙秋風牡菊遲肯嫌同腊䑕小嚼為紛披送別老覺交情重貧知世路高相看心已折此別夢應勞未用脂長轂須聽詠大刀平生故人意能費幾綈袍莊子經解官作二詩道別有江湖蓑笠之句次其韻兼叙離索雨餘千里見秋毫綠漲西陂湧浪濤桂楫蘭舟驚送別箟􅞴象齒記分曹官游莫謾嗟流落人事方將困驛騷亦欲江湖理煙艇不知何處可容篙自許論交絶比周向來傾蓋喜同流俗間久矣無青白客裏終然有去留能事要須槃礴臝􅛀詞何必畔牢愁看君躍馬章臺道肯為滄波夢棹謳秉元以按田至村落有詩次其韻竹戸連村閉官何此榜舟蒿萊半殘壟風露溢清愁試為歌田畯那知餞蓐收老盆如見領應作小遲留巖桂小軒巖桂露香乾秋蘂扶踈碧玉寒章句那能如許様夜深渾作月中看次韻行簡北城登眺述懷東觀無人數伏虔一臞塵土獨凄然高情自欲侵天半清夢何由到日邊顧我書空嗟咄咄知君捫腹笑便便登高懷遠無窮意故合舂容賦大篇行簡釋奠學官登北城眺覽有詩嘗次其韻再和二章奠幣儒宫已告虔城樓遠想獨悠然隂隂古木囘潭外渺渺平蕪落照邊野色向人聊嫵媚笻枝入手自輕便興來不暇尋思嬾酒後狂歌定幾篇當年蠟鳳識僧虔晩歲相從意惘然更笑𥪡儒多敗事稍聞上郡已開邊酒醪窮巷誰能載簡牘平生自不便風月兩溪真可老待收功業付詩篇曾守置酒月波樓以張倅至有詩命坐客同賦詞語平生故自蕪登高重愧賦成初諸君此處識老子右衞向來煩長輿波上旌旗飛退鷁樓前歌管出金魚囘欄後夜同延月直下方池可更䟽洳久矣金魚池沮夜坐娟娟微月小牕東竹裏寒聲嘯夕風孤客坐來驚歲晚推愁不去酒杯空虚堂夜寂自神清更僕無端倦觸屏多謝短檠隨我老更温檀火校黄庭曽守病目以治法與之有詩見貽次其韻聞道牙籖檢校頻昏花錯莫亂驚塵未須止酒妨投轄便可捐書當徙薪肘後有方餘幾所眼中無障更何人須公舊觀神明復凖擬花前一笑春次韻曾守立春席上七絶句澤國春歸早連門競築臺夜來風力峭踈片半飄梅曉凍穿流急晨光照火新四郊和氣合歌吹待班春花光浮翦勝酒色動彫觴欲識邦侯喜眉間照席黄跨臘纔更歲經宵併是春黄堂清訟缿欲助發生仁日應東風轉春隨北斗囘不須鄒子律餘暖到寒荄曉卜農祥正遙知歲事豐小桃如有意欲吐故時紅曲席紛羅綺中腔度管絲歡聲連萬井一一擁春旗月波樓突兀晴樓壓郡城樓前波面縠紋生何人合作佳從事來伴胡床看月明㑹景亭桺株高下隔桃蹊萬頃煙波似渼陂畫手無人皃平遠小亭風冷立移時次韻楊縣丞見寄雙瞳炯炯四筵傾少日才堪賦兩京花縣署曹聊試可鱣堂傳徳尚流清横琴勿冩峩峩志引水當令㶁㶁鳴後夜扁舟同泛月野田端見綠蕪平余歸楊問次曾宏父韻小雨經旬户不開隔牆青子滿江梅幽禽葉底如相識睥睨空庭欲下來三楚浮魂不可招夢游赤壁夜停橈朝來快讀黄州賦猶喜周郎得小喬微官似有不如無老去因循負壯圖但得誅茅三畞宅世緣端欲付軒渠未用欣然念可人世間那有白頭新出門更復推葱麥笑殺扶風井大春曾宏父作詩別行簡索僕同賦俗間忘勝踐客裏度春愁拄頰真狂計焦頭乏遠謀剛踈徒自許徳怨浪相求奏乏三千牘詩慙一百籌豈能資宦達端合辦歸休遣興鵝兒酒銷魂燕子樓枯笻青草渡老屋白蘋洲此意無窮樂今懷未滿憂轉喉寧問諱繞指叵思柔二妙看騰踏頻年歎滯留花時閉深院病經旬行簡移雲際渺輕舟使事至湖宏父將以應念騎曹掾平生信謬悠曾宏父將徃霅川見内相葉公以詩為別次其韻以自見客裏思家且罷休無聊懷抱不禁愁時魚苦筍過百六又到一年春盡頭腸斷故園春到時澆花日日遶芳蹊而今夢逐東風去小榼深杯手自攜兩溪以南無數山興來徑造無時闌空餘日蠟幾兩屐日暮雲深天小寒隔溪花桺自無賴煙淡風微惱殺人走向西家覔酒伴芒鞋竹杖去尋春牆根啁啾百鳥閙最愛乳鳩來喚晴日永春閑深院落渠能便當管絃聲揚舲送子下苕霅繫纜沙頭多桺株十載風埃老行客不知鷗鳥記人無前溪溪頭玉色魚羊酪豈可比鮮腴江黄㑹中有勝處徤步走置煩長鬚野店山茶亦可口試歊松火煮石泉相逢故人如問訊但道老去多煩煎翰林胷中浩千古筆頭戯作江海潮子行造膝可問法門前煙浪拍溪橋邦侯言語妙天下學海故自吞百川傳杯擊鉢盡具眼醉中莫謾思逃禪舟中即事逗帆風借力入坐水浮光村落知多少郵亭自短長跳魚吹暗浪浴鷺耿殘陽又是吾廬遠相看思渺茫舟過北塘嫋嫋輕颸動娟娟佳月升岸回雙樹暗村遠一燈明過鴈參差影跳魚撥刺聲停橈且勿去吾意不勝清羞墓在嘉禾北塘朱買臣妻墓富貴因人徳未酬繡衣歸去竟何求荒墳三尺斜陽裏千古徒增女子羞舟次呉松江棹發鱸鄉晩頻經桂子秋嬾投青玉案政弊黑貂裘水落喧漁市雲微辦橘洲五湖煙浪静誰復泛扁舟呉江阻雨過豁然閣次周廉彦韻花鴨呼群自拍浮何人簑笠在孤舟半生已負江湖約不為經行肯蹔留濛濛小雨麥秋天江上人家欲暮煙行客未能忘勝處繫舡來伴白鷗眠我本三生一散人翩然小棹五湖春何從便結滄浪伴纓上而今有宿塵燈上人頥齋道人小室要觀身兀坐蒲團莫欠伸縱有諸天來應供靈龜納息自為真次韻江元夀題寧境寺湖光亭客行終日厭區區蹔借晴光照坐隅水漾龍鱗浮窣堵蓴開雉尾供伊蒲欲隨漁子飛雙槳似與仙翁在一壺目亂風埃知有幾肯來幽處濯纓無舟中聞元用遂魁天下士論歸之輙成五十六字呈宏父車馬至中都當舉似也翰林發策冠諸儒以嘗受任子恩降為第二先内相考中廷試第一人再世重歸汗血駒醉後揮毫凌月窟夢中插翼上天衢嘗夢元用一飛沖天翅生兩腋半生懷抱吞餘子一日聲名振八區歸去玉堂清夜直也應憐我老江湖呉門別曾宏父招手湖山初識君始得相從昨歲西湖眼中已復見輪囷清言自是一時傑豪氣欲無千載人客路臨分隨夢逺老懷論舊覺情親心期不免功名逼儻記江南草樹春還憇湖光亭復次江元夀韻羊酪蓴羔本異區江湖隨俗語娵隅紫鱗撥刺衝文荇翠羽翩翾過緑蒲舴艋興饒青絡馬笭箵自當紫微壺叢書校罷頻搔首天末孤帆去欲無次韻錢徳初九日旅懷三絶西風江面荻花秋鱠玉頻年念昔游客帽只今無地落黄花滿眼謾供愁登高虚欲夸能賦樂事何曾副賞心斜日孤雲兩愁絶一觴聊為盍朋簮濁醪自稱和山藥酒和山藥張籍詩作小令新能坼水花况有阿戎供細雨豈知秋思滿天涯過嘉禾野塘木末孤煙起夕炊茅簷直下釣漁磯蒼茫遠水連天碧一葉短篷何處歸僕夫自燕山來云有次律兄書被盜失去投曉平安使倉皇扣倚廬修塗幸及此細語問何如云自三關道曽持一紙書﨑嶇經冦難隻影到鄉閭杜季習遊恒山謁府帥劉公輒次劉彦常韻作二詩送之勇徃都忘去路難胷吞螭虎氣桓桓呉頭楚尾三年夢塞北江南五月寒痩馬繫門留我別明珠攜袖許誰看書生自有西江量何止能濡舌本乾上相平胡不作難已開亭障徹烏桓公朝問罪知誰敵窮虜要盟故自寒熢燧報安千檄肅羽書飛捷萬人看書生夢想從軍樂雋語銘功墨未乾銘投府帥季習欲以董罙大有詩紀呉江豁然閣舊遊索僕繼和湖隂舊雨記重來小閣深明傍水開螮蝀横空橋倒影琉璃拍岸浪成堆勝遊君復羮魚婢幽屏予方飯芋魁遙想經行斷堤曲野花漂盡雪玫瑰次韻河陽張先父秀才雲踈日薄九秋深故國懸知詠稾砧試拂青萍憐氣在更攜綠綺覺塵侵浮家泛宅三年夢臨水登山萬里心小騎羨君盤谷去肯如思越費清吟託長興呉宰僦居一區無地可經營宦牒東西寄此行問舍它時聊爾耳浮家今日太勞生肯將口腹累安邑正欲絃歌聞武城為我三間卜茅屋夜深來聽讀書聲寄次律兄學士柯田山新居柯田一曲抱清灣兩角孤雲擁髻鬟猿鶴驚心招舊隠桑麻掠眼接通闤似聞小築終年就應是幽扉盡日關為報添丁護鵶觜夜寒歸夢遶家山沈景修宗博示試院書事二章次其韻巖谷何人歎久幽紛袍一一赴兼收㘅枚盡欲成堅敵懷璧渾疑忌暗投獨訝終篇惜鷄肋更須添燭校蠅頭文章到此無殊律共賦菁莪汎汎舟探簾山鳥一聲幽斗覺晴光爛不收好夢已尋江上去清篇更許坐中投欣逢阮籍開青眼肯學虞卿賦白頭聞道月波春色滿好攜行客住行舟月波蓋其景修秀倅樓郡次韻院中四絶句行盡江山不記村卻隨花信到重門也知春色嬌無賴取次先來綠草根一尊相屬語黄昏密雪飄零正滿門記得江橋囘馬處冷香應斷玉梅魂要知春色到池塘深院無人午夢長已覺此身便静樂自温檀火炷爐香荳蔻梢頭春意濃輕狂無奈賺花風今年拚郤尋芳晩凖擬殘枝占晩紅石壁寺山房即事雲根斸翠接山椒小築初營一束茅未放野泉縈曲磵旋移寒綠引春梢望斷南崗遠水通客檣來徃酒旗風畫橋依約垂楊外映帶殘霞一抹紅石壁寺山縈細路走修蛇峭壁連雲只蘚花木末忽看幡影亂馬頭初見殿隂斜迴廊迤迤穿危嶠側澗娟娟露淺沙秀色可餐吾事辦粥魚茶板莫相夸無言頒政以詩寄行簡輙次韻鑴磨文律似攻駒十載相從亦數予巻白欲傾東海酒閉門貪鈔北堂書風煙入眼山圍座鷗鷺驚心水滿渠得谿山之勝公頗樂新居此樂定非公所有為聞鼇禁席頻虚右謂無言平生狗曲視驪駒妙語琅琅獨起予酒面那能伴從事為五斗屈也行簡為酒官筆頭飜欲戯中書官曹似是驚蓮幕問訊何如念石渠只恐浮名不論數要須人識士非虚右謂行簡行簡用前韻見貽復和酬之歲月如馳鬬隙駒星星著鬢故欺予身冝丘壑長經夢語到軒裳輙廢書局步共嗟妨遠趾清溝自覺映汙渠黄麻白簡公心事此去聲名定不虚過卞山次韻朱仰止澗亭絶句曲澗潺潺隱石堤玉蚪雙引戯晴漪相思後夜添清絶木落山空月半規環珮琮琤落斷崖水清石痩没平沙幽人散䇿經過地草閣柴扉趂水斜昔年昔年尋賀老同泛越溪航雨發千巖秀風供五月凉目因秦望斷心為禹祠傷聞道東湖地新來足稻梁秋懷二首庭柯脱翳葉歸翼斷經過水檻清漁罟風櫺響藥羅傲霜荷柄少團露橘叢多秋色遂如此愁成今幾何林梢吐寒月清絶不勝任蠻榼慿誰共胡笳秪自吟探簾風似翦切户斗如斟何處行舟動澄波自委金即事卯酒賸澆胷礧磈晨梳聊理髪鬅鬙方床自岸烏巾坐欲校黄庭嬾未能秋日閑居茅屋秋風斗破除蕭騷渾似浣溪居青山侍坐從吾好黄帽籠頭與俗踈賴有園官能送菜可無溪友解留魚從今輙莫慚枵腹一飽須煩插架書送盧左司赴闕舟中口占胷中渺渺九夢澤筆底滔滔三峽流自合勲盟真易與謾囘詩律付冥捜平生所慕李君御今日聊登郭泰舟去矣相望重搔首百年心事小遲留野外罕人事野外罕人事雖貧心自寛霜𬞞供綠節社酒泛黄團日落歸牛近風微宿鳥安展書遮老眼燈火砌儒酸過竹西百折清灣抱野田竹西風物故依然歸牛更背斜陽去牧笛一聲吹暮天贈老禪霜根刺刺蝟圓顱猶倚禪床聽木魚底事世緣能老我到頭塵事不關渠磨甎幾日能成鑒閉户何人欲造車若有小叅重問訊試尋消息向真如成士瑴校登真訣垂就為作此詩問訊居三茅成欲卜硬黄親校大還書巖石相看已甚臞㑹遣五丁供給使聊煩六甲奉庖厨仙風自昔人何有靈氣於今子豈無知得茅卿近消息應驂白鵠到清都謝葛魯卿雪中遣介送酒雪舞白衣朝扣門一車送酒借春温寒威任减東陽帶和氣全歸北海尊應為半生憐麴蘖更留它日燕鷄豚是中可飲公須記報字如鴉醉眼昏
