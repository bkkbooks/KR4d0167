  text: 沈忠敏公􅀛谿集卷第一
  hash: sha256:edb5bf3b947edf07f3360d7a8c891ac23e6a35ad228b5f8e5d17064ab9e2bf55
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0167_SBCK_001-1a}
body:
  text: 古詩山西行山西徤兒好身手氣如車輪膽如斗十五射獵少年塲戯格黃羆同拉朽二十竄名尺籍中鐵馬追風快馳􅋅臂弓腰箭了一生只喜論攻不論守兵符夜半出轅門將軍令肅誰敢後自誇豪徤天下無誓為官家掃群醜蠻夷共事古來危監軍巧落胡人機黑山未靖黃河沸胡塵倐忽連紫微長驅中州斥􅀱絶巳聞飲馬金朙池种家猛將忠貫日髮上衝冠頥指揮主辱偷生事不武壯士裂眦爭相隨東跨潼􅀜逹上國城頭夜挿將軍旗諸胡下馬拜吾父請成退舎纔有期肉食謀國帝子質勒兵不動䕶送之壯士束手猛將􅂮胡來侮人猶小兒朙朙二聖堯舜主天翻地坼徒爾為天翻地坼徒爾為北望血淚􅒔兩頥眞人中興似光武赤睂靑犢折箠笞一呼奮擊肯效􅂮風鶴尚信驚王師嗚呼何爲背征討紅帕切莫轄兠鍪半爲盗東家昨夜虜小姑西婦朝逢握刀笑錦衣玉食事奢侈翠睂紅頰資彊暴黃屋今懷旰食憂忍與豺狼活蓬藋時危冝爾悍且驕側耳試聽哀痛詔五陵佳氣自葱葱爲雪大讎安九廟次韻劉殿院贈錢圃翁少日從畦丁頗悟園官理菘韭記春秋蔬食聊爾耳十年困塵埃幽事同脫屣一飽不可謀淸痩只如此仰止長城翁趣尚兩奇偉弱冠事筆耕俛仰行六紀晩以圃自娯扶鋤寄深喜柔風蔬甲怒細雨蘭芽美小摘定可􅉆餘事不掛齒那復肯着􅄚而一到城市爲計一何疎行須傳高士木茹忌太潔肉食忌太鄙安得從公游遠傲於陵子遊玲瓏山因訪朱氏草堂平生丘壑心餘事不掛目蔾杖南山來要使富幽矚異哉小玲瓏蟠峙蒼弁腹修藤結懸崖飛溜響空曲伏石臥虎狀騰拏雜奔鹿砑然㸦吞吐側路劣容足拂拭古蘚紋字刻翳新綠標㮄玲瓏名竒怪殆天屬捫蘿上絶頂坦坦類平陸俯首瞰來蹤穹然在幽谷傳聞昔逋客誅茅此營屋淸魂不可招千載想遺躅我思造物巧妙􅉆幽人祿揮斤役山祗斵此一拳玉雲牕與霧閣一一相亘屬豈無部曲衆猿鶴卽更僕豈無節旄貴松檜自張纛此事久棄置蛛絲網巖麓翩翩佳公子心古韻不俗駕言脫華􅆪茲焉卜幽築終日靣巑岏世故豈容觸指㸃空洞姿喜氣政堪掬挾䇿校昔游徤步念須續亦有招隱詩薄暮不可讀奉陪安守登膴原觀江南多佳山駢首闖城郭􅃡懐在坦夷要使一見廓􅀖侯王事餘幽致到丘壑散䇿占城隂含睇及民瘼愛此郊原平膴膴冨耕穫飛觀儵下臨丹碧盪霄堮野色四座浮胷次濳領略千畦雲弄黃歲事初不惡斗酒行勞農歡謠入酺醵勝地惡發揮波神覆爲虐蕭辰誰與娯一笑寄華酌落日耀旍旗􅁿飆漾簾幕卷白起夀公歌聲􅄅林薄老農止勿狂嗣歲有眞約觀網魚暗雨埀埀梅欲黃春山吐源春漲狂雪鱗頳尾泝流上吹濤噴浪能奔忙魚師布網名白大萬目井井連重綱聯艘絕流勢甚武􅃒羅初若無􅅏藏大魚巳得小魚棄要使􅔪育􅂶陂塘鰥鮞安用誤囘避鰕􅈉亦復虛跳梁寧知不比綸索手欲以巧餌空滄浪子修步屧相過屬疾不能倒屣戯贈簿書日在手佳思挽不􅅏而能痛撥置時來訪淸幽古木占城隂一曲縈寒流落影插淸泚綠䕃亦巳稠結亭坐蟠石傲兀忘拘囚雄談功名外俊氣橫九州事故未應爾長恐坐阻修造物小兒相妬我得暫休河魚竟中潰午枕猶扶頭䨇鳬飛舄聲歷歷過牆陬此興豈復淺何當起從游試令開丈室子能問疾不寄題淄川王景發肯御名光堯堂深林蓺松栢不數櫟與樗坐待十畞隂等爲匠氏儲寧復知種德責報不厭徐名令後必大善積慶有餘於焉望豐屋政可增修閭王孫世東州奕奕盈􅆪裾金埒通里巷珠樹連堦除賢哉景發甫爽爽衆莫如直氣薄霄漢妙語鏘瓊琚定知磊落人一見懷抱攄謂我架華堂映發先人廬揭名取肯御名光堯葢念經營初堂前植桃李堂上羅詩書桃李意取􅃴詩書計非踈諸郎自蘭玉舌耕起菑畬吾詩以爲箴㑹見聯高車何子楚爲范明倫賦九疑石石吾不及見也讀詩可以知其巑岏秀峙之狀吾累卞峯石爲小寒林興寄不淺用其韻幷及之峩弁千峰倚天碧上有修筠材可􅐟月明三弄靣巉巖驚起哀猿啼峭壁兒童斵石攢靑瑤寒林蕭蕭吹墮樵坐令結習落幽夢芒鞋竹杖歸路遙覺來隻影徒相守哦子淸詩筆如口眼中何必小玲瓏仿像九疑當户牖神丹已失大江漘誰與安期追後塵分天隔日不可到使我目斷蒼梧雲次韻題沈傅曜痩節堂平生一字不療饑誰云穅覈能瓠肥牙籤玉筯五􅂦食是中有􅃐非錢癡萬事顚倒絕可嗤此腹却受將軍譏吾宗酷似騎曹掾俗物紛紜那復看眼中但有瀟洒侯高節亭亭眞老伴山澤形容坐一癯相要檢校還丹書食薇飲水笑多事知君此計誠非踈劉行簡見借詩槀以長句歸之文章偏忌聲名早冨貴政須門第好了知二物不相關風月膏梁兼者少劉郎天韻眞不凡飛騰冝在蓬萊島年來窮愁已到骨只有珠璣落殘槀紛紛餘子何能追定向詩壇分六纛造物小兒亦薄相浪付繁華給揮掃却令徑坐詩人窮只與淸泠消熱惱向來狗監非同邑渴盡文園尚傭保九原千古忽可作如君自是不枯槁茅齋夜誦誰得聞咄咄空能訴穹昊請君更作昇天行勿使貧胡彊知寶送章文虎秀才歸荆南我生本呉儂搦筆追楚些佳人脱塵屣幽韻耻獨和君家楚江􅎠詞語亦頓挫學海冨探討渠數百紙過春風歸鳳城櫑具恰解䭾此地初識君細語輒三賀冉冉歲巳遒雲山憶高臥翩然理歸裝餘事等棄唾文圍久堅壁定恐一戰破行矣儻復來慿將楚詞課次韻曾守懷玲瓏山泉石有膏肓料理費和緩風埃客子游夢想畧相半端如饜羊酪投匕念鄕饌懐哉小玲瓏舊賞記酣宴玉女下雲牕􅁿我年未冠誅茅老三間此意已懸斷少須草堂資兩足那可絆謝公愛東山自結尋幽伴詩筒忽相先紙價豈容賤流傳從使君感此歸思亂擷蘭躡危根潄石俯長磵野性等麋鹿百嗜寧食薦攬衣中夜興測漏疾流眄扃步愧駑筋卑飛傷短翰正使屐齒折未救斧柯爛時節脫復徂遲莫空浩歎何當脂下澤去路鬱交貫何亨老築堂里第榜曰安虛蓋取司馬子微不受外不逐外之說屬某賦詩以見意云幻境如群狙喜怒􅅭名實憐渠千刼迷墮此一念失世路波濤飜時事風雨疾胡爲隨物遷坐此方寸窒使君超世姿軒裳起儒術神交赤城仙妙解窮隱密向來心㤗然初不計升黜危堂榜新顏要以名自律牕扉敞深明空華亂初日變滅驚須㬰蔽虧隔纎悉了知內觀融天光發虛室山林猿鶴儔廊廟鵷鸞匹靜躁􅂗或殊出處心本一淸都五城開眞仙羅輔弼行矣朝紫皇啓沃造前􅂰功名戯劇成志願談笑畢它年容買鄰儻不傲蓬蓽次韻何子楚食櫻桃􅁿衫駿馬飛彈丸上林花開紛繡團御厨賜筍未解籜山櫻亦復登金盤秦中嵗時記櫻筍㕑事見宗廟薦新勤玉路凡果紛紛不論數風淸日美雨絲􅀵朱實烘春燃綠樹筠籠採擷價萬錢北人羊酪雅所便自從燕罷曲江曲賜櫻桃燕故事進士五湖十載身囘旋已作孤蓬任流轉萬顆徒勞野人獻故無淸夢大明宫醉倚酡顏浮玉盌擬古日月雙高懸朝昬自升沉有如轉轆轤引絙環相尋而我生其間所閲幾古今爾來三十年又作裘氏吟眠飯寄編簡此身疑白蟫皇皇走四方誰是眞知音語欲離舌本退縮飜如瘖涉世􅂓爾耳依阿亦何心託質旣巳迂自謂百鍊金耻作渭水鈎寧爲太阿鐔用捨安所之齒髮忽已侵日月不我􅅏澘然涕盈􅁭次韻黃子虛同飲葛次顏家釀玉友先生早年忘掃白嬾飯青菁借顏色獨餘驩伯爲友朋熟不暇篘巾自􅄋何須引泉連百井飲若長虹太豪猛細斟玉筯滑無聲酌我應憐官獨冷奇篇更寫陟釐黃逼人心地生淸凉了知二事盡家法眼饞徑索銀瓶嘗我老華池少滋液年來愛酒如偷􅁡陶然一醉樂未央此外要知俱長物相期徑造君勿違坐得名勝從忘歸公侯似聞勌設醴穆生正恐同分􅂝次韻李元叔田􅀖鎭唱酬之什李侯少年眞自喜􅀵名擬擅東南美大科異等不作難堂堂奏賦明光裏眼看斗粟飽侏儒空腸殷雷歸著書胷中未減食牛氣出手一擲當成盧只今􅂓問復何如入館李比要辨蟫蠧資軒渠剌頭文字亦􅃈碎澤吻快意囘焦枯大雅寂寥誰發喜逆折波瀾須子美晩分一派大江西約束曹劉歸句裏武安耳孫有臞儒載行無多一束書蹇驢破帽踏城市􅆎間蒯緱鳴湛盧呌閽自薦久未偶淮南叢桂猶關渠雕鑴戯出鄕學餘掩靣笑余詩井枯讀成士瑴詩卷和其書事一章長年賦子虛狗監絕同里桮水􅂓自酬博此一笑喜副墨粲我前頓使百廢起朱絃􅄅遺音名御勿娛俗耳論交儻自今相從期暮齒錢塘賦水母疾風吹雨囘江城艣牙嘔啞潮欲平客居喜無人事攖相與環坐臨前楹眼中水怪狀莫名出没沙觜如浮􅎆復如緇笠絕兩纓渾沌七竅俱未形塊然背􅀒群鰕行嗟其巧以怪自呈凝目􅌶視相將迎老漁旁睨笑發聲曰此水母官何驚江流如奔絕滄瀛潮汐徃來月爲程藏納衆汚無滿盈浮埃沉滓溷九清結成此物冝昏盲使鰕導迷作雙睛乃能接迹蚌與蟶亦猶巨蛩二體并離則無目爲光精江天八月霜葉鳴􅅈師得鰕􅉆水征水母弃擲羅縱橫試令􅀵拾輸庖丁絳礬􅀵涎體紆縈飛刀鏤切武火烹花甆飣餖粲白英不殊冰盤堆水晶稻醯韲寒芼香橙入齒巳復能解酲遣漁止矣勿復評嗟哉此性愚不更定矜故態招三彭且摩枵腹甘藜羮泛舟村落阻風不能少進而菱梢芡觜繚舷上下篙人病之艇子掠岸行水痩不濡尾狂飆振踈篷獵獵鳴兩耳十篙八九褪逆勢何乃爾野芡伺吾間囘梢哆利觜亦有芰浮角一一肆輕鄙初欲事幽尋解䌫出踈葦乗流覔清淺濯纓􅂇深喜事有大不然移頃未離咫安得望蓬萊巨艦破潮起征帆駕長風一日三萬里夜坐感事沉沉夜氣歸虚堂閉深寂孤燈灺餘花寒霤韻殘滳醞釀萬斛愁感槩一人敵何當棄短檠隂山叱鳴鏑戊申初寒偶作去年十月冬猶溫單衣曉出錢塘門攜孥僅脫餓虎口更吟楚些招驚魂兒女爭從亂離苦咿啞遶􅂰多語言舟行畏􅂗侵夜泊孤燈明滅何處村蕭蕭細雨踈葦響風力漸搖枯桺根失聲號寒泣龍具促櫂傍險爭前奔還家依然四壁立故衾敗絮那忍論無衣豈暇具裘褐海國坼裂波濤飜天公戯人亦太虐雪花徑尺連上元今年十月事羈官兩脚如舊身大存紙牕寂歷風竹嘯古木中夜號空園旅人不眠毛骨冷撫事念徃多煩􅁈吾儕小人不論數􅉘狼滿目哀王孫似聞易水寒墮指北望大漠􅈣雲昏安得壯士馭八駿沙蟲猿鶴俱騰騫歸歟莫如中土樂天子孝友朝廷尊坐令鐵衣掃蟣蝨四海挾纊懷君恩十里巖石壁巨靈手擘青瑤璞平削無痕看斧鑿六丁取將天路遙雷電􅀵威半空落至今崒嵂橫道旁絕壁萬仞青茫茫倚天屹立不可近下視培塿如群羊蘚花斕斑風雨漬藤梢夭矯蛟龍戯中開微竇走鳴泉白虹吞吐氣泉流萬古潭水深山寒無風鬱沈沈下田納納禾稼茂發源漑初何心峭直誰令據當路松柏蕭森半􅈣霧猶恐夜深魑魅驚更遣山靈謹呵護夜書山驛天寒夜向闌月出山更靜風露搖青空萬􅁚光耿耿啼螿泣幽草賔鴻度前嶺歸來坐孤牕松竹舞清影績溪寨口青嶂挿天塹白水翻地軸囘環壯哉縣不許飛鳥觸徃年羽書馳盗發清溪曲先聲雜妖幻餘黨萃符祝控攘最旁近被害良􅃤毒聚落燼􅈣空生齒􅂗炭酷豈無山川險㑹有法令束百年不用武駢領甘此辱至今風雨夜猶聞􅀑群哭遺俗感舊憤禦盗勇氣足大兒佩刀劍小兒利鋒鏃老翁筋力衰奮梃怒張目營寨人自戍不待官期促矧今天驕橫洒涕國步蹙豺狼據道路虎兕出林谷儻持復讎心公戰圖報國聞招冦緑林煽餘習無乃國計左誨盜爵秩崇納叛金繒夥戢姦在斧􅃏賞誘詎云可萌芽緩誅鋤猖披費結裹戰多數招安奚用􅆎箭笴悍兵昔巳然黠將近亦頗昌言假報國湼靣剌投火􅉘狼奮哮噬蠭蠆利掀簸橫行入通邑焚掠窮委􅃈况聞南陵冦執事初意惰出没勢巳張翦滅計未果宣城俯百里千室盡奔嚲王事吾有程馬頭戴印顆叱馭疾其驅語言紛炙輠何當說羆貅一洗根本禍寧國道中山石犖确行路難山風蕭蕭吹早寒十步九歇僕馬瘁兎蹊鳥道窮躋攀崖谷空籠瀑泉走碎玉零亂飛前灘石堤捍水幾百級落處疑有蛟龍盤兩山之間開􅅵畞石罅著鋤那得寛前村後村􅈣火冷土牆茅蓋常掩􅀜我行不知記近遠官游歲晩良自歎豈如家家一飽外鷄豚社酒相追歡那知亦有簡書畏里胥剥啄驚顏夜宿千秋嶺下田家隂壑來悲風薄莫吹急雨冥冥攬寒色咫尺暗山路茅􅉉兩三家曲澗縈竹塢停車遣問訊欲止此何許老翁行步弱扶杖倚門户問我官何忙野宿今無所向夜號狐貍深林嘯豺虎甘心在擇肉闖首輒慿怒駕言徃何之一榻翁敢拒延我傍中堂慇懃慰良苦解衣土銼旁支枕憇行旅昏然飽安眼境寂絕猜怖雞聲報明發征車犯寒去呼燈別老翁鼻息方栩栩溪上見梅睛溪漲淥如隂苔晴山挿影相低囘􅀞船疊皷順流下波光浩蕩征帆開灘縈岸繚柂牙轉水石相激如奔雷須㬰已復過絕壁歸路漸近嚴陵臺山重溪􅃨境彌逈暗香忽自空中來日斜正見叢􅁄外炯炯疎片飄寒梅槎牙一種獨愁絕含情不語明巖隈凌波疑是水仙出縞衣素質行徘徊下窺清淺一笑粲坐使凡卉俱塵埃山谷之儒已臞甚􅀛腸鶴骨世所咍相逢頓覺百憂釋不嫁春風誰與媒舟行易遠空囘首角聲吹夢心悠哉次韻張仲宗感事諸侯救周衰能事存筆削後學競專門膚引迷注脚寧知懼賊亂誅意未爲虐上皇志包荒大度示恢廓誤墮虜計中九廟施箭鑿將臣擁彊兵首䑕事前郤專雄懐顧望散黨失歸着坐令兩宮車北轅狩沙漠天王紹絕統憤此國勢弱嘗膽復大讎此意良不薄向來督眞姦國典猶闊略群公爭䕶前循習久彌確黃屋泛滄溟黔首寄矰繳世無管夷吾老眼雙淚閣何當誅賞行浩歎成嗢噱大明還中天冰雪自銷鑠次韻允迪祕監同年所寄㑹稽唱酬之什秋鴻度寥廓天遠勞目送燕雀各有謀墮此朝餔􅉆平生江海游徃事恍如夢􅆪裳彊結裹翰墨困嘲弄一官冗不治匹馬旁無從迷行落小刧􅀡意識大洞似聞脯麒麟頗欲翳鸞鳳眼無行祕書此語誰與共貧知世路艱老覺交情重功名等戯劇射覆偶微中龍媒駕皷車款叚朱絲鞚南游探禹穴聊得登覧縱時危要奇䇿􅂗窮勿長慟相期論少卑材大古難用鄭維心約趙安道中大家兄次律學士及僕探梅城山乗月泛舟而歸窮居不厭車馬絕委巷衡門常晝閉朝來剥啄誰過予倒屣逢迎走驚蹶里中勝士眞可人爲憶寒梅耿殘雪招呼聞早探幽芳平溪徑遣扁舟截西山佳處雲塢深松竹蕭森迷洞穴上方小閣鏁空明開牕下見千山列􅀞手無人皃平遠野闊天多􅉆一瞥冰花只作小寒枝拄杖不辭穿巀嶭野僧省事畏客狂攀援自向南枝折踈香低入坐中來骨冷肌清伴高潔􅁭期况有公子賢伯也雄豪􅀒奇節手拈凍蘂薦深桮妙語琅琅契禪悅人間此㑹不多有忍放杯空成小别歸來懷抱與誰論一櫂飜然載明月臘月二十六夜大雪投曉霽色恍然鳥語啁啾便有春意感而賦之黃昏雪打牕夜雨破幽夢晨光逗􅉉花霽色恍池凍老木驚向榮好鳥發微哢草根露纎芒蟲聲試群哄空畦土匀酥側澗泉流湩臘盡殺氣衰春歸生理共人情自多端天意皆曲中懸知造物公未厭萌區衆艱難重時節俯仰疲迎送心閑數造化骨寒遭􅀑弄那驚梅桺新但飽藜藿􅉆行須過田家泥飲空社甕次韻葛魯卿送示近作一通二首八騶盡屏如縈䇿微步招尋老賔客離離草色亂溝塍脚底春風隨蠟屐蟄龍昨夜起􅋡潭忽雷閃電飛千巖朝來遺珠落懷袖復見國風歌二南公洗膏肓砭傳癖詞伯儒宗蚤揚歷詩成􅂓復貯錦囊副在久應藏石室只今漂泊客􅈣村高哦七字哀王孫有如此言公不食東山那得畱安石濟時之志公詩􅁣然有君侯胷次多籌䇿歲晩飜爲江海客小隱方營一把茅景山而作公詩爲結屋幽尋定費幾兩屐公心落月印寒潭出濟巨川歸築巖追還正始遊戯事􅂓爲風騷作指南我有幽憂如酒癖起誦君詩春寂歷天公下取氣凌雲神物䕶持光滿室老矣懷歸葑上村倚公佳句譜桐孫須公拯危紓旰食快冩車攻刋藥石葛魯卿再和復用前韻奉酬上謁軍門冝杖䇿誰爲兵家分主客􅃛虜翻乘下瀨船幽人退整登山屐山泉聞似百花潭山曲盤囘十里巖丘壑䕫龍人太息那將捷徑比終南吾􅀖舊事論三癖州崔員外詩見劉夢得與湖佳處還堪記遊歷深譏表餌誤朝廷急贊烝嘗安廟室避地來居水遶村鳬鷖哺子竹生孫苜蓿堆盤從野食人愛當年二千石平生自媿無竒䇿魔去徑須呼逐客兀身􅂓欲避風塵作意何能分履屐驚魚畏網伏深潭窮猿失木號重巖殺氣漲天消息斷但想滄海浮東南囊無一錢誚錢癖鮭菜腥人今齒歷忍言走馬過章臺空駭祝鷄餘土室傖父嗔儂語帶村錦心繡口拜天孫端爲遠謀箴肉食誰能饒舌攻牢石葛魯卿再和復用前韻奉酬聞公卜居問􅀛䇿隱屏畏人呼重客閑招溪友鐵頭航戯躡隣娃金齒屐舎旁修木䕃風潭坐有郎君掣電巖巳將此叚慰偪仄更爲岑參來巷南細說當年陳類癖釋爲癖類辟顔伏閤忿爭書日歷國醫袖手藥籠空掛壁猶餘弓矢室吾州萬落與千村以葛名兒浸及孫刲羊擊豕作寒食定恐酌公忘斗石小檻觀魚呼䇿䇿來伴漁蠻作逋客風囘别浦有飛帆雨濕斷堤無響屐夢囘春到放􅀛潭潭上雜花開石巖十椽老屋􅈣燼滅越鳥無日忘巢南空說花驄酬馬癖豈有過都如塊歷出門咫尺行路難只辦蒼黃問家室皷􅎏聲動何處村爭挽神􅄊歸王孫今者不樂憤忘食奮臂擬關弓五石奉題思上人妙峰堂上人游四方雲水􅄅長道一言契深心百法從此了十年歸故山不􅂿山前草經營妙峰堂想像德雲老閉􅀜習跏趺宴坐兀枯槁混迹雖寰中寄意巳塵表深枝姹巖花雅音喧谷鳥翠竹伴幽禪白蓮敷衆好山空有雲歸地淨無塵掃囘觀第一義湛湛孤月皎法門有等差問訊今誰曉躍身寶樓閣此堂終􅄶小維心方刋正三國史某以精筆遺之䝉餉大篇爲謝氣格渾然三復感歎漫依元韻奉和蕪陋增愧諸豪雄誇劍芒銛毛錐歛避􅀵餘尖櫝間黯黮渇銅雀案上爬沙枯玉蟾學堂山人有遺裔筆力大可千人兼掉頭不肯書柿葉酒酣起舞怒奮髯十年歸坐溪口屋傲視冠冕猶髠箝草􅀇草聖􅂓戯耳如醫識藥信手拈邇來􅀡筆到三國去取法度何森嚴眼中青白世矜異皮裏陽秋誰顧瞻更憐中書今且老鷄毛葦管爭出奩懸知入手便獰劣那復􅂇子窮幽濳我持妙頴急送似標題珍重存華籤勢如執法貴心正俗病要以此語砭揮掃定見龍蛇走紬繹何憚歲月淹須知筆意似人意柔順未必非㐫憸長樂梁世則爲余言林氏達觀樓橫海嶠天下奇景也索詩爲賦一章老眼紛世故百嗜了若遺忽聞佳山水未到神巳馳迢迢古長樂山水天下奇中有隱君于少讀昇天詞茲遊不可遂樓居在厜㕒要欲盡一覽吞滅海嶠姿想當宴坐久遠意􅄅莫追定見月嶺墮􅇝瀾浴朝曦蓬萊蔚相向拍手招安期秀色故可餐却粒到玉芝何當徃從游下視培塿卑和張仲宗送柯田山人歸隱我家􅋡潭上卜鄰左顧􅀛中有隱君子孤風邈難追玩世逐虎􅀑祈年訊蛇醫籬根縣瓠壺蔓野紛翠帷客至勿遽迎借問來者誰窮巷車馬絶杖屨得徃來老儂起招呼情話眞樂哉意行忘早晏佳處首重囘月出一犬吠柴門風爲開􅀵還四方事老子良足哀誰爲雙眼青自失兩􅁂黑溪山招客子占勝淸凉國古人如可作晚歲意及是中但可飲名御勿亡酒德酒酣忿天驕驚問兵誰勒徃年城下盟殺氣橫九有脫身賊中來親戚驚老醜抗言半渡擊失計推禍首誰能返秦璧爭欲􅄷魯酒着鞭空浪忙好語得鷄口有弟在一方丹臆危涕橫念言還鄕夢遙夜懷紫荆忽興攬衣坐孤燈耿靑熒雁奴信何功捫心愧鴻冥棄置復棄置終尋白鷗盟鄭維心用張仲宗韻見贈復次其韻奉酬幽人臥南牕支床伏穹􅀛白墮意冥契黃庭心暗追身閑有餘適國病何當毉此事姑棄置溪光掛屏帷顧影或自笑問言子從誰少日功名心􅅯蹇挽不來雄豪本戯耳靜樂眞賢哉畏事口三緘憂時腸九囘無客榻長掛有懷尊自開酒酣氣如雲高哦追八哀胷中飽世故了了分白黑十年客異縣中夜夢鄕國買鄰枕寒溪此計吾猶及大恐歲星惡翻令銷福德不如早移文徑效山庭勒浮名等浮雲過眼亦何有誰能學東鄰深顰不知醜朔風吹飛霜素色侵皓首幽憂無與娛萬事付杯酒客來勿多談要使耳如口江濤故洶湧胡馬猶縱橫徤兒委戍甲老農持􅁄荆去年拒胡地白骨埋晶熒機權失猶豫理數歸杳冥誰如管夷吾九合先同盟次韻葉左丞見寄先生少英發身爲國元􅀛玉堂動敏翰諸老難莫追向來三折肱舉世推良醫小試經綸才艱難佐籌帷憂時儻失聲捨我今其誰巖棲分麾去鼎食羞嗟來憂樂有大者得䘮良小哉霣心驚地坼攬涕祈天囘願言國步肅追理邊隙開絜身未足道王孫眞可哀幻緣東卽西妄境白成黒那於土偶間平地見佛國雲山樂未央歲月嗟何及恩讎一快意聲利多慙德名成復逃名飜恐鍾鼎勒胷中浩無垠冨貴公自有厭居廊廟榮戯習村野醜荒山披石林它年齊峴首殺雞侑晨炊炰羔行社酒此樂應獨知世味難可口仗馬失芻豆那顧一榻橫小兒衣挾褚老妻􅁫墮荆心事獨炯炯眼力雙熒熒君恩未報償浩歌託沈冥上天不難知誰能訊青盟希顏提舉愽士謁葉公左丞於石林公遺之詩屬余次韻劉侯磊落人中豪半生塵土略如我酒酣氣與天低昻長笑拘儒費膏火虺隤一馬上高崗怪來喜色猶揚揚探得驪珠携滿䄂明月掛空無價償夾竹桃花搖搖兒女花挺挺君子操一見適相逢綢繆結深好妾容似桃蕚郎心如竹枝桃花有時謝竹枝無時衰春園灼灼自顏色願言歲晚長相隨􅁞吳桑成綠隂吳􅁞盈翠箔闔門障風雨荒祠動村落千絲爲衣被一繭自纒縛殺身以成仁此計殊不惡松下追凉佳哉十八公凜凛廊廟具大匠偶未􅀵蒼髯鬱如許根盤曲磵幽勢宅層崖阻清風自掃門當伏不受暑顧我蕭散姿本是山中侣出逢畏日長隻影無地去偷閑蕭寺游淸隂􅀡修廡人交先浩茫徑造不我拒斗酒起自行開懷爲延佇寒綠浸杯盤勁氣逼牙輔語巳心地凉外熱寧足禦公家綠骨蛇千歲穴深土何當􅉆晨餐散我腰脚僂它年聽颼飀危冠掛神虎此意亦大奇勿與夏蟲語沈忠敏公􅀛谿集卷第一終
