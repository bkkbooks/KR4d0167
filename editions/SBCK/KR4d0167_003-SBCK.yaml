body:
  text: 律詩長短句附正月十四夜觀燈南寺子虚有詩次其韻兼呈駿發次顔娟娟佳月掛南樓蕭寺真成秉燭遊火樹忽驚新節物春衫不趂舊風流公方高臥追三巳我亦狂歌發四愁為報襟期得名勝何妨着處一開眸不出以次初約子虚而徃顔見招再用子虚韻和呈駿發次顔燈市燒春接郡樓歲豐人樂事遨遊繁絃急管方連夕痛飲高談自一流短帽縱堪陪勝賞長檠那解照牢愁歸來臥對西牕月獨想清光燭電眸十里笙簫沸市樓已占風物兩優游人從月窟開青嶂燈挾星河映碧流曲席深杯成徑醉長廊古寺溢清愁暗中我亦知公在彊對蘭膏為舉眸子虚復有詩再次其韻誰能延月倚危樓細􅂂相將偶當游倦聽山歌懷舊俗閑看水戯濺寒流戯然燈土人以水燈光競作千門曉酒力微寛一掬愁明日八分疲阿買詩饞元只在清眸次夕雨作用子虚韻奉懷次顔知魚軒小集夾道繒山聳蜃樓小軒終憶數條游月將人意十分滿雨入溪光一􅉽流静聽屐聲喧夜市旋挑燈灺醖春愁閉關不問隂晴事時怪􅀇花掠病眸別群從十年勞遠夢今日又征鞍雨入花梢困風生麥浪寒飄零逢酒怯老大別家難去矣功名事終須把鏡看􅆶步呼去聲漸逐潮頭遠帆影低隨日脚斜已喜扁舟近􅆶步江鷗無數立寒沙將達行在所潮落江城暮帆開一葦輕雲屯六龍駐天近五星明率土朝方岳何年洗甲兵君王似光武折箠看昇平陳子尚􅀶士休官還京口作此詩餞之勇退曾無屋數椽掛冠神武便飄然陶潛去家一百里張翰􅀵名四十年平世深知還有幾少時徤決已無前使者論不合徑去官子尚昨主臨淄簿與部侏儒飽食堪羞死莫浪狂言為着鞭西風江上荻花秋鱠玉頻年念昔遊世事真成一可慟身名那問二冝休公卿禮餞何為者僮僕歡迎有此不鬢影毿毿紛翠葆曉來鍾漏亦懷羞得家書國步猶艱棘不堪頻問家霜毛失翠葆蒿目亂􅀇花孤客知時節殊方度歲華干戈就休息歸理邵平􅆶觀瓊花千里隨河走濁流檣烏東下指迷樓春風簾幕今何在只有瓊花伴客愁即事和卓彦翼曈曨曉日上簾旌簾外幽禽作意鳴呼斷故鄕千里夢起來搔首問歸程即事造物勞人亦懵哉又驅疲馬上崔嵬經從野店初嘗筍行盡江村始見梅千里短書先夢寐半生多難足風埃桔橰俯仰成何事已念漁蓑歸去來次桐廬決決溪流不滿灘獨憐舟子上風灣日斜指㸃西村渡竹户茅牆趂碧山吏鞅縈人未許閑當游聊復到春山倡條冶葉無風味頼有寒梅醒病顔於潛道中首路潛溪驛鷄聲欲曙天藍輿衝宿霧棧閣寄層巔高下林端屋横斜石罅田野泉隨處有草木盡蒼然新城道中馬蹄隨意到囘首隔南岡日落鳥猶語春歸花自香長紅媚幽谷新緑漲囘塘假榻知何地昏鍾出上方宿葉璋橋庵舍渡澗穿林夕未休野人篝火引前騶驚從略彴灘聲急喜見屠㢝草蓋修雲臥自驚魂夢冷星馳先惱肺肝愁乞身老我雙溪上記取端能賦遠遊水閣小憇雲氣昏昏雨脚垂客行終日勌犇馳竹間小閣臨清瀨俯檻觀魚立許時祈門道中遇雨了事癡人有底忙箯輿勃窣到南岡樵風槭槭群狙喜山雨蕭蕭萬木僵谷底暗分冰澗落舍旁時度野梅香殊方歲晩多悲感歸老丘園此計長東西二林寺湓浦維舟訪梵宫香爐峰下暫從容重來不為二林景永遠禪師有舊蹤在昔得名齊連牆亦共蹊修篁同碧嶂寒溜合清溪閣影高低並鐘聲左右迷遊人俄省悟東即是林西遊人多入東林寺將謂西林景不如我䇿短笻行半日水聲松韻更清虚千秋嶺者盜發旁近復於此守禦錢氏嘗築四壘以限江南比山河四塞限中原籬落而今不復存豺虎晝行何日息但餘征戍滿荒村吳越江南絶壁間可憐争國似蝸蠻百年父老陶王化尚記流傳一醉顔次韻鄭維心臘月十六日有作國難更頻歲胡塵動四溟豺狼飽吞噬溪壑變羶腥黄屋無安所清笳不忍聽使臣歸路阻慟絶鬢星星朝廷歸叛將關塞失簽軍銅馬猶逋命沙蟲亦占群上心存廟略兵氣亂天文誰挽斜河水通宵洗赤氛血戰遮東道今誰廟食雙無人扞彊虜縱馬飲長江冦掠元干紀兵臨反誘降將軍自不武慚色上旌􅓚次韻避冦二首窮途厭遷次歲晩惜分攜茅舍荒村北柴門曲港西鷄豚蹔同社桃李舊成蹊那得干戈定浮家著兩溪宦游成屢卻戎壘悵頻遭聞詔趨吳㑹經途事董逃心期紓國難力欲挽人豪漂泊多危涕真成失木猱游城山夜歸泛舟南溪杖藜尋勝款禪扄歸去扁舟伴月明臥樹低摧山脚轉跳魚撥刺艣牙驚􅈣埋橋影雙霓斷風熨溪光一鏡平聚落半空無市井在亡燈火短長更次韻李通直題慈相寺雪月亭曲檻飛甍介碧空盡供勝覽屬禪翁蒼藤翠木四圍外遠水平蕪一望中幽鳥林梢鳴不斷亂雲天末去無窮素娥青女今何在女主霜雪淮南子青歸步聊乘兩腋風扈御舟泊錢清江口值雨打窻悉窣連江雨吹柁嘔啞拍岸風篷底醉眼那得穏時聞鷄唱夢魂中法駕親巡海上還鈎陳萬騎列江干潮生風熟樓舡過雨􅂇洪濤失故灘過平望未辦扁舟掛綠蓑人間何處不風波終須徑為鱸魚去笠釣歸尋張志和和得道之地平望乃張志次吳江水闊風豪浪拍天魚龍戯舞墮饞涎尋常行處多飜覆看我孤舟得穏眠小邑蕭條兵火餘狐狸入市自相呼茅牆竹户斜陽裏十室生涯久已無冬至遇雪題明因寺僧房宦學差池已倦游一犂真欲老西疇天公為作豐年信更喜將軍入蔡州師入杭是日聞王遙想燕山落大花更堪直北渡龍沙六師挾纊懷輕煖取日誰能反翠華方允迪隠鸕鶿谷江子我子之劉希顔行簡皆徃依焉爲此詩寄贈脱葉驚飛海角秋君王虚佇急良籌列仙山澤底無用孺子滄浪渠不憂百鷙可能如一鶚二江知復帶雙流渺然相望暮雲碧兀坐蒲團搔白頭八月十七日扁舟渡錢塘江一言初欲寤明君去矣終縁丞相嗔鳬鴈江湖真我輩龍蛇山澤定何人市中未識馮延夀門外已呼祁孔賔尚有憂時心未歇西風吹淚濕綸巾沙觜波生柁脚開扁舟老去許歸來風帆一㸃日邊下雪浪千堆天際迴城郭荒蕪迷舊隠江山寂寞冩餘哀此心元自無機事寄語輕鷗莫見猜允迪招行簡卜居鸕鶿谷僕意羨之作詩送行兼以自見嚴陵灘下鸕鶿谷聞道元英舊隠廬鼻祖名高詩格在耳孫才傑宦情踈漫山松桂鴈行立入鄔茅茨星散居知為劉郎賦招隠莫教花落到通渠少日長懷社稷憂怪來饒舌謾多仇風塵冉冉百年老霜雪蕭蕭兩鬢秋不辦癡床供一笑方營隱谷賦三休添丁䕶得金鴉觜佳處端能着我不維心過邵子非溪亭夜話有傷時感舊之作索余次韻官儀全復漢盟㑹競尊周郊野多戎壘衣冠半客游地偏朋舊鮮人老歲時遒莫厭經過數相看又麥秋朝廷䇿數馬冦盜谷量牛世亂思竒畫身閑喜勝流鵷鸞霄漢侶鳬鴈稻梁謀得趣皆為達􅃚能陸盪舟聞道津亭集青燈夜色浮鸛鳴驚獨鶴魚伏避群鶖月澹帆歸浦風腥網挂洲語深投匕立此意得無憂虜悵師頻衂民窮粟屢捜㑹須夷䘮亂寧敢厭征求黄屋中天立彤弓幾日酬寸心終耿耿不獨為春愁心事空牢落身名盍罷休得閑羞彊聒避謗巧淹留老矣嗟如此誰歟問以不儻容親杖􅂂不擬向丹丘欲上投閑之請余得守丹丘方劉希顔持節按縣招維心舟中小酌次維心韻大艑浮溪曲華旌暎道周勞農纔徹警問俗偶成游王事今云棘官稱古號遒正須哀疾苦輙莫詫防秋防托事希顔按隨處喧銅馬何人炫木牛輕捐小山句急捍大江流行邁心疑醉周爰事喜謀招呼隱君子高浪兀虚舟故國真如寄餘生宛若浮巢鳩不䕶鵲池鳳肯容鶖老木低春水孤花帶晩洲杯行應酹我知復念幽憂山林懷獨徃圖史縱旁捜此士俗間忌吾儕句裏求大篇終寡和小酌漫相酬脚踏溪流亂端能醒客愁大邦通間道小縣得中休交分傷離合王程惜去􅅏索居埀老矣劇飲尚能不倦夜評今古誰憐貉一丘子虚航重湖之險遠過山中輙次維心韻以謝客裏傷為別相望歲一周冕旒存異顧賜對天語稱去歲子虚䝉奬丘壑老英游憂國心長折驚人語太遒年來有公事合眼注春秋小牕眼蠍虎敗壁上蝸牛老樹隂埀合前山翠欲流狂言違世用彊飯了身謀不謂輕千里能迂訪戴舟此客今那有迎門喜氣浮心閑清似鵠眼浄凛如鶖塵榻開蓬室風帆巻橘洲襟期適相契一笑發群憂寳曆方重啓英才必盡捜題輿偶淹泊牓道㑹營求浪漫貧逾適經綸老未酬雲林得攜手切勿志窮愁暮雲凝遠碧覔句擬湯休不分千山隔才為十日􅅏高風誰繼者清夢自驚不聞説星躔動何人識太丘次韻學士兄見一亭自稱居士擬香山隻影江湖得暫閑大隱可能追褦襶小亭聊欲對孱顔持盃有月同歌舞䇿杖無人共徃還聞道修篁解新籜宻遮門逕不須刪塵土敗名如敗敵雲山招隱似招降謾傾魯酒醒猶獨聊發吳謳調本雙誰念佳人在空谷自同漁父老清江它年對榻分餘地風雨蕭蕭夜打窻次韻學士兄述懷故國風􅈣素已諳結茅端欲占重嵐聚蚊那肯追金谷號虎真成賦石龕阨運經過度陽九幻生顛倒識朝三它年自有鷄豚約小阮新居卜道南葱麥推還井大春拂衣歸伴臥雲人胷中歴歴蟠三略肘後時時校六淳已作移文排俗士更將要術混齊民知閑聊復求閑地歲晚功名恐逼身六淳之葉風實雲子漢武内傳仙藥也見次韻黄子虚所居隨緣堂應羡扁舟泛五湖隨緣卜築伴樵蘇青山衮衮成嘉遯華髪蕭蕭負壯圖松檜鶱騰元自植魚龍吟嘯巧相娱清宵背立巖前月大呌三高更疾呼次律兄餉魚魚不至而詩至頗類南海使君送酒輙成二絶一笑而已賜茗少分以報厚意慿虚公子騎鯨後烏有先生控鯉初可是凡魚亦仙去空餘一紙腹中書先生遠餉錦鱗鮮剥啄扣門驚阿連只有珠璣落牕几空教口角墮饞涎尚方小鳳睗精芽戯比瓊瑤報木􅆶夢境紛紛非實相徃煩鈎起睡中蛇曉過鄰村推枕夢初斷籃輿踏露行歲登人意樂風急鴈行驚曲澗哀湍㵼危橋獨木横清霜莫欺客雲日自晶明即事鵲噪空庭曉霜明百尺樓連枷響晴日遺穗落平疇黄菊踈籬晚丹楓別岸秋怡情有底計開甕玉蛆浮竹樹參差合溪流半隱扉雨昏鳩婦閙風急鴈奴歸䇿杖循沙步褰裳到石磯游魚吾共樂身世自依違過梅知宫東軒舍南舍北花無數眼看游蜂上下狂風信晩來簾額動黄庭相對一爐香允迪遣書問訊并寄示與子我唱酬佳句猥及微蹤輒用廬字韻為二詩以報嘉恵泛愛何人枉素書銀鈎奕奕到田廬朋游久許貧方耐宦學空憐老更踈囘鴈峰前應夢到放􅀛池上也齋居􅀛溪方事投閑之請㑹允迪書到亦云允迪得郡衡陽僕丹丘皆待遠次僕居相期保社同香火口禱功名乞與渠不從吏議汙丹書恩許懷章返故廬投老有緣知分溢排姦無術愧才踈勝流踴躍聞歸櫂妙語吹嘘慰索居懷望北轅心已折忍將時事付軒渠書懷二首應俗由來嬾謀身尚敢先栖栖從見嫉僕僕豈能賢駿馬常追日方舟可濟川人生各有趣心目名御相怜暗中人易記名下士非虚此道慿誰辦它時或自如真能食萬户定復愧三閭富貴雖吾有當令功可書事業貴不苟聲名難預期功非冝食肉道豈忘羮藜政恐儀無舌那論緯有髭漢庭今用少覽鏡獨何爲劉希顔提舉見過出示卞山居二詩次其韻偪仄風塵際分攜歲月賒向來聞避地勝處偶爲家對客談鋒鋭憂時酒量加中觴莫辭醉囘首又天涯小別千山隔相看一笑温丹心獵風斾華髪粲霜根鴨鴨争呼伴鵶鵶自識村更須判劇飲落月倒窪尊張仲宗有詩懷歸因次其韻勉之相逢無日不懷歸又是春山聽子䂓休歎豺狼迷道路似聞􅆛虎仆旍旗那從薄俗求青眼還向高堂念白眉南望孤雲應目斷殊方歲月易推移南北山探梅俱未花維心從家圃折數枝以餉坐客蓋半開矣㑹次律兄有詩輒次韻山北山南雪意忙梅花未肯闘寒芳懸知小圃争前發為折踈枝分外香故國年華驚晼晩老人心事伴摧藏更看末上傳春信倚杖空懷遲暮傷次韻鄭維心探梅未花木落山空不着行寒梅長是占年芳未容霜女窺孤豔定恐花神嗇舊香竹杖穿林聊問訊槿籬縈路巧遮藏誰能折寄江南恨北客相看摠可傷聞道年時醉一觴野梅飄几薦餘芳兵塵不礙含生意花骨猶存底􅂮香入夜從教月浮動争春空被雪埋藏慿君妙句先催發調䕶髙枝莫中傷復次韻呈維心拙澀不工當為抵掌岐亭幽夢墮微茫百草先春自不芳山雨壓低臨澗影天風吹下滿林香梨花少韻非儔匹竹葉多情故歛藏長記江橋閑立馬落英誰掃重情傷粲粲踈梅短短牆騷人長恨失遺芳低徊草棘精神透彷彿關山魂夢香月淡乍看清影亂春深終恐緑隂藏歲寒為爾添愁絶倚樹微吟亦自傷次韻維心憶梅野花飄盡江梅發為報先春一信芳近水踈林風格老故山歸路夢魂香雪霜貿貿添愁絶蜂蝶紛紛預屏藏折寄慿君呼徤歩生枝莫放手痕傷次韻行簡懷次律兄門對青山水繚牆隔畦花卉盡流芳澆胷快㵼鵞兒酒襲鼻長聞柏子香夜雨對床成契闊晩雲歸岫識行藏抽身未試平戎略空為憂時倍感傷邵子非謂予有天台之行見貽以詩次其韻巉巉老氣鬱青霞過我依然醉帽斜為説驚魂招楚些忍聞悲曲動胡笳扁舟犯雪來何許徤筆凌雲語益嘉莫笑海山風引去要尋源上問桃花次韻劉希顔蠟梅二絶仙衣曵紫練裙黄天遣清臞勝國香月上小牕寒影動不禁風味惱剛腸翦成香􅁡綴踈枝度臘争春已恨遲清夜無人花睡去小園風露更相宜次韻雪紫簫吹斷玉梅魂夢入江南幾處村半夜落英飛不定旋添清絶到柴門月下獨歩娟娟微月小庭西月下幽人影自隨賴有寒梅伴愁絶一枝清豔耿踈籬次韻次律兄除夜述懷此身傳馬與時移過盡三餘又一歸野炬占風迷夜色􅀱風色占歲事農家除夜以火炬村肴宿歲待晨晞鬢華老去能餘幾心賞春來轉覺非慚愧君恩許閑佚食蔬那比首陽薇餞歲鄰翁席屢移拍歌猶聽夜深歸尊浮凍螘霜逾重林噪寒鴉日未晞剰歎飛騰憐杜老歲詩見守過為孤憤陋韓非干戈滿眼傷時節遣戍長聞賦采薇次律兄以蘆菔見餉并有詩次其韻歲晩嘉􅂼已向萎獨餘蘆菔老霜畦􅀵隨芧栗供山谷贈比蘋蘩擷澗溪葅亂金􅁫入珍饌羮融玉糝脱汙泥程舂定覺人彊飯功校蹲鴟自不齊荆楚歲時金釵事見記次律兄以䑕盜防風感而作詩命某同賦嘉􅂼靈卉兩紛紛小摘山花自出群芽茁短根紅玉巻葉敷踈節翠旟分細看藥譜䥴遺録終擬騷經補缺文堪笑饑鼯穿敗篋寧知野彘力跑雲名山花野防風苗亦食之彘喜戯酬嘗草茶慣看留客費􅆶茶政羨多藏不示夸要使睡魔能偃草肯慚懽伯解迷花一旗但覺烹殊品雙鳳何須覔瑞芽待摘家山供茗飲與君盟約去驕奢某䝉學士兄相要陪賞芍藥花多白者月色相射光彩映發殆玉盤盂之苗裔耶維心有詩輒次其韻悵望揚州千朶盛數枝聊足慰淹留相逢月下陪真賞一醉花前得勝遊鑿落細斟金暈側盤盂斜颭玉光浮春衫並色渾無賴映帶霜毛笑隱侯溪亭夜坐波􅆕揺風暑氣微秃巾來坐釣魚磯相看月墮行人盡只有流螢上下飛松架聨絡樛枝架短簷蒼髯緑骨尚依然袪除畏日心三伏領略清風直四筵好在老龍蟠夭矯悞來孤鶴舞蹁躚那堪側雨敲牕夜貪聽颼颼自不眠代人作夀詩老人明處識斜河曾占􅂶閭爽氣多蚤以才名凌屈宋戯將詩律鬬隂何丹臺舊綴神仙籍黄屋仍埀將相科禮絶座間公未晩且提鴻筆上鑾坡英氣超超不可親温然笑語便生春絳帷久屬宗師任紫橐方㕘侍從臣八􅆕文章寧有敵一門忠孝信無倫山東出相公家事只擬尊前詠大椿張倅生日以詩為夀宿歲雕盤供五辛􅂶閭佳氣已生春俊游自合陪金馬英骨人猶記石麟別乗重分千里政五湖追數十年身知公隱徳冝難老鳩杖看扶法從臣詩悼鄒仲容教授骨相自清臞居然澹滿軀高文凌鮑謝勝略本孫呉鸑鷟期千仞驊騮殞半途傷心九泉恨那忍奠生芻徐縣丞挽章插架遺編滿依然手自臨瓌辭寧世用高調罕知音白髪浮湘意青衫忌鵩吟些招空徃事魂斷舊家林蔣司成挽詞法駕天臨五學初曾聞重席絶諸儒雍容久載從臣槖晼晚猶分刺史符不使高材陪鼎鼐卻􅀵清節傲江湖賤生無地從巾屨獨對遺篇想步趨召節西來屬老成乞身終欲返巖扄新書未奏三千牘舊説曾繙十二經漢室首推施氏易衞人端識孔悝銘儒宗學府今誰輩空使諸生記典刑曾逢原挽詞代劉侍郎落落江湖一偉人當年玉立映簪紳四朝耆舊推先達三國英雄出後塵金板袐謀空淟汨土門竒􅍔足悲辛懸知精爽猶堪畏嚼齒傳聞不滿齦驚聞義骨殞狐狸悵失中朝一吏師廣漢威名由擿伏寛饒直氣不容欺丹心共憤時多難白首相期論少卑滿眼西風空濺淚何心忍讀蔡邕碑安次山挽詞代劉侍郎都門惜別淚沾巾囘首孤城草木春封豕遙聞食上國疾風懸料識忠臣程嬰已􅂮終存趙楊子雖生輒美新青史高名知不朽遺榮猶賁土中身曉殿傳催玉筍班東風小立照衰顔臨分愧我江湖上伏節悲君矢石間徃事凄凉千古恨舊交零落幾人還殊方更致生芻奠目斷高丘涕淚潸劉資政韐挽詞國耻忍言城下盟忽驚河洛變羶腥心摧寳仗離宸極血濺轅門落將星請􅂮自緣鳴越甲乞師誰為哭秦庭高名㑹與丘山重一誦遺箴一涕零志士長悲處􅂮難唯公勇决一言間結纓季路空遺跡投閣揚雄亦厚顔義烈峥嶸昭國史忠魂寂寞閟家山隻鷄已負它年約下客傷心兩鬢班挽詞二首職為蘋蘩謹門推黻冕華㷀嫠初鞠㓜夀考竟肥家玉暗傳經簡金餘賜誥花班衣無復戯遺恨徹天涯耄期何所樂有子使三呉方享千鍾洎俄成五鼎踰御名光堯堂遺素幔祔域閟黄壚欲拜臨終像它年記結趺吳冝人挽詞夀富居然五福先簪纓况復世蟬聨斷機忐節酬平日舉案風流記昔年上郡方䝉湯沐地諸郎應廢蓼莪篇送車千乘松門道㑹有雙飛鶴戾天長短句浣溪沙和鄭慶襲雪中作雲幕埀埀不掩關落鴻孤没有無間雪花欺鬢一年殘欲把小梅還鬭雪冷香嫌怕亂沈檀惱人歸夢繞江干花信催春入帝關玉霙爭臘去􅅏間不禁風力又吹殘客舍不眠清夜冷縈愁一縷褭旃檀空庭月落斗闌干葛使君示書有元夕寒廳孤坐之歎昨日石林寄示所和長短句輒亦次韻和呈因以自見窮寂之態華燈高宴水精宮浪花中意無窮十載江湖重綰漢符銅應有青藜存徃事人縹緲佩丁東臥聽蕭寺響踈鍾渡谿風轉空濛月上孤牕鄰唱有漁翁追念使君清坐久歌一發恨千重又和葉左丞石林魚龍戯舞近幽宫亂山中似途窮緑野堂深門敞獸鋪銅無限青瑶攅峭壁花木老映西東
