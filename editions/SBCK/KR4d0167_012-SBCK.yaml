  text: 沈忠敏公龜谿集卷第十二
  hash: sha256:6ae0bc83dd83f7e61d93d78bd71effe4c626fddc1a566e1280010012483dd005
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0167_SBCK_012-1a}
body:
  text: 行狀墓誌銘祭文青詞定書朝請大夫盛公行狀曾祖得中故不仕祖卞故任漳州兵馬監押累贈右千牛衛大將軍父僑故任左朝奉大夫直集賢院知越州累贈朝議大夫公諱允升字徳常其先餘杭人公之四世祖蟠仕錢氏爵位通顯錢氏舉國内附遂徙建徳至集賢公宦游吳興樂其山水因家焉公資禀端亮自少小屏絶嬉㺯力學問道古今屹然如成人稍長喜為文辭采贍蔚一時賢士大夫咸稱其能元豐間神宗皇帝闢上庠以經術造天下士公挾其藝往試率占上游流輩多所降屈已而更元祐尚聲律公自度雕瑑之學雅非所好去之不復問三年哲宗皇帝親郊詔五品皆得官其子遂以集賢公䕃補太廟齋郎調開封府酸棗縣主簿未赴㑹集賢公捐舍館䕶喪歸葬潤州即廬次哀毁癯然杖乃能起卒喪尉潤之金壇哀弗忘也秩滿奉太夫人還居吳興屬歳饑盜斥境内州將病之先是烏程尉闕正員檄公攝領且語之盜公分曹督捕擇所脅從縱使縁畞而執其渠首械送州一境帖然州上其事司勲以格進官一等丞蘇之崑山縣崇寧元年官制行授登仕郎公之丞於崑山也事有便於民無巨細輒舉之其非所便不問久近必去乃已代有期傾邑詣州泣留公再任州不能奪請于朝時上方建鄉校復里選欲得能臣倚以辦事有㫖從之邑舊有先聖廟庳屋纔數楹公承詔一切更徹根椽寸甓不歛於民而落成先於諸郡部使者才之聨牘言上三年召至闕改宣徳郎簽判杭州未幾代回攝開封府司刑曹事尹辟公眞命且下公獨念太夫人春秋高不樂北宦匈還舊職是時東平吕公惠卿帥杭被㫖釋才吏訪境内逸跡備修九域圖志杭於東南為大詮次居多帥難其人比公至喜曰吾事辦矣即一以屬公公搜抉無遺事數月書成奏御遷通直郎通判揚州大觀二年上躬受八寳恩遷奉議郎往歳淮甸小歉春秋二租及官所貸緡錢在民者詔悉閣之而强家大姓寅縁為姦其非所應閣者詭免甚衆歳且豐猶抵之不以給上事公具簿最勾稽得實諭使償凡為錢數十萬以佐外計遷朝奉郎太夫人壽且九十矣念歳時姻族燕游之適在官下心未嘗一日忘吳興公惕然曰吾始以親故仕今所居非親所好惟食萬錢誼不忍即解印韍致其事以歸左右就養惟謹居無何太夫人以壽終公執喪如集賢公時益不懈政和二年當路以公年未艾才不宜遂休表復用訓詞襃許即以舊領階官司開封府户曹事方朝廷攷正徴角二聲庻燕樂以釐革鄭衛􅁋哇之習公上所著樂書數萬言論辨古樂所以析用中正之法甚悉上嘉用之改儀曹兼大成府製造官三年司勲奏公曩攝邑蘇之常熟捕獲盜鑄金錢法應賞由是累遷朝請郎九月燕樂成上命輔臣覆視唯公所製精妙一時特恩遷朝奉大夫踰月賜服三品皆異數也四年營奉明達皇后寢園與有勞遷朝散大夫俄得請知秀州五年公猶待次鄉郡以大晟奏功還朝請大夫一日忽語所親曰始吾乞身强徤自謂終老里門渠意及此今而歸罙足以侈上恩可但巳耶因復請休於家理別圃苕霅之上幅巾藜杖徃來其間澹乎若與世無營者閲秘典日數百紙要以了達死生人亦初未之知也居數月感疾命諸子具祕器􅁲壽藏既乃曰後事豫矣瞑目何憾即折簡素所從游告以逝日至日終于正寢治命不亂其悟解乃如此實政和六年閏正月十八日也公雅有䇿畫臨事不為茍且之計所至績效藹然有聞於時故所遷官率繇懋賞獨於榮利恬靜比再挂冠年猶未衰南州士大夫高其行愛慕在色使公彷徉以進則其所施設何如哉享年五十有八娶孫氏封宜人子男六人曰康迪功郎􅄔州兵曹掾曰庋迪功郎坊州司刑曹事曰庚庠庶序皆游鄉校為儒生女七人長適登仕郎朱徳延次適迪功郎錢均次適貢士陳琦次適貢士吳景信次適太學博士錢圻餘尚幼孫男一人女二人明年三月十四日諸孤奉公之柩葬于烏程縣九元鄉金蓋山之原先所卜也某與公實同里而公之子庋疏其治行屬於不腆之文且曰將求名世道徳君子銘焉以圖不朽謹叙次于右端謹狀朱夫人墓誌銘夫人朱氏世爲湖州安吉人父繹太廟齋郎自其曽髙以來號以貲雄於鄉然儒服蟬聯素風甚飭夫人㓜而莊靜整整有家法父母愛之爲擇良配得同里潘侯師仲歸焉夫人之歸逮事其姑能先意順適卒以孝婦稱於族黨之間事其夫恭謹如待遇嚴賔客娣姒雍穆怡怡如也潘侯少小喜自振拔其交游多四方才士大夫館榖如歸至傾家不問絲竹之娛帷帳豆觴之具必極情腆夫人職之也歸十年生三男子曰芑曰莘曰蕡潘侯卒時夫人盛年既終喪宜改適夫人聞之慟絶自誓弗許然二子甫勝衣其季在襁褓未能誰何也夫人克奉潘氏祀字其孤有幽閒淑名御之操三子既稍長知事夫人一日斥匳中物幾所於庭悲泣不自勝呼三子侍旁且誨之曰汝父平生時鍥意欲立門户非茍然者不幸棄諸孤蚤世吾哀亡撫存雖鞠窮不悔吾心固有處也今汝曹齒宜學其以詩書起家成汝父志顧何以籯金為其為汝資勉之哉三子相持泣謹諾即招聘四方知名士館之門下授以儒術如誓云三子資秀發嶷然可喜也為學務自刻苦在儕類中嶄嶄見頭角蕡遂一舉中乙科授迪功郎調髙郵軍司兵曹事迎夫人之官下㑹芑及莘由鄉薦肄太學夫人旦暮念之不衰蕡乃奉安輿西游上都以娛其意既至而蕡小疾不起夫人以客柩歸卜居郡之西闉曰吾不忘故里顧吾廬蕡兒時戲劇及其起居寢飯處歴歴在眼中吾不忍眎也汝曹脫有立庶幾釋吾此哀不然無以吾歸二子奉夫人訓相戒語激昻益不懈客有相過夫人從屏間闚之其人賢且色喜語諜而意嫚輒禁切不相還往故所與游多益者亡幾何莘亦相次中第授迪功郎調衢州西安縣尉歸拜夫人於堂下夫人疾已侵攝衣强起一眎之歎曰吾嫠居三十年天卒相吾二子俱成名芑故未偶度其趣操宜不墜厥家吾死何憾夫人疇昔嗜内典因索其書日誦之彌月忽若有得黙然宴坐瞑目而逝其了達死生雖學佛之徒自以弗逮實建炎戊申十二月十九日也享年五十有三有孫男七人曰梅曰楫曰楹曰格曰權曰相孫女三人皆㓜越明年九月某日諸孤奉夫人之喪歸葬於邑之東山鳳亭之岡將葬諸孤載夫人語泣請銘於予予謂人為善患不力誠力未有無其報者夫人志節終始凛凛乎不可奪烈丈夫有媿焉身見二子躐取名第起為搢紳家天之相其為善獲報豐矣鍾鬴之禄顧不能一朝享之殆其賦予然耶兹亦可悲也已三子少從予游且夫人行應銘義不得辭乃為之銘曰其殖也豐而用之冲不贏其躬其節也正而持之定不隕其姓此古烈婦之所難而夫人能然得不謂賢也耶是宜神者報之用錫爾祉迄成厥家克昌厥嗣鳴鳳之岡喬木蒼蒼銘詩孔昭百世之藏黄直閣墓誌銘祕閣黄君子虚殁既葬諸孤喪服更造予跣以泣曰先君子葬未克銘治命以屬公不肖孤其忍廢先君子之命敢碣墓以請予與君雅故且諸孤請益急則諾而銘之君諱策子虚其字也其先居建之浦城為望族世有徹官自大父游姑蘇樂其土俗因家焉今為姑蘇人曽大父浹累贈奉議郎大父挺仕承議郎累贈金紫光禄大夫父彦仕朝奉大夫君性豪邁風神峻拔方童丱時出語巳驚人弱冠一舉進士中乙科追和梁昭明所選詩持見眉山蘇公公期之曰異時必以文顯初選授杭州司理叅軍折獄精明吏屏息不敢㺯以事秩滿授開封府雍丘縣主簿元符末詔許中外言事是時昭慈聖獻皇后既復位號而典冊有未盡正者君上書引古義爭之言劇剴切藉藉聞搢紳薦者以君才磊落不宜浮沉簿領改授齊州州學教諭㑹崇寧黨錮之論起故老名臣鮮克免者君亦坐前所上書刻名黨石覊置登州二年徙海州既而上皇感寤斥用事大臣破黨論仆其石立碎之君例還姑蘇休官自號隨縁居士閉户讀書益自刻苦爲文章瓌詞老氣絡繹間起至其甚得意視古作者無媿也佳時勝日相羊山水間賦詩自娛澹乎若與世無營如是二十年故禮部侍郎鄒公浩諌議大夫劉公安世右司員外郎陳公瓘皆以敢諌爭名重當世君從之游上下其議論相厚善宣和中姑蘇守賈諲知君名强欲吏之辟致莫下諸君勢人意君可撼以禄爭為出力推輓齟齬不合去為浙西提舉司幹辦公事移京東改發運司主管文字君亦未嘗薄其官所居稱治上即位之二年改宣教郎通判嚴州明年召對行在所又明年上追録黨人除直祕閣其在嚴州數以爭可否忤部使者意使者嫉之誣劾君縱獄事按驗無所得卒奪一官左受宣義郎罷去退而築室五湖之旁日閱浮屠氏書要以刮去世故捐愛憎然其了達乃於死生之際脫然如去來忽一旦起盥櫛呼諸子侍前曰吾其脫於斯乎而輩行自力毋墜吾訓語訖危坐而逝實紹興二年八月十有二日也享年六十有三娶程氏生三男曰維曰纓曰縱皆以儒業世其家一女適從事郎胡總君作壽冢於靈巖之麓手植之木拱矣諸孤即以其年十月十日舉君之柩葬焉從其卜也先是君得元符詞臣手疏載上皇聖訓備言昭慈之復位號乃欽聖追用泰陵悔意驚且喜曰天也使泰陵之意白於天下死不恨亟上之君既殁始用昭慈戚屬信安郡王忠厚奏請詔以其疏付史官示萬世嗚呼君才百於人而不一試偲偲然為國納忠雖擯斥流落以終其身不少悔其亦可哀也已有文集百二十巻藏于家銘曰山盤盤兮松桂蕭森川渺渺兮魚龍嘯吟顧瞻中丘兮宛其幽深曰惟哲人之藏兮抱器陸沉訊來世兮誰其賞音祭張提舉太碩人文毓質名家作配令族脫畧華腴蘋藻惟肅洎喪所天守義彌篤有子九齡出入顧復訖為純臣慈訓所屬天實報之終享遐福累命重封金葩鈿軸壽介期頥隆養畢足詔起使華于此苫服敦匠事嚴不逺鄉曲歸祔佳城森然拱木吉路啓行哀榮其族躬致奠觴寓兹一哭祭陳述古墓文孔子之生也嘗所休止猶惡其木隂迨其殁也戒毋翦伐乃愛及乎孔林陳蔡之郊一飽莫續而塊然堆阜奉祀百世以迄乎今公於孔子之道聞而習之於數千載之後曷其能固結於人心生有顯位足以行其道術殁有遺愛足以流其徳音公之殁久矣而此邦之人所不能忘者顧典刑之具在想精爽之如臨像公儀形既修祠事而歳祭墓下猶庶幾其來歆俯視宿草仰瞻拱木蓊然而深茂者蓋樵牧知戒而無斤斧之侵况若某等推公餘澤以溉學者則永懷之極宜不能自禁一酹而招此故事也九原可作尚鑒時忱祭馮中書文嗚呼公乎才蓋一世高文大册爛乎星斗之陳崇論閎議沛乎江河之逝朝廷倚之屹然如山有不可奪之節搢紳望之凜乎如霜有不可犯之氣是故奮臂布衣曽不一紀而徑趨直步已正乎廟堂之位常人視之亦既達矣公所自視猶病乎未試方將跨喬松之年埓伊周之美胡不憖遺為國龜筮乃厭人間脫然而蛻嗚呼天故生公宜必有意其奪之遽亦復何謂蓋上比乎列星増光芒於舍次公之儀形無復望見而其竹帛之勲河山之誓則昭乎數十百世引此一觴文以侑哀公乎不來何以止此盈襟之老淚爲侍從官祭中書張侍郎文天生異材其必有意待時而爲騐若符契公起布衣以文自藝逮事上皇更踐中外治賦北垂錢流於地頻歳宿師民罔告匱靖康之初盗用出疆堂堂魏都謀帥不良城保弗竭襲盗以狂公頥指揮萬旅在旁羅拜叩頭戒無披猖謂公活我卒制一方眞人龍翔神器有歸公來自北謀疾扺􅀛賜履省户正冠殿帷直聲流聞上嚴憚之三接不又集于鳳池孰能恤國如恤其私意誠則固言直則危匪言之難無難不爲口如其心無有隱欺庶幾百年宏濟無疑梁木其壞天不憗遺訃音告外道路垂洟矧我在列心言是依同舟濟川公其楫維今也云亡胡寧不悲公騎星辰欃槍掩輝一觴以訣尚其昭兹爲侍從官祭郭樞密文嗚呼豪傑之士終克有為而其所施則有疾遲有端有緒與時為宜年不待期天或嗇之如大山川龍蛇所戲利澤發見物無不滋功用不究則誰測知公之所有閎汗瑰竒目無全牛矧曰割鷄奏刀發硎蘭陵是基動無留行名聲日馳惟時上皇用公於微延見燕間左右論思宵人好欺公見其幾一麾而去無有磷淄明明天子躬履艱危思見異人甚於渇饑返公于南付之樞機公曰天子雄武英威如漢高帝光武之資民散未收兵驕未治曷寧中區曷靖外夷我惟大臣寤興在斯惟既厥心恊謀同辭輔成上志無俾闕遺乃詢仇方尺箠以笞譬彼壞屋隨顛而支三年有成必濟登兹天胡不仁而遽奪之上為䀌傷股肱其􅃜嗚呼我官于朝日瞻羽儀曽未浹旬死生乖睽撫念疇昔失聲歔欷江風蕭蕭丹旐飛飛引觴告訣聊寫我悲祭劉資政文嗚呼古風弗還士有異轍氣吞九州或略於細行心畏四鄰或􅃜於大節公所自期則無玷缺太山喬松礧磈嶻嶭萬木歳寒獨傲霜雪公在布衣聲滿橋門諍臣之篇蔚有名言仕而克踐惟恐有聞人所甚難公處不煩絳帳幨帷出入師儒豸冠峩峩屹立天衢曰婉孌者匪予之徒迄自奉常遂躋禁途惟是靖康國勢岌岌邊遽日奔胡來益急肉食者鄙私忿角立公抗論之去位而泣眞人御極還公於朝貳卿常伯恩榮孔昭公發忠言不替夙宵南昌之禍匪公之招天子有命一洗公寃意將復公以掖至尊炎方瘴毒死生乖分喪來自南莫返忠魂嗚呼哀哉惟昔文正搢紳之師公實希之極力以追立朝之節此心庶幾强恕求仁化及惸嫠我從公游垂二十年公一見我推挽後先我豈忘公平生之言百年莫贖尚可忍論何以奠之生芻一束侑以斯文失聲慟哭嗚呼哀哉尚饗焚黄祭文二首維年月日嗣子沈某謹以清酌庶羞之奠敢昭告于先考承事之靈某不孝䝉先人遺訓得官于朝弗洎之悲號天罔極今天子有事於明堂霈澤四海厥有贈典追賁埏塗恭致時羞以燔綸告惟先人其克享此休寵用庇子孫瞻望松楸不勝永慕嗚呼哀哉尚饗嗚呼哀哉昊天不仁早奪吾母蓼莪之感曽莫報於劬勞濡露之悲空永懐於怵惕今天子禮成宗祀澤霈九泉錫號疏榮載于綸告庶幾可慰罔極之思慈顔如臨其克享此休寵用庇子孫權殯告淑人范氏文嗚呼哀哉君歸我家十有九年我仕不偶半世迍邅鞠窮閔凶奉我周旋克相内事見謂爲賢比我叨榮遭時多艱心期安平白首相歡別我經旬歸歛君魂空閨無人誰與話言嗚呼哀哉弱子稚女號呼徹天失此慈母誰拊誰憐顧瞻山林卜云未安今舉君棺槀葬祇園牛衣之泣尚何可論長號永訣失聲煩寃嗚呼哀哉尚饗安葬亡妻范氏祭文嗚呼自君之逝既閱初祥窀穸未安夙夕靡忘爰得吉􅁲大壯之陽與我先壟喬木相望將舉君柩兹焉永藏引觴告訣言出涕滂嗚呼哀哉尚饗焚黄祭文曽祖太子太保曽祖母同安郡夫人方氏祖太師祖母魏國夫人孫氏某䝉祖宗遺徳獲以儒學致身于朝與聞政事厥有襃典及我曽祖一再錫命而至宫保曽祖妣一再錫曽祖妣云及我師祖母云及我祖妣申錫寵命遂開全魏之封命䟽封大邦祖云及我先祖申錫寵命位極公贊書具存謹燔以告伏惟英靈昭兹垂福于後尚饗先考太子太師先妣濟陽郡夫人丁氏某不孝被服慈訓夙夜兢兢罔敢墜失獲以儒學致身于朝與聞政事厥有襃典及我先人申錫寵命至于宫師錫寵命疏封大邦先妣云及我先妣申贊書具存敢燔以告嗚呼弗洎之悲昊天罔極尚其昭鑒垂福後人尚饗通義郡夫人某䝉天子恩睠致位于朝與聞政事厥有襃典錫君大郡之封兹亦榮矣贊書具存謹燔以告嗚呼糲食布衣同我艱苦榮不逮生胡寧不悲尚其鑒之服此休寵尚饗追薦亡妻淑人范氏設醮青詞魂氣無不之用返歸於眞宅道術無不在示濟拔於埏塗輒罄哀誠仰干洪造伏念臣亡妻淑人范氏比嬰微疢忽隕盛年日御遄移霞衣永閟一生艱苦之狀何忍回思罪垢之因須慿追悼是用祇延羽服光啓蘭􅂣演三洞之道言營九壇之法事裒集勝利洗滌宿愆長夜㝠㝠冀脫幽關之趣圓虚渺渺願陪仙路之遊更錫羨於私門普承休於妙䕃生日設醮祈福青祠列宿昭回分直受生之次層霄縹渺密持司命之權敢露危衷仰干洪造伏念臣性資䝉昧家世伶俜偶奮跡於寒鄉驟登名於膴仕雖福輕乎羽全繄覆䕶之恩然徳輶如毛每懷顛覆之慮頃悼亡於私室俄去位於公朝終戒滿盈遂投閑散尚懼身既湛於世俗行或負於神明動積愆尤居亡解謝適㑹劬勞之日肅事禬禳之科恭款琳宫具宣蘂笈薦蘋蘩之品庶存貴質之儀陳螻蟻之誠必達蓋高之聽精純感格肸蠁顧臨整雲斾之逶迤開天門之昳蕩正直是與願盡滌於百非壽考且寧期永綏於五福定親書二首藉甚名門託高明之可援蔑然賤息懷伉儷之是求諒事契之相重許姻聨之復締某第二子青衿業墮道學未優伏承賢女小娘子彤管訓嚴徳音甚美恭馳五兩之幣願結二姓之歡鳴鳯鏘鏘想發占於永世夭桃灼灼期見詠於宜家為葉內翰撰烏衣羣從嘗陪再世之游丹桂諸郎雅重同年之好儻縁夙契復締華姻伏承令孫女柔惠慈祥徳音甚茂而某姪孫某稚騃朴鄙道學未優屬當伉儷之求宜託高明之援恭馳信幣願結歡盟為長男回定書二首宦學從游雅有潘揚之睦昏姻合好願交秦晉之歡伏承令郎某官名第相先人門俱勝而某第幾女笄儀甫就壼則未閑豈圖葑菲之求適遂松蘿之託相攸甚樂敢無告於良媒卜世其昌將有依於令族奉承祧之祀宜得名家稽合姓之文猥從衰裔豈攀援之敢爾亦氣類之適然伏承令弟先輩種學已優秀發桂林之上而某姪孫女肄儀猶簡迨及桃華之初既諧卜世之昌克遂相攸之樂將歸令族敢告良媒沈忠敏公龜谿集卷第十二終
