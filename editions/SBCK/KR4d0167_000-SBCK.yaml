body:
  text: 第一卷古詩山西行次韻劉殿院贈錢圃翁遊玲瓏山因訪朱氏草堂奉陪安守登膴原觀觀網魚子修歩屧相過屬疾不能倒屣戯贈寄題淄川王景發肯御名光堯堂何子楚爲范明倫賦九疑石石吾不及見也讀詩可以知其巑岏秀峙之狀吾累十峰石爲小寒林興寄不淺用其韻并及之次韻題沈傳曜瘦節堂劉行簡見借詩槀以長句歸之送章文虎秀才歸荆南次韻曾守懐玲瓏山何亨老築堂里第榜曰安虛蓋取司馬子微不受外不逐外之說屬某賦詩以見意云次韻何子楚食櫻桃擬古次韻黃子虛同飲葛次顏家釀玉友次韻李元叔田􅀖鎭唱酬之什讀成士瑴詩卷和其書事一章錢塘賦水母泛舟村落阻風不能少進而菱梢芡觜繚舷上下篙人病之夜坐感事戊申初寒偶作十里巖石壁夜書山驛績溪寨口聞招㓂寧國道中夜宿千秋嶺下田家溪上見梅次韻張仲宗感事次韻允廸祕監同年所寄會稽唱酬之什鄭維心約趙安道中大家凡次律學士及僕探梅城山乘月泛舟而歸臘月二十六夜大雪投曉霽色恍然鳥語啁啾便有春意感而賦之次韻葛魯􅀸送示近作一通二首葛魯􅀸再和復用前韻奉酬葛魯􅀸再和復用前韻奉酬奉題思上人妙峰堂維心方刋正三國史某以精筆遺之蒙餉大篇爲謝氣格渾然三復感歎謾依元韻奉和蕪陋增愧長樂梁世則爲余言林氏達觀樓横海嶠天下奇景也索詩爲賦一章和張仲宗送柯田山人歸隱鄭維心用張仲宗韻見贈復次其韻奉酬次韻葉左丞見寄希顏提舉愽士謁葉公左丞於石林公遺之詩屬余次韻夾竹桃花􅁞松下追凉第二卷律詩呈唐子明同年攝尉歸安呈江嘉小雨清明日曉晴舟過荻塘夏日書事秋日戯呈蔣達可檢討同官用僕秋日詩韻述懐因復和之從劉殿院借書過徐氏莊居與道按田至湖山有詩凡九章次其韻㳺天平山白雲泉題靈源寺雲隱軒題林屋洞口題靈祐觀毛公壇觀題上眞宫題華山寺過徐氏郊居到吳感事旦日趨府次韻秀守苗郞中喜雨次韻盧憲小雨雨不止新春書事次韻盧憲春思清明報中有盛年休官者感而賦詩有懐山中次韻宏父喜雨行簡以曽守韻見貽復和一篇申應時以圖尋山圖所載湖之西溪也爲作二絕句客至具餉庖中止有豚肝客不食次律兄持節燕山且調兩河兵賦喜而作詩喜次律兄見過倦夜單顏徒以盗失邑􅀍譴赦令復官喜而有詩次其韻土人腊蛙見餉爲作此詩送别莊子經解官作二詩道别有江湖蓑笠之句次其韻兼叙離索秉元以按田至村落有詩次其韻巖桂次韻行簡北城登眺述懐行簡釋奠學宫登北城眺覽有詩嘗次其韻再和二章曾守置酒月波樓以張倅至有詩命坐客同賦夜坐曾守病目以治法與之有詩見貽次其韻次韻曾守立春席上七絕句月波樓會景亭次韻楊縣丞見寄次曾宏父韻曾宏父作詩别行簡索僕同賦曾宏父將徃霅川見內相葉公以詩爲别次其韻以自見舟行卽事舟過北塘羞墓在嘉禾北塘朱買臣妻墓舟次吳松江吳江阻雨過豁然閣次周廉彥韻燈上人頥齋次韻江元壽題寧境寺湖光亭舟中聞元用遂魁天下士論歸之輒成五十六字呈宏父車馬至中都當舉似也吳門别曾宏父還憇湖光亭復次江元壽韻次韻錢德􅀄九日旅懐三絕過嘉禾野塘僕夫自燕山來云有次律兄書􅀍盗失去杜季習遊恒山謁府帥劉公輒次劉彥常韻作二詩送之董罙大有詩紀吳江豁然閣舊遊索僕繼和次韻河陽張先父秀才託長興吳宰僦居寄次律兄學土柯田山新居沈景修宗博示試院書事二章次其韻次韻院中四絕句石壁寺山房卽事石壁寺無言頒政以詩寄行簡輒次韻行簡用前韻見貽復和酬之過十山次韻朱仰止澗亭絕句昔年秋懐二首卽事秋日閑居送盧左司赴闕舟中口占野外罕人事過竹西贈老禪成士瑴校登眞訣埀就爲此詩問訊居三茅成欲卜謝葛魯􅀸雪中遣介送酒第三卷律詩長短句附正月十四夜觀燈南寺子虛有詩次其韻兼呈駿發次顏再用子虚韻和呈駿發次顏子虚復有詩再次其韻次夕雨作用子虛韻奉懐次顏知魚軒小集别群從􅆶歩將達行在所陳子尚博士休官還京口作此詩餞之得家書觀瓊花卽事和卓彥翼卽事次桐廬於濳道中新城道中宿葉璋橋庵舎水閣小憇祈門道中遇雨東西二林寺千秋嶺者盗發旁近復於此守禦錢氏嘗築四壘以限江南北次韻鄭維心臘月十六日有作次韻避㓂二首游城山夜歸泛舟南溪次韻李通􅀡題慈相寺雪月亭扈御舟泊錢清江口值雨過平望次吳江冬至遇雪題明因寺僧房方允廸隱鸕鶿谷江子我子之劉希顏行簡皆徃依焉爲此詩寄贈八月十七日扁舟渡錢塘江允廸招行簡卜居鸕鶿谷僕意羡之作詩送行兼以自見維心過邵子非溪亭夜話有傷時感舊之作索余次韻劉希顏持節按縣招維心舟中小酌次維心韻子虛航重湖之險遠過山中輒次維心韻以謝次韻學士兄見一亭次韻學士兄述懐次韻黃子虛所居隨綠堂次律兄餉魚魚不至而詩至頗􅀋南海使君送酒輒成二絕一笑而巳賜茗少分以報厚意曉過鄰村卽事過梅知宫東軒允廸遣書問訊并寄示與子我唱酬佳句猥及微蹤輒用廬字韻爲二詩以報嘉惠書懐三首劉希顏提舉見過出示卞山居二詩次其韻張仲宗有詩懐歸因次其韻勉之南北山探梅俱未花維心從家圃折數枝以餉坐客蓋半開矣㑹次律兄有詩輒次韻次韻鄭維心探梅未花復次韻呈維心拙澀不工當爲抵掌次韻維心憶梅次韻行簡懐次律兄邵子非謂予有天台之行見貺以詩次其韻次韻劉希顏蠟梅二絕次韻雪月下獨歩次韻次律兄除夜述懐次律兄以蘆菔見餉并有詩次其韻次律兄以鼠盗防風感而作詩命某同賦戯酬甞草茶某蒙學士兄相要陪賞芍藥花多白者月色相射光彩映發殆玉盤盂之苖裔耶維心有詩輒次其韻溪亭夜坐松架代人作壽詩張倅生日以詩爲壽詩悼鄒仲容教授徐縣丞挽章蔣司成挽詞曾逢原挽詞代劉侍郎安次山挽詞代劉侍郎劉資政韐挽詞挽詞二首吳冝人挽詞長短句浣溪沙和鄭慶襲雪中作葛使君示書有元夕寒㕔孤坐之歎昨日石林寄示所和長短句輒亦次韻和呈因以自見窮寂之態又和葉左丞石林第四卷內制除郭仲荀武㤗軍節度使依前侍䘙親軍歩軍都指揮使權主管殿前司公事制賜朱勝非辭􅊵新除右僕射不允批荅賜席益辭􅊵侍講不允批荅賜叅知政事孟庾辭􅊵通議大夫恩命不允詔再賜孟庾辭􅊵不允詔賜新除翰林學士知制誥綦崈禮辭􅊵恩命不允詔賜新除禮部尚書􅇝擬赴闕詔賜新知平江府趙􅂦辭􅊵不允詔賜尚書左僕射領江淮荆浙都督諸軍吕頤浩生日詔賜叙復平海軍承宣使蘭整辭免恩命不允詔賜張深程唐劉子羽奬諭詔賜新除慶遠軍節度使􅂶醴泉觀使特封德清縣開國子食邑五百户食實封二百户邢煥辭􅊵恩命不允詔再賜邢煥辭􅊵不允斷來章詔親征詔賜川陜宣撫處置使司詔親征戒諭州縣詔招從僞士大夫詔賜吳玠詔賜韓世忠詔賜張浚詔賜三省銓擇監司郡守詔賜張浚詔賜劉光世韓世忠張俊詔賜李綱詔第五卷內制表附賜岳飛詔車駕進發賜臨安府詔諭賜劉光世張俊詔賜李綱詔賜吕頥浩詔賜劉光世詔賜交趾郡王李陽煥曆日勑書賜武㤗軍官吏僧道耆壽等示諭勑書賜吳玠王彥關師古奬諭勑書賜朱勝非辭􅊵右僕射恩命不允口宣賜郭仲荀辭􅊵特授武㤗軍節度使恩命不允口宣賜孟庾辭􅊵進通議大夫不允口宣賜邢煥除慶遠軍節度使􅂶醴泉觀使辭􅊵恩命不允口宣上太上皇帝表上太上皇后表代高麗國王王楷表二首內中祈禱感應攺謝道場開啓詞文内中祈禱感應青詞冬至御侍巳下賀皇帝詞語代賀元㑹表二首代賀收復杭州表代提舉常平謝到任表代謝賜出身表代謝轉官表一首代賀南郊禮成表三首代賀明堂宗祀禮成表代賀天寧節表代謝侍講表爲吏部魏侍郞謝表爲魏侍郎謝得請宫觀表爲顏左丞謝賜生日生餼表爲顏左丞謝賜生日生餼笏記第六卷表謝除御史中丞表謝賜對衣金帶鞍轡表謝除吏部尚書兼權翰林學士表謝兼侍讀表謝除職名宫觀表賀冬至節表謝知鎭江府到任表謝除吏部尚書表謝除兼侍讀表辭􅊵除叅知政事表謝除叅知政事表謝賜牙簡金􅅁表謝賜生日羊酒等表辭􅊵扈從轉官表謝扈從轉官表謝賜御書車攻詩表謝賜生日禮物表謝除職名宫觀表車駕廵幸平江府起居表轉官許回授與兄謝表辭􅊵除同知樞宻院事表謝賜生日禮物表謝除同知樞宻院事表辭􅊵除知樞宻院事表謝知樞宻院事表第七卷奏狀劄子殿中侍御史乞宫觀劄子辭􅊵除侍御史劄子辭􅊵除侍御史奏狀侍御史乞宫觀劄子辭􅊵除御史中丞奏狀除御史中丞舉左司員外郞潘良貴自代狀辭􅊵除吏部尚書奏狀辭􅊵兼權翰林學士奏狀除吏部尚書舉左朝奉大夫􅀡龍圖閣辛炳自代狀辭􅊵侍讀奏狀乞罷除龍圖閣學士荆湖南路安撫使兼知潭州奏狀除龍圖閣學士舉左奉議郞莫仲珪辭􅊵吏部尚書奏狀知鎭江後除尚書辭􅊵辭􅊵吏部尚書第二狀除尚書赴闕奏知狀辭􅊵侍讀奏狀除吏部尚書舉度支郎中李元瀹自代狀辭􅊵除兼翰林學士劄子辭􅊵除叅知政事劄子辭􅊵賜金帶劄子辭􅊵轉官劄子辭􅊵支賜劄子與左相等爲亢旱乞罷政箚子再與左相等乞罷政劄子乞外任官觀劄子謝賜鍍金銀鞍轡奏知劄子謝賜御書車攻詩劄子乞岀劄子乞岀第二劄子乞岀第三劄子辭􅊵賜生日禮物劄子乞岀第四劄子乞岀第五劄子乞岀第六劄子乞岀第七劄子乞岀第八劄子第八卷劄子辭􅊵除資政殿學士知明州劄子辭􅊵除資政殿學士知明州第二劄子辭􅊵除資政殿學士知明州第三劄子辭􅊵轉官上宰相劄子辭􅊵勑令所修書成轉官劄子辭􅊵勑令所修書成轉官第二劄子辭􅊵勑令所修書成轉官第三劄子乞囘授勑令所修書成轉官與兄􅁥嶽劄子辭􅊵除在京宫觀侍讀第一劄子辭􅊵除在京宫觀侍讀第二劄子爲病未及朝見奏知劄子辭􅊵除同知樞宻院事劄子辭􅊵除知樞宻院事劄子啓代賀帥臣平㓂啓二首代漕臣謝㓂平除職啓代賀人得郡啓代賀兵部尚書啓代賀中丞啓代賀林中書知楊州啓代人與尚提學啓代人轉官賜第謝宰執啓代謝除發運啓代謝轉官啓代賀翁中丞攺知杭州啓代賀胡提刑啓代賀張舎人啓代賀韓舎人啓代賀宣撫啓代賀太宰啓代賀少宰啓代潁州王待制謝執政啓代賀右丞啓爲户部葉尚書囘諸路使者啓代謝還任啓第九卷啓賀除􅅏守啓問候中書啓賀漕使加職啓謝薦舉啓謝運使差權知縣事啓問候運使啓新令遠迎啓賀毛給事啓賀賈舎人啓謝攺差常州學官啓賀馮承㫖啓賀新守盛學士啓賀盧左司啓賀毛顯謨知鎭江府啓賀正啓同前謝祭酒舉攺官啓謝蔣廸功啓賀盧舎人啓賀周司業啓賀林資政除南京啓謝薦舉啓賀毛顯謨除眞定帥啓賀盧給事啓賀黃司成啓賀湖守葛待制啓賀盛守再任啓第十卷啓狀附謝運使胡修撰舉攺官啓賀年啓謝秀守苗郎中舉攺官啓謝運使王待制舉攺官啓賀提刑啓賀沈狀元啓賀左丞啓賀張狀元啓賀凌先輩啓謝黃子虛學士啓謝曾顯謨啓賀趙叅政啓知鎭江與户部姚侍郎先狀知鎭江通用謝狀知鎭江與韓帥先狀知鎭江囘人賀啓知鎭江府到任謝宰執啓問侯劉帥啓除尚書囘人賀啓囘孟叅政啓謝席叅政啓謝前宰執啓謝劉宣撫啓囘汪相公啓囘知福州張叅政啓囘李觀文啓賀孟觀文啓謝送生日詩狀囘路樞宻謝復職啓囘折樞宻啓轉官許囘授與兄謝宰執啓賀張叅政啓囘賀正狀囘趙相公啓