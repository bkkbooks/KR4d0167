front:
  text: 忠敏公􅀛谿集敘忠敏公者呉興武源之􅀛溪里人也􅃇有􅀛谿集鐫行􅀚文殿李公诠次顛末详㢤其言之矣頋時代逓遷簡帙淪失幾不萩覩偶淂善夲披玩再三因之動繹思焉士君子渉世泯泯沁沁毫無建竪如飛烟冷風者何可􅃌数惟貞介􅅛偉之士稱焉按家乗公夙披英异酉蔵汲􅄟靡不寓目抒為翰藻遒勁㛠雅􅉨􅉨􅃩人唇吻性鯁特無脂韋態歴三院御史中執法鋤撃佞衺風裁凛凛方鑾輿南狩夷氛滿眼舉朝鍶鰓下穹虐之拜矣公力排和議􅂆駕􅇂征事維中格而一腔忠赤皭然与日月争光谓為中興人物冠冕谅㢤迄今五伯年而诵其遗文想見其人亭亭直上之氣時露扵楮穎間惜也龍劒躍扵延津玄珠扵赤水幸存殘稿不絶如􅅁夫英雄弔古片言契合几席千秋雖其人與􅇧俱朽而瑶業琬琰争耀词壇即曺笔可㷊而中郎之帳可秘矧扵丗系相承肸蠁相通如不佞木者䏻無尸祝􅃵墻之意乎縁受之梓而為摭攟一言要之公自􅁕不朽云萬曆庚子􅀊秋八月之吉十六代裔孫子木汝南父書于金􅁜奉之􅀚省堂沈忠敏公􅀛谿集序元樞忠敏沈公當建炎紹興間被遇思陵爲耳目股肱其勳業在朝廷其聲名在天下其風節挺挺特立號稱名臣蓋中興人物之冠冕吾鄕閭之光寵也紹興三年由吏部尚書奉祠歸里門伯氏桐廬丞彥衡字元䂓自公在憲府實客館下與其諸子游雅相好也時彥頴年十有五學於伯氏早暮見公來館舎相對無雜語論文說詩亹亹不倦尤喜論體製格律源流所自不務茍作每從㫄竊聞之則知所忻慕焉時方亂定才大夫士游居郡邑者以十數相與賡唱爲娛樂篇章流傳得輒誦記若其它文藁伯氏又能􅀵拾藏于家得以時時覽觀顧方爲童子雕􅂐之習它未暇以學莫􅀗拜下風而請焉而公蓋甞辱撫憐之曰是子可教也未幾詔起公鎭京口召還仍爲天官掌內制遂持鈞樞位貌殊絕無所窺尋其聲光巳聞君薨于位矣年甫五十二家在故里旁無壯子弟平生著述文字故多散落或爲親黨取去此得於所聞者如此而吾伯氏亦且下世諸子都未省事凡得公手筆起艸與所抄録在紙者皆亡之雖徃還尺牘無􅅏者惜哉後六十年當紹熈辛亥公之孫詵爲浙漕始能衰輯類次爲十二卷將以板行於世蓋其家所存止是矣以序見屬念自少小知敬重公今甲子一終旣篤老矣撫徃念舊安能無槩然也公英邁絕人早以翰墨知名歷三院御史中執法排姦擊邪風采峻厲觀所作中丞謝表有曰本之以忠厚愛物之誠加之以正􅀡事君之道故甞爲之言曰此御史箴也或謂公在臺中論議少恕是何足以識公之用心視草禁林得代言體親征詔書凡四方聽聞之者莫不感動流涕庻幾乎奉天之作此特􅀻愛味之故云爾初衣冠南渡一時能言之士衆矣當其時儕流之所推稱學者之所宗仰如公者屈指幾人而後來或未之詳也傳世行遠其始自今公爲不亡矣公諱與求字必先其立朝出處之大節固載之史官獨始􅀄親見之幸夙昔願學之􅀻因得自見於此十一月旣望觀文殿學士宣奉大夫致仕吳興李彥頴序叔椿少時聞􅀛谿先生以文鳴當世及長從搢紳賢士遊又聞以􅀡道結主知以盛名諧人望由是歷霜臺冠常伯兼翰苑兩總天官進叅機務再秉事樞崇論谹議鴻文大册天下傳而誦之謂常楊燕許復出矣叔椿每得一篇笥而藏之如至寶每以不及全見斯文爲恨淳熈紀號之三禩叅政姚公以天子大臣來守泉越數月政清訟簡出􅀛谿所爲文十二卷命叔椿爲之讎正玩味不能釋手􅅏月餘始克歸其書又俾爲之叙竊喜附名不朽有榮耀焉乃不辭而承公命甞觀皇朝晏元獻公被遇仁宗而富文忠公繼登揆路冰清玉潤勳業宏茂載在史册後世歆豔􅀛谿公丈人行也其名德相望前後輝映又能集其文而流布之益昭述作之懿顧不韙歟先生諱與求字必先仕至知樞宻院事紹興七年六月薨于位若平生出處之大方則有給事劉公一止狀其行事爲詳茲不復列四年三月一日從事郞􅂶州學教授永嘉張叔椿叙沈忠敏公􅀛谿集目錄
