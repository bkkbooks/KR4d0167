body:
  text: 詔勑書口宣表内制詞文表賜岳飛詔比得張浚奏知湖湘之冦悉已肅清紓朕顧憂良用欣愜非卿威名冠世忠畧濟時先聲所臨人自信服則何以平積年嘯聚之黨於旬朝指顧之間不煩誅夷坐獲嘉靖使朕恩威兼暢厥功茂焉腹心之患既除進取之圖可議緬思規畫嘉歎不忘然恐招撫之初人懷反側更宜綏輯以安衆情措置得宜彼自馴擾必與卿計之熟矣或有陳請可具奏來車駕進發賜臨安府詔諭朕以諸將之兵分屯江上捍禦敵人暴露勞苦今將幸其營壘親撫勞之庶幾戮力一心以安宗社疆事稍定即議回鑾咨爾此邦之人當體朕意賜劉光世張浚詔得張浚奏比至太平建康閲眎卿所部軍馬武藝精彊士氣振發他時卻敵決取成功至於紀律嚴明秋毫無擾民旅和㑹上下安定繇卿訓督所致良用歎嘉故兹親筆奬諭想宜知悉賜李綱詔朕以大江之西俗輕而悍朔兵之㓂無歲無之師旅薦興民益凋瘵肆圖舊弼往鎮臨之卿威名徳望聳動一時風采想聞人自慴服起于閒館作我价藩匪惟指顧之間一變潢池之習先聲所暨諒折遐衝朕之用卿審矣卿宜以安社稷為已任勿間中外勉為朕行不必數有請也故兹親筆詔諭卿其悉之賜吕頥浩詔朕以湖湘八州之地西通巴蜀為國上游往連盜區一方騷動比者招輯雖巳畧平而民俗剽輕或易生變允藉耆徳往鎮撫之乃起卿燕閒之中而屬以方面之事庶期談笑坐以銷萌慰彼黎元增重形勢而抗章固避殊咈于懷惟卿社稷元老身任安危必不以内外為間諒應聞命慨然引途故兹親筆詔諭卿宜悉之賜劉光世詔覧奏欲赴行在奏事必有為國經理之謀歸以告朕良用嘉歎朕意亦欲卿一來縁遣相臣浚往江上眎師行日甚近又恐縁此滯留俟浚至彼卿可一面商量或更有所見具奏以聞固所望也卿宜悉之賜交趾郡王李陽煥厯日勑書朕正位凝命纂聖緒於累朝治厯明時加王正於率土眷爾藩服為予世臣適臨改歲之端宜膺頒朔之慶占耕期於農扈克謹民功奉貢職於象胥必遵侯度今賜卿紹興三年日厯一卷至可領也故兹示諭想宜知悉秋冷卿比好否遣書指不多及賜武泰軍官吏僧道耆夀等示諭勑書朕以郭仲荀將門華胄帥閫勁臣出則摠䕶於戎行屢任爪牙之重入則典司於禁衞見謂腹心之良再扈巖廊之居彌肅綴衣之列嘉乃忠節推其勇功肆開屏翰之雄盡復節旄之舊逖惟雅俗素服能名及聞廷號之朌必盡輿情之望今特授郭仲荀武泰軍節度使依前云云賜吳玠王彦關師古奬諭勑書朕乗厯運之中微屬方隅之多故兵塵數起邊候屢驚永懷秦雍之區久罹兵革之禍暴骨滿野連城為墟興言霣心引望流涕式資驍鋭之將屏此塵氛庶使創殘之民脱於塗炭卿世家隴右氣稟山西攄忠憤於胷中燀威稜於塞外運竒合變並施九拒之謀鼔勇爭先悉用萬全之畧潜軍一舉迸騎四馳折敵勢於方驕激士心而復振兹為社稷之衛良慰鼓鼙之思然念歲月倭遲風霜偃薄勤勩雖由於爾力咎責實歸於朕躬更奮鷹揚之師益殱蟻附之衆剋復疆土撫定黎甿赤囊之㨗累傳功既存於廟祏丹書之誓永固福自及於子孫各堅乃誠勿忘朕訓賜朱勝非辭免右僕射恩命不允口宣卿功存應變徳協鎮浮廷號肆朌朝僉允穆宜膺睠意往柄宰司賜郭仲荀辭免特授武泰軍節度使恩命不允口宣卿家傳韜畧世載勲庸忠謹自將簡注惟舊復朌節鉞仍侍殿巖往復異恩益圖休烈今賜卿告想宜知悉賜孟庾辭免進通議大夫不允口宣卿摠䕶戎行掃平冦虐襃功未稱避寵奚為其服恩章勿形遜牘賜邢煥除慶逺軍節度使充醴泉觀使辭免恩命不允口宣卿系出儒家恩聨戚里謙恭有守静慎無譁齋鉞既朌廷紳允穆往承茂渥勿復牢辭上太上皇帝表臣構言籲天迫切乆期鑾輅之還閲歲推遷猶闕寢門之問想百靈之犇衛致萬福之來宜中謝恭惟太上道君皇帝陛下道格神明仁霑動植釋位退託雖殊南内之居履時艱危未返北征之馭臣尚遲虞侍每積憂思民心徯於歸君彌極天旋之望帝命從於與子必諧晨省之祈臣無任上太上皇后表臣構言慈闈猶阻屢驚歲月之移夀斚莫陳每積晨昏之戀隂知天意密䕶聖躬中謝恭惟太上皇后殿下徳庇六宫恩涵萬宇練衣出笥素存椒掖之䂓翟馭旋途應罷瑤池之集臣思深語咽望極涕零冨貴不足解憂􅃱孝當嚴於大養疾痛則必反本祈恩式佇於遄歸臣無任代高麗國王王楷表二首臣某言仲秋漸涼恭惟皇帝陛下聖躬萬福臣某誠瞻誠祝頓首頓首竊念臣叨司蕃寄襲箕子之餘風瞻望宸居效封人之善祝臣無任臣某言今年六月十七日迪功郎吳敦禮至奉詔書一道者使指遄臻訓詞俯逮豈圖疎逖敢冒寵靈中謝恭惟皇帝陛下出震以應期乗乾而御變非后何戴民咸懷于有仁其命維新天亦佑于一徳時雖屬于多故日可期於太平言念下蕃素陶聖化之屏之翰曾莫效於微勞為龍為光乃屢叨於異數頃馳賤介祗述貢儀可嗟一葦之航未能汔濟致使小邦之信不獲升聞深自凌兢莫遑啟處適以遭家之多難又稽繼歲以入朝敢期睿明灼見誠悃特講省存之典俾知眷遇之豐恩實非常報將安所復禹之績願克紹於先王曰商是常期不隳於舊職臣無任内中祈禱感應改謝道塲開啟祝文伏以官占告異乾象示威妖實自於人興孽匪從於天作惕惟眇徳肅事沖和荷眷顧於靈虚匿光芒於杳靄況撫艱難之運尚懷惴懼之誠庶保祥圖悉回咎證内中祈禱感應青詞伏以菲徳賜圖期副天心之眷妖芒動色致干星象之臨深惟謫見之端聿懷銷復之慮忱誠密叩威命潜回發精祲於至和還次舍於常度更祈貺施益勵寅恭冬至御侍已下賀皇帝詞語伏以一氣潜萌驗羣隂之退聽七日來復推五福之類升恭惟皇帝陛下躬履勤勞志成戡定緝熈庶政深得損益之宜陟降百工大明消長之分茂對舒長之旦式膺蕃衍之祥三靈顧歆萬宇寧謐妾叨塵禁侍獲奉宸慈測繡縷之初遲騰夀觴而胥抃表代賀元㑹表二首清臺紀候載臨七始之期路寢頒常丕講三朝之㑹恵均黎獻喜浹寰區中賀竊以輯五瑞於虞廷止稱羣后辨九儀於周室爰及諸臣蓋將受萬國之朝因以上四方之計欲稽本始宜在端元恭惟皇帝陛下凝命紫清匹休黄序愛育萬物則仁行如春照臨百官則徳進乎日故極舟車之所至皆奉琛賮以攸歸乃究皇儀聿宣帝澤庭實千品肅正守之臚傳陛㦸百重壯周廬之羽衛威容備舉物采彰明遂修曠古之闕文以續累朝之盛典臣繆當支郡方遠周行目想雲霄猶記鈞天之九奏身居湖海阻陪嵩嶽之三呼法座端臨懋講初元之㑹禁庭肅設並造大昕之朝折俎均慈康衢溢喜中賀竊以六年考五服之制度雖本周官三朝受萬國之貢珍實存漢法蓋體一元統始之義以識庶邦享上之誠宜在昌期克修令典恭惟皇帝陛下紹休累聖席慶叢霄道樞得乎環中徳澤施乎方外盛禮興樂與三代以同風執䞇奉琛致九州之共貫因歸事於宰旅遂辨等於司儀時乗嗣歲之興詔即當陽之御陳百寮而賛羣后臚句交傳尊中國而服四夷威容兼備臣濫馳使驛久去帝閽稱夀觴之九行想聞鼇抃閲庭實之千品阻綴鳬趨代賀収復杭州表狂冦逋誅馴致入郛之警偏師薄伐亟還按堵之居種類既殲流離悉復中賀竊以東南巨屏吳越舊封在昔割據之初未嘗用武維今休息之久豈復知兵故輕狡之連謀乗安平之弛備稍稽捕逐寖肆跳梁負匱擔囊始依慿於山谷揭竿斬木卒驚犯於潢池比及上聞聿頒中詔憫愚民之冒昧因重使以招徠猶冀竄藏方圖翦滅蟣蝨之痒脱或俟於爬搔雷霆之威顧豈勞於摧折縱於九拒舉以萬全適陳將鉞之嚴已復侯藩之舊恭惟皇帝陛下弛張文武出入聖神法日月之照臨體春秋之生殺蠢兹姦宄殘我善良欲空烏合之羣肆遣鷹揚之旅果慿勝算克濟成功示恩信於一方燀威靈於四裔臣繆當支郡實控要塗首興備禦之謀嘗集散亡之旅迨承嚴召猶敢留行簞食壺漿樂致王師之饋鼎臑俎胾願賡皇武之歌雖阻預於稱觴亦庶同於擊壤代提舉常平謝到任表乗使傳之光華曾微報稱奉帝綸之温厚更辱超踰寵至若驚感深以涕中謝伏念臣受材綿薄植性滯頑結髮讀書粗知於為已彈冠從仕常切於慕君乃忘習俗之是非但守家傳之清白激昂志操黽勉事為斷斷它技之猗無終慚意廣録録竒節之未有愈覺心勞頃被誤知驟叨煩使摘山煮海適當寳藏之興足國裕民已見宿儲之備陶冶悉歸於帝力斡旋何數於臣功敢謂矜憐曲加奬拔就躐將明之寄俾專朌斂之權原隰所經弗改馳驅之舊倉箱既溢第令取予之均退省何人輒汚此選兹蓋伏遇皇帝陛下堯仁天大周道砥平恤隠逮鰥罔俾一夫之失所裒多益寡遂令萬物之得宜欲實徳之周施睠微勞而畢録特捐異寵因勸庶工臣敢不肩此一心展其四體鍳覆車之前戒廣䕃樾之深恩雖曰涓塵庶可增於高厚譬如草木豈能謝於生成代謝賜出身表綴甘泉之班已塵法從賜奉常之第更擬賢科捧温綍之粲然撫微軀而愧甚中謝伏念草茅末族韋布陳人蚤歴詞場曾無足用之學繼從官牒遽有多取之名恐淟涊於俗吏之為故激昻於儒者之事身迷簿領幾負平生耳熟絃歌猶驚昨夢忽被龍庭之異睠亟追鴈塔之英游禮異詳延恩踰特起服章雖麗恍如脱於白丁詔墨未乾喜若登於黄甲何期暮齒乃遂初心此蓋伏遇皇帝陛下駕馭英豪撫綏黎庶下訪山林之隠逸旁咨軒冕之棄遺數路俱収寸長畢録察臣粗諳事任故加以次對之名憐臣稍涉藝文故清其出仕之目臣敢不深體至意益恢逺圖考究古人之書講明當世之務庶完臣節以報主知代謝轉官表一首轉粟千艘曾微異績就官一列忽玷明綸恭承睠奬之私罙積超踰之愧中謝伏念臣受生艱拙奮跡羈孤讀書徒守於陳言初非利巳任職僅逃於常憲何以瘉人頃䝉推擇之優薦領輸將之重㑹當師役方翦冦攘率饋餉以周行越江山之回阻服勤庀事蓋分守之當為奏凱第功豈寵光之敢覬例加殊賞誤及微勞此蓋伏遇皇帝陛下道妙曲成智深旁燭威稜遐暢既空蠅蚋之羣襃典嗣頒已徧貔貅之旅乃眷飛芻之力亦疏增秩之榮臣敢不益侈帝恩具宣使指循名考實雖未知足國之謀宿道嚮方或庶幾報上之節代賀南郊禮成表三首泰疇奉祠昭事上帝端門肆赦敷錫庶民恩浹幽明驩均溥率中賀竊以天人相與莫尚於郊丘祖宗以來尤嚴於禋祀導迎至景謁款大神蓋將答四海之驩心豈特循三歲之故事恭惟皇帝陛下紹休累聖席慶叢霄盛徳升聞已極和同之妙彌文備舉故忘登降之勞禮既洽於精純澤遂疏於優渥臣屢膺煩使阻逺周行肸蠁潜通想巳瞻於鄉坐福釐旁暨愧莫預於駿奔泰壇竣事修三歲之親祠解澤流恩宥萬方之多罪凡居覆幬同極驩呼中賀竊以申陟配之嚴雖云舊典正合祀之失蓋自新儀彌文具而孝隆精意昭而福備乃施恵術爰及眚災伏惟皇帝陛下徳合乾行功循祖武丕釐上帝之命志在寅恭永底烝民之生務存寛大既定郊丘之卜肆均海宇之休臣猥以微軀繆當支郡駿奔於列阻依天日之光誕告所臨俾霑雲雨之潤緹室飛灰甫定一陽之卜紫壇升燎載嚴三歲之祠恩浹華夷慶均朝野中賀伏以宗祈推本陟配奉先千品具而禮乃行百神享而福斯降斂時貺施茂對一人之休念此眚災誕敷四海之澤豈惟故事實乃殊休恭惟皇帝陛下凝命昊天同功烈祖既保定爾逺追歸美之言故安樂之克篤守成之志肆及屢豐之候聿修大報之儀恵術俯加和聲迭應臣濫塵扈從叨領輸將迹寄江湖結望雲之遐想分隨草木霑䝉露之餘滋代賀明堂宗祀禮成表寳構宏開肇正合宮之位齋輿夙駕聿修宗祀之儀慶浹人神驩均華夏中賀竊以頒朝布政於是有王者之堂嚴父配天所以教諸侯之孝剏自黄帝逮及成周監二代而伻圖順四時而作則考冬官之記炳然制作之工歌我將之詩允矣威容之盛旋起三雍之議猶存五府之祠於皇祖宗首啟鴻博叅稽六籍將革權時之宜追考九筵實待重熈之日恭惟皇帝陛下道隆稽古徳懋奉先兼三王損益之文黜諸儒同異之論全謨駿發鉅典勃興陽曜隂藏拓豐基於廣内天造地設占王氣於中都兹大饗于先王薦九州之美味肅雝顯相均釐已徧於臣鄰涓選休成霈澤遂周於寰宇臣叨從末秩逖聽鴻猷搢笏垂紳莫預駿奔之列扣瓴擊缶但賡歸美之音代賀天寧節表瑤光呈象錫一人有慶之符火徳繼明開萬世無疆之福驩聲亘地和氣浹天中賀恭惟皇帝陛下徳契分人道極妙物用端命于上帝能保恵于庶民雷厲風飛極號令之鼓舞金聲玉振備條理之始終丕承九廟之休茂對三靈之佑㑹逢良月允遘誕辰四海梯航永奉人正之統千官劒佩交騰天保之歌臣屏跡江湖馳心軒陛望堯雲之紛郁莫預稱觴祝舜日之舒長唯知擊壤代謝侍講表趨詔江湖還寘論思之列執經帷幄進陪勸講之聨叨恩每念於超踰瀝懇靡容於控避威顔密邇感涕縱横中謝臣聞聖主輯稽古之勤實關政理儒臣共守成之樂專在藝文故立誦説之官時賜清閒之燕終始典于學庸備多聞之求左右惟其人庶資一徳之協況萬世親逢於大聖而羣臣莫望於清光必有異能庶存故事臣學殖浮淺文思淹遲多病早衰乆矣寖忘於舊業少徒寡耦介然唯恃於孤忠頃扈屬車之後塵嘗預外廷之末議空縻歲月無補絲毫拜州雖切於拊循去國蓋深於眷戀遽膺召節重歴禁扃翺翔玉筍之班紬繹金華之業食殊庭之祠廪併冒新除對延閣之直廬猶驚昨夢顧寵光之若此嗟報稱之謂何此蓋伏遇皇帝陛下躬攬萬幾心游衆妙文謨武烈治登三代之隆周誥商盤言合六經之懿然猶親御便坐延見邇臣深研上古之書愽詢當世之務軫懷遺履輒命賜環臣敢不益戒庸行少酬睿睠盡精極慮顧何以增日月之光擿句分章恐於此窮溝澮之涸為吏部魏侍郎謝表奔命造朝㑹萬乗親巡之所叨恩拜職就七年舊立之班嘗試可而無功輒辭難而有請俞音終閟感涕空流中謝伏念臣章句之學而昧於通方田野之姿而拙於任劇昨荷朝廷之過用猥縁場屋之虚名齒髮已凋事功奚取念邉塵之俶擾傷國步之艱難方八駿啓塗既不獲執干戈而效臣節暨六龍御極又未能扈警蹕而賛帝謨愧恥塗顔憂憤切骨比膺迅召即戒疾驅冀殫毣毣之思少效拳拳之義雖枕戈待旦每誦斯言然坐井觀天了知何補敢謂奬憐之渥亟収流落之餘旋拜訓詞再貳銓部屬師旅興行之際正人材淹滯之初名曰故官事非前日矧兹衰病豈克堪任兹蓋伏遇皇帝陛下神聖先知英武大度負扆而朝萬宇更延奕世之休折箠以笞四夷將靖中原之亂疇咨衆俊宏濟多艱凡䝉惟舊之求莫奪已成之命有如臣輩亦玷此恩臣敢不黽勉夙宵依附日月著鞭雖晚尚肩勵職之心借箸可前期盡報君之䇿為魏侍郎謝得宫觀表嬰疾告休自驚累月祈哀引退尚憫餘生再仍延閣之班更食珍祠之廪銜恩僥倖撫事徊徨中謝伏念臣頃迫衰遲久投閒散辦嚴上道起從一節之趨扶憊造朝願殫千慮之得而臣孤蹤晩達薄命終窮未施横草之勞已抱負薪之歎庶期少間或能殉國而捐軀況值多虞豈忍卧家而避事悼初心而莫遂荷成命之已行滿盈招􅏓盭之災天其或者冒昧拜支離之賜臣猶知之此蓋伏遇皇帝陛下燀揚天威恢廓皇度憂勤政事講明興廢之端愛惜人材保全進退之節姑從所欲用恤其私臣敢不休養朞年䂓圖後日畎畆不忘之意終戀蓋帷溝壑未填之身尚期鞭䇿為顔左丞謝賜生日生餼表綸言温厚曲記始生品物便蕃特存故事荷雲天之施渥知螻蟻之命輕中謝伏念臣奮身衰遲遭世艱棘抵龜而決偶階扳附之榮驂乗而行蔑聞陪輔之效適屇劬勞之日更叨錫予之私慶溢庭闈驚傳里巷此蓋伏遇皇帝陛下英威馭世雄武興邦恢張遠圖首啟腹心之密昭示至意獨全體貌之隆故捐此恩以華其老回念終身之慕豈廢縻捐興言末路之艱唯知感勵為顔左丞謝賜生日生餼笏記御府分珍加賁劬勞之日親庭拜貺益光衰朽之年此蓋伏遇皇帝陛下獨智沈幾深仁徧愛特朌寵數以勵臣鄰謹如慈母之教臣當委微軀而報上龜谿集卷五欽定四庫全書龜谿集巻六宋沈與求撰表
