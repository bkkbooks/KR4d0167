  text: 谿集巻一
  hash: sha256:577a9b4111c82a89f181720e88b0b92840e25a2d5213cb4185e8b95073162873
body:
  text: 宋沈與求撰古詩山西行山西徤兒好身手氣如車輪膽如斗十五射獵少年塲戯格黄羆同拉朽二十竄名尺籍中鐵馬追風快馳走臂弓腰箭了一生只喜論攻不論守兵符夜半出轅門將軍令肅誰敢後自誇豪傑天下無誓為官家掃羣醜蠻夷共事古來危監軍巧落他人機黑山未靖黄河沸邉塵倐忽連紫微長驅中州斥候絶已聞飲馬金明池种家猛將忠貫日髮上衝冠頥指揮主辱偷生事不武壯士裂眦争相隨東跨潼關達上國城頭夜挿將軍旗諸軍下馬拜吾父請成退舍纔有期肉食謀國帝子質勒兵不動䕶送之壯士束手猛將死敵來侮人猶小兒明明二聖堯舜主天翻地坼徒爾為天翻地坼徒爾為北望血淚滂兩頥真人中興似光武赤眉青犢折箠笞一呼奮擊肯效死風鶴尚信驚王師嗚呼何為背征討紅帕莫轄切兠鍪半為盜東家昨夜虜小姑西婦朝逢握刀笑錦衣玉食事奢侈翠眉紅頰資彊暴黄屋今懷旰食憂忍與豺狼活蓬藋時危宜爾悍且驕側耳試聽哀痛詔五陵佳氣自葱葱為雪大讐安九廟次韻劉殿院贈錢圃翁少日從畦丁頗悟園官理菘韭記春秋蔬食聊爾耳十年困塵埃幽事同脱屣一飽不可謀清痩只如此仰止長城翁趣尚兩竒偉弱冠事筆耕俛仰行六紀晩以圃自娯扶鋤寄深喜柔風蔬甲怒細雨蘭芽美小摘定可供餘事不掛齒那復肯着屐而一到城市為計一何疎行須傳高士木茹忌太潔肉食忌太鄙安得從公游遠傲於陵子遊玲瓏山因訪朱氏草堂平生丘壑心餘事不掛目藜杖南山來要使富幽矚異哉小玲瓏蟠峙蒼弁腹修藤結懸崖飛溜響空曲伏石卧虎狀騰拏雜奔鹿砑然互吞吐側路劣容足拂拭古蘚紋字刻翳新綠標榜玲瓏名竒怪殆天屬捫蘿上絶頂坦坦類平陸俯首瞰來蹤穹然在幽谷傳聞昔逋客誅茅此營屋清魂不可招千載想遺躅我思造物巧妙供幽人祿揮斤役山祗斵此一拳玉雲牕與霧閣一一相亘屬豈無部曲衆猿鶴即更僕豈無節旄貴松檜自張纛此事久棄置蛛絲網巖麓翩翩佳公子心古韻不俗駕言脱華簮兹焉卜幽築終日面㠝岏世故豈容觸指㸃空洞姿喜氣政堪掬挾策校昔游健步念須續亦有招隠詩薄暮不可讀奉陪安守登膴原觀江南多佳山駢首闖城郭緬懷在坦夷要使一見廓邦侯王事餘幽致到丘壑散䇿占城隂含睇及民瘼愛此郊原平膴膴富耕穫飛觀儵下臨丹碧盪霄堮野色四座浮胷次潜領畧千畦雲弄黄歲事初不惡斗酒行勞農歡謠入酺醵勝地惡發揮波神覆為虐蕭辰誰與娯一笑寄華酌落日耀旍旗輕飇漾簾幕巻白起壽公歌聲渺林薄老農止勿狂嗣歲有真約觀網魚暗雨垂垂梅欲黄春山吐源春漲狂雪鱗頳尾泝流上吹濤噴浪能奔忙魚師布網名白大萬目井井連重綱聨艘絶流勢甚武遮羅初若無留藏大魚巳得小魚棄要使遺育充陂塘鰥鮞安用誤回避鰕蟹亦復虚跳梁寧知不比綸索手欲以巧餌空滄浪子修步屧相過屬疾不能倒屣戯贈簿書日在手佳思挽不留而能痛撥置時來訪清幽古木占城隂一曲縈寒流落影挿清泚綠䕃亦巳稠結亭坐蟠石傲兀忘拘囚雄談功名外俊氣横九州事故未應爾長恐坐阻修造物小兒相妒我得暫休河魚竟中潰午枕猶扶頭雙鳬飛舄聲歴歴過牆陬此興豈復淺何當起從游試令開丈室子能問疾不寄題淄川王景發肯構堂深林蓺松栢不數櫟與樗坐待十畝隂等為匠氏儲寧復知種徳責報不厭徐名令後必大善積慶有餘於焉望豐屋政可增修閭王孫世東州奕奕盈簮裾金埒通里巷珠樹連堦除賢哉景發甫爽爽衆莫如直氣薄霄漢妙語鏘瓊琚定知磊落人一見懷抱攄謂我架華堂映發先人廬掲名取肯構蓋念經營初堂前植桃李堂上羅詩書桃李意取適詩書計非疎諸郎自蘭玉舌耕起菑畬吾詩以為箴㑹見聨高車何子楚為范明倫賦九疑石石吾不及見也讀詩可以知其㠝岏秀峙之狀吾累卞峰石為小寒林興寄不淺用其韻并及之峩弁千峰倚天碧上有修筠材可篴月明三弄面巉巖驚起哀猿啼峭壁兒童斵石攅青瑤寒林蕭蕭吹墮樵坐令結習落幽夢芒鞋竹杖歸路遙覺來隻影徒相守哦子清詩筆如口眼中何必小玲瓏仿像九疑當户牖神丹已失大江漘誰與安期追後塵分天隔日不可到使我目斷蒼梧雲次韻題沈傳曜痩節堂平生一字不療饑誰云穅覈能瓠肥牙籤玉筯五鼎食是中有趣非錢癡萬事顛倒絶可嗤此腹却受將軍譏吾宗酷似騎曹掾俗物紛紜那復看眼中但有瀟洒侯高節亭亭真老伴山澤形容坐一癯相要檢校還丹書食薇飲水笑多事知君此計誠非疎劉行簡見借詩稿以長句歸之文章偏忌聲名早富貴政須門第好了知二物不相關風月膏粱兼者少劉郎天韻真不凡飛騰宜在蓬萊島年來窮愁已到骨只有珠璣落殘稿紛紛餘子何能追定向詩壇分六纛造物小兒亦薄相浪付繁華給揮掃却令徑坐詩人窮只與清冷消熱惱向來狗監非同邑渇盡文園尚傭保九原千古忽可作如君自是不枯槁茅齋夜誦誰得聞咄咄空能訴穹昊請君更作昇天行勿使貧人彊知寳送章文虎秀才歸荆南我生本呉儂搦筆追楚些佳人脱塵屣幽韻恥獨和君家楚江湄詞語亦頓挫學海富探討渠數百紙過春風歸鳳城櫑具恰解䭾此地初識君細語輒三賀冉冉歲巳遒雲山憶高卧翩然理歸裝餘事等棄唾文圍久堅壁定恐一戰破行矣儻復來憑將楚詞課次韻曾守懷玲瓏山泉石有膏肓料理費和緩風埃客子游夢想略相半端如饜羊酪投匕念鄉饌懷哉小玲瓏舊賞記酣宴玉女下雲牕輕我年未冠誅茅老三間此意已懸斷少須草堂資兩足那可絆謝公愛東山自結尋幽伴詩筒忽相先紙價豈容賤流傳從使君感此歸思亂擷蘭躡危根潄石俯長磵野性等麋鹿百嗜寧食薦攬衣中夜興測漏疾流盼扃步愧駑筋卑飛傷短翰正使屐齒折未救斧柯爛時節脱復徂遲莫空浩歎何當脂下澤去路鬱交貫何亨老築堂里第榜曰安虚蓋取司馬子微不受外不逐外之説屬某賦詩以見意云幻境如羣狙喜怒眩名實憐渠千刼迷墮此一念失世路波濤飜時事風雨疾胡為隨物遷坐此方寸窒使君超世姿軒裳起儒術神交赤城仙妙解窮隠密向來心泰然初不計升黜危堂榜新顔要以名自律牕扉敞深明空華亂初日變滅驚須㬰蔽虧隔纎悉了知内觀融天光發虚室山林猿鶴儔廊廟鵷鸞匹静躁塗或殊出處心本一清都五城開真仙羅輔弼行矣朝紫皇啟沃造前膝功名戯劇成志願談笑畢它年容買鄰儻不傲蓬蓽次韻何子楚食櫻桃輕衫駿馬飛彈丸上林花開紛繡團御厨賜筍未解籜山櫻亦復登金盤櫻筍厨事見秦中歲時記宗廟薦新勤玉路凡果紛紛不論數風清日美雨絲収朱實烘春燃綠樹筠籠採擷價萬錢北人羊酪雅所便自從燕罷曲江曲故事進士賜櫻桃宴五湖十載身回旋已作孤蓬任流轉萬顆徒勞野人獻故無清夢大明宫醉倚酡顔浮玉盌擬古日月雙高懸朝昬自升沈有如轉轆轤引絙環相尋而我生其間所閲幾古今爾來三十年又作裘氏吟眠飯寄編簡此身疑白蟫皇皇走四方誰是真知音語欲離舌本退縮飜如瘖涉世聊爾耳依阿亦何心託質既巳迂自謂百鍊金恥作渭水鈎寧為太阿鐔用捨安所之齒髪忽已侵日月不我留潸然涕盈襟次韻黄子虚同飲葛次顔家釀玉友先生早年忘掃白嬾飯青精借顔色獨餘驩伯為友朋熟不暇篘巾自瀝何須引泉連百井飲若長虹太豪猛細斟玉筯滑無聲酌我應憐官獨泠竒篇更冩陟釐黄逼人心地生清涼了知二事盡家法眼饞徑索銀瓶嘗我老華池少滋液年來愛酒如偷蜜陶然一醉樂未央此外要知俱長物相期徑造君勿違坐得名勝從忘歸公侯似聞勌設醴穆生正恐同分攜次韻李元叔田邦鎮唱酬之什李侯少年真自喜収名擬擅東南美大科異等不作難堂堂奏賦明光裏眼看斗粟飽侏儒空腸殷雷歸著書胷中未減食牛氣出手一擲當成盧只今聊問復何如李比入館要辨蟫蠧資軒渠刺頭文字亦瑣碎澤吻快意回焦枯大雅寂寥誰發喜逆折波瀾須子美晩分一派大江西約束曹劉歸句裏武安耳孫有臞儒載行無多一束書蹇驢破帽踏城市腰間蒯維鳴湛盧呌閽自薦久未偶淮南叢桂猶關渠雕鑴戯出鄉學餘掩面笑余詩井枯讀成士瑴詩巻和其書事一章長年賦子虚狗監絶同里桮水聊自酬博此一笑喜副墨粲我前頓使百廢起朱絃渺遺音慎勿娛俗耳論交儻自今相從期暮齒錢塘賦水母疾風吹雨回江城艣牙嘔啞潮欲平客居喜無人事攖相與環坐臨前楹眼中水怪狀莫名出没沙觜如浮罌復如緇笠絶兩纓渾沌七竅俱未形塊然背負羣鰕行嗟其巧以怪自呈凝目􅌶視相將迎老漁旁睨笑發聲曰此水母官何驚江流如奔絶滄瀛潮汐往來月為程藏納衆汚無滿盈浮埃沈滓溷九清結成此物宜昏盲使鰕導迷作雙睛乃能接迹蚌與蟶亦猶巨蛩二體并離則無目為光精江天八月霜葉鳴罟師得鰕供水征水母弃擲羅縱横試令収拾輸庖丁絳礬収涎體紆縈飛刀鏤切武火烹花甆飣餖粲白英不殊冰盤堆水晶稻醯韲寒芼香橙入齒已復能解酲遣漁止矣勿復評嗟哉此性愚不更定矜故態招三彭且摩枵腹甘藜羮泛舟村落阻風不能少進而菱梢芡觜繚舷上下篙人病之艇子掠岸行水痩不濡尾狂飇振疎篷獵獵鳴兩耳十篙八九褪逆勢何乃爾野芡伺吾間回梢哆利觜亦有芰浮角一一肆輕鄙初欲事幽尋解䌫出疎葦乗流覔清淺濯纓助深喜事有大不然移頃未離咫安得望蓬萊巨艦破潮起征帆駕長風一日三萬里夜坐感事沈沈夜氣歸虚堂閉深寂孤燈灺餘花寒霤韻殘滴醖釀萬斛愁感槩一人敵何當棄短檠隂山叱鳴鏑戊申初寒偶作去年十月冬猶温單衣曉出錢塘門攜孥僅脱餓虎口更吟楚些招驚魂兒女争從亂離苦咿啞遶膝多語言舟行畏塗侵夜泊孤燈明滅何處村蕭蕭細雨疎葦響風力漸搖枯栁根失聲號寒泣龍具促櫂傍險争前奔還家依然四壁立故衾敗絮那忍論無衣豈暇具裘褐海圖坼裂波濤飜天公戯人亦太虐雪花徑尺連上元今年十月事羈宦兩脚如舊身幸存紙牕寂歴風竹嘯古木中夜號空園旅人不眠毛骨冷撫事念往多煩寃吾儕小人不論數豺狼滿目哀王孫似聞易水寒墮指北望大漠烟雲昏安得壯士馭八駿沙蟲猿鶴俱騰騫歸歟莫如中土樂天子孝友朝廷尊坐令鐵衣掃蟣蝨四海挾纊懷君恩十里巖石壁巨靈手擘青瑤璞平削無痕看斧鑿六丁取將天路遙雷電収威半空落至今崒嵂横道旁絶壁萬仞青茫茫倚天屹立不可近下視培塿如羣羊蘚花斕斑風雨潰藤梢夭矯蛟龍戯中開微竇走鳴泉白虹吞吐涵秋氣泉流萬古潭水深山寒無風鬱沈沈下田納納禾稼茂發源沾溉初何心峭直誰令據當路松柏蕭森半烟霧猶恐夜深魑魅驚更遣山靈謹呵䕶夜書山驛天寒夜向闌月出山更静風露搖青空萬象光耿耿啼螿泣幽草賓鴻度前嶺歸來坐孤牕松竹舞清影績溪寨口青嶂挿天塹白水翻地軸回環壯哉縣不許飛鳥觸往年羽書馳盜發清溪曲先聲雜妖幻餘黨萃符祝控攘最旁近被害良慘毒聚落燼烟空生齒塗炭酷豈無山川險㑹有法令束百年不用武駢領甘此辱至今風雨夜猶聞鬼羣哭遺俗感舊憤禦盜勇氣足大兒佩刀劍小兒利鋒鏃老翁筋力衰奮挺怒張目營寨人自戍不待官期促矧今殺氣横洒涕國步蹙豺狼據道路虎兕出林谷儻持復讎心公戰圖報國聞招冦緑林煽餘習無乃國計左誨盜爵秩崇納叛金繒夥戢姦在斧鉞賞誘詎云可萌芽緩誅鋤猖披費結裹戰多數招安奚用腰箭笴悍兵昔已然黠將近亦頗昌言假報國湼面刺投火豺狼奮哮噬蠭蠆利掀簸横行入通邑焚掠窮委瑣況聞南陵寇執事初意惰出没勢已張翦滅計未果宣城俯百里千室盡奔嚲王事吾有程馬頭戴印顆叱馭疾其驅語言紛炙輠何當説羆貅一洗根本禍寧國道中山石犖确行路難山風蕭蕭吹早寒十步九歇僕馬瘁兎蹊鳥道窮躋攀崖谷空籠瀑泉走碎玉零亂飛前灘石堤捍水幾百級落處疑有蛟龍盤兩山之側開􅅵畝石罅著鋤那得寛前村後村烟火冷土牆茅蓋常掩關我行不知記近遠官游歲晩良自歎豈如家家一飽外鷄豚社酒相追歡那知亦有簡書畏里胥剥啄驚衰顔夜宿千秋嶺下田家隂壑來悲風薄莫吹急雨冥冥攬寒色咫尺暗山路茅簷兩三家曲澗縈竹塢停車且問訊欲止此何許老翁行步弱扶杖倚門户問我官何忙野宿今無所向夜號狐狸深林嘯豺虎甘心在擇肉闖首輒慿怒駕言往何之一榻翁敢拒延我傍中堂慇懃慰良苦解衣土銼旁支枕憩行旅昏然飽安眼境寂絶猜怖雞聲報明發征車犯寒去呼燈別老翁鼻息方栩栩溪上見梅晴溪漲淥如隂苔晴山挿影相低回畫船疊鼓順流下波光浩蕩征帆開灘縈岸繚柂牙轉水石相激如奔雷須㬰已復過絶壁歸路漸近嚴陵臺山重溪複境彌迥暗香忽自空中來日斜正見叢棘外炯炯疎片飄寒梅槎牙一種獨愁絶含情不語明巖隈凌波疑是水仙出縞衣素質行徘徊下窺清淺一笑粲坐使凡卉俱塵埃山谷之儒已臞甚龜腸鶴骨世所咍相逢頓覺百憂釋不嫁春風誰與媒舟行易遠空回首角聲吹夢心悠哉次韻張仲宗感事諸侯救周衰能事存筆削後學競專門膚引迷注脚寧知懼賊亂誅意未為虐上皇志包荒大度示恢廓誤墮敵計中九廟施箭鑿將臣擁彊兵首䑕事前卻專雄懷顧望散黨失歸着坐令兩宫車北轅狩沙漠天王紹絶統憤此國勢弱嘗膽復大讎此意良不薄向來督真姦國典猶闊略羣公争䕶前循習久彌確黄屋泛滄溟黔首寄矰繳世無管夷吾老眼雙淚閣何當誅賞行浩歎成嗢噱曜靈還中天冰雪自銷鑠次韻允迪祕監同年所寄㑹稽唱酬之什秋鴻度寥廓天逺勞目送燕雀各有謀墮此朝餔供平生江海游往事恍如夢簮裳彊結裹翰墨困嘲弄一官冗不治匹馬旁無從迷行落小劫直意識大洞似聞脯麒麟頗欲翳鸞鳳眼無行祕書此語誰與共貧知世路艱老覺交情重功名等戯劇射覆偶微中龍媒駕皷車欵段朱絲鞚南游探禹穴聊得登覧縱時危要竒䇿塗窮勿長慟相期論少卑材大古難用鄭維心約趙安道中大家兄次律學士及僕探梅城山乗月泛舟而歸窮居不厭車馬絶委巷衡門常晝閉朝來剝啄誰過予倒屣逢迎走驚蹶里中勝士真可人為憶寒梅耿殘雪招呼聞早探幽芳平溪徑遣扁舟截西山佳處雲塢深松竹蕭森迷洞穴上方小閣鏁空明開牕下見千山列畫手無人貌平逺野闊天多供一瞥氷花只作小寒枝拄杖不辭穿巀嶭野僧省事畏客狂攀援自向南枝折疎香低入坐中來骨冷肌清伴高潔襟期況有公子賢伯也雄豪負竒節手拈凍蘂薦深桮妙語琅琅契禪悦人間此㑹不多有忍放杯空成小別歸來懷抱與誰論一櫂飜然載明月臘月二十六夜大雪投曉霽色恍然鳥語啁啾便有春意感而賦之黄昏雪打牕夜雨破幽夢晨光逗簷花霽色晃池凍老木驚向榮好鳥發微哢草根露纎芒蟲聲試羣哄空畦土勻酥側澗泉流湩臘盡殺氣衰春歸生理共人情自多端天意皆曲中懸知造物公未厭萌區衆艱難重時節俯仰疲迎送心閒數造化骨寒遭鬼弄那驚梅栁新但飽藜藿供行須過田家泥飲空社甕次韻葛魯卿送示近作一通二首八騶盡屏如縈䇿微步招尋老賓客離離草色亂溝塍脚底春風隨蠟屐蟄龍昨夜起洄潭忽雷閃電飛千巖朝來遺珠落懷袖復見國風歌二南公洗膏肓砭傳癖詞伯儒宗蚤揚歴詩成聊復貯錦囊副在久應藏石室只今漂泊客烟村高哦七字哀王孫有如此言公不食東山那得留安石公詩慨然有濟世之志君侯胷次多籌䇿歲晩飜為江海客小隠方營一把茅公詩為結屋景山而作幽尋定費幾兩屐公心落月印寒潭出濟巨川歸築巖追還正始遊戯事聊為風騷作指南我有幽憂如酒癖起誦君詩春寂歴天公下取氣凌雲神物䕶持光滿室老矣懷歸葑上村倚公佳句譜桐孫須公拯危紓旰食快冩車攻刋樂石葛魯卿再和復用前韻奉酬上謁軍門冝杖䇿誰為兵家分主客猛將翻乗下瀨船幽人退整登山屐山泉聞似百花潭山曲盤回十里巖丘壑䕫龍人太息那將㨗徑比終南吾邦舊事論三癖見劉夢得與湖州崔員外詩佳處還堪記遊歴深譏表餌誤朝廷急賛烝嘗安廟室避地來居水遶村鳬鷖哺子竹生孫苜蓿堆盤從野食人愛當年二千石平生自媿無竒䇿魔去徑須呼逐客兀身聊欲避風塵作意何能分履屐驚魚畏網伏深潭窮猿失木號重巖殺氣漲天消息斷但想滄海浮東南囊無一錢誚錢癖鮭菜醒人今齒歴忍言走馬過章臺空駭祝鷄餘土室傖父嗔儂語帶村錦心繡口拜天孫端為遠謀箴肉食誰能饒舌攻牢石葛魯卿再和復用前韻奉酬聞公卜居問龜䇿隠屏畏人呼重客閒招溪友鐵頭航戯躡鄰娃金齒屐舍旁修木䕃風潭坐有郎君掣電巖已將此段慰偪仄更為岑參來巷南細説當年陳類癖類辟顔釋為癖伏閤忿争書日厯國醫袖手藥籠空掛壁猶餘弓矢室吾州萬落與千村以葛名兒浸及孫刲羊擊豕作寒食定恐酌公忘斗石小檻觀魚呼䇿䇿來伴漁蠻作逋客風回別浦有飛帆雨濕斷堤無響屐夢回春到放龜潭潭上雜花開石巖十椽老屋烟燼滅越鳥無日忘巢南空説花驄酬馬癖豈有過都如塊歴出門咫尺行路難只辦蒼黄問家室皷􅎏聲動何處村争挽神器歸王孫今者不樂憤忘食奮臂擬關弓五石奉題思上人妙峰堂上人游四方雲水渺長道一言契深心百法從此了十年歸故山不踏山前草經營妙峰堂想像徳雲老閉關習跏趺宴坐兀枯槁混迹雖寰中寄意已塵表深枝姹巖花雅音喧谷鳥翠竹伴幽禪白蓮敷衆好山空有雲歸地净無塵掃回觀第一義湛湛孤月皎法門有等差問訊今誰曉躍身寳樓閣此堂終褊小維心方刋正三國史某以精筆遺之䝉餉大篇為謝氣格渾然三復感歎漫依元韻奉和蕪陋增愧諸豪雄誇劍芒銛毛錐斂避收餘尖櫝間黯黮渇銅雀案上爬沙枯玉蟾學堂山人有遺裔筆力大可千人兼掉頭不肯書柿葉酒酣起舞怒奮髯十里歸坐溪口屋傲視冠冕猶髠箝草𤣥草聖聊戯耳如醫識藥信手拈邇來直筆到三國去取法度何森嚴眼中青白世矜異皮裏陽秋誰顧瞻更憐中書今且老鷄毛葦管争出奩懸知入手便獰劣那復助子窮幽潜我持妙頴急送似標題珍重存華籖勢如執法貴心正俗病要以此語砭揮掃定見龍蛇走紬繹何憚歲月淹須知筆意似人意柔順未必非凶憸長樂梁世則為余言林氏達觀樓横海嶠天下竒景也索詩為賦一章老眼紛世故百嗜了若遺忽聞佳山水未到神已馳迢迢古長樂山水天下竒中有隠君于少讀昇天詞兹遊不可遂樓居在厜㕒要欲盡一覧吞滅海嶠姿想當宴坐久遠意渺莫追定見月嶺墮洪瀾浴朝曦蓬萊蔚相向拍手招安期秀色故可餐却粒到玉芝何當往從游下視培塿卑和張仲宗送柯田山人歸隠我家洄潭上卜鄰左顧龜中有隠君子孤風邈難追玩世逐虎鬼祈年訊蛇醫籬根縣瓠壺蔓野紛翠帷客至勿遽迎借問來者誰窮巷車馬絶杖屨得往來老儂起招呼情話真樂哉意行忘早宴佳處首重回月出一犬吠柴門風為開收還四方事老子良足哀誰為雙眼青自失兩鬢黑溪山招客子占勝清涼國古人如可作晚歲意何及是中但可飲慎勿忘酒徳酒酣動長忿驚問兵誰勒往年城下盟殺氣横九有脱身敵中來親戚驚老醜抗言半渡擊失計推禍首誰能返秦璧争欲仇魯酒着鞭空浪忙好語得鷄口有弟在一方丹臆危涕横念言還鄉夢遙夜懷紫荆忽興攬衣坐孤燈耿青熒雁奴信何功捫心愧鴻冥棄置復棄置終尋白鷗盟鄭維心用張仲宗韻見贈復次其韻奉酬幽人臥南牕支床伏穹龜白墮意冥契黄庭心暗追身閒有餘適國病何當醫此事姑棄置溪光掛屏帷顧影或自笑問言子從誰少日功名心偃蹇挽不來雄豪本戯耳静樂真賢哉畏事口三緘憂時腸九回無客榻長掛有懷尊自開酒酣氣如雲高哦追八哀胷中飽世故了了分白黑十年客異縣中夜夢鄉國買鄰枕寒溪此計吾猶及大恐歲星惡翻令銷福徳不如早移文徑效山庭勒浮名等浮雲過眼亦何有誰能學東鄰深顰不知醜朔風吹飛霜素色侵皓首幽憂無與娛萬事付杯酒客來勿多談要使耳如口江濤故洶湧敵騎猶縱横健兒委戌甲老農持棘荆去年戰争地白骨堆晶熒機權失猶豫理數歸杳㝠誰如管夷吾九合先同盟次韻葉左丞見寄先生少英發身為國元龜玉堂動敏翰諸老歎莫追向來三折肱舉世推良醫小試經綸才艱難佐籌帷憂時儻失聲捨我今其誰巖棲分麾去鼎食羞嗟來憂樂有大者得喪良小哉霣心驚地坼攬涕祈天回願言國步肅追理邊隙開潔身未足道王孫真可哀幻緣東即西妄境白成黒那於土偶間平地見佛國雲山樂未央歲月嗟何及恩讎一快意聲利多慙徳名成復逃名飜恐鍾鼎勒胷中浩無垠富貴公自有厭居廊廟榮戯習村野醜荒山披石林它年齊峴首殺雞侑晨炊炰羔行社酒此樂應獨知世味難可口仗馬失芻豆那顧一榻横小兒衣挾楮老妻釵墮荆心事獨炯炯眼力雙熒熒君恩未報償浩歌託沈冥上天不難知誰能訊背盟希顔提舉愽士謁葉公左丞於石林公遺之詩屬余次韻劉侯磊落人中傑半生塵土略如我酒酣氣與天低昻長笑拘儒費膏火虺隤一馬上高崗怪來喜色猶揚揚探得驪珠攜滿袖明月掛空無價償夾竹桃花搖搖兒女花挺挺君子操一見適相逢綢繆結深好妾容似桃蕚郎心如竹枝桃花有時謝竹枝無時衰春園灼灼自顔色願言歲晚長相隨蠶吳桑成緑隂吳蠶盈翠箔闔門障風雨荒祠動村落千絲為衣被一繭自纒縛殺身以成仁此計殊不惡松下追涼佳哉十八公凜凛廊廟具大匠偶未収蒼髯鬱如許根盤曲磵幽勢宅層崖阻清風自掃門當伏不受暑顧我蕭散姿本是山中侣出逢畏日長隻影無地去偷閒蕭寺游清隂直修廡神交先浩茫徑造不我拒斗酒起自行開懷為延佇寒綠浸杯盤勁氣逼牙輔語巳心地涼外熱寧足禦公家綠骨蛇千歲穴深土何當供晨餐散我腰脚僂它年聽颼飀危冠掛神虎此意亦大竒勿與夏蟲語龜谿集巻一欽定四庫全書龜谿集巻二宋沈與求撰
