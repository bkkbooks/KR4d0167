body:
  text: 律詩長短句附正月十四夜觀燈南寺子虚有詩次其韻兼呈駿發次顔娟娟佳月掛南樓蕭寺真成秉燭遊火樹忽驚新節物春衫不趂舊風流公方高卧追三巳我亦狂歌發四愁為報襟期得名勝何妨著處一開眸初約子虚不出以次顔見招而往再用子虚韻和呈駿發次顔燈市燒春接郡樓歲豐人樂事遨遊繁絃急管方連夕痛飲高談自一流短帽縱堪陪勝賞長檠那解照牢愁歸來卧對西牕月獨想清光燭電眸十里笙簫沸市樓已占風物兩優游人從月窟開青嶂燈挾星河映碧流曲席深杯成徑醉長廊古寺溢清愁暗中我亦知公在彊對蘭膏為舉眸子虚復有詩再次其韻誰能延月倚危樓細履相將偶當游倦聽山歌懷舊俗閒看水戲濺寒流土人以水戲然燈燈光競作千門曉酒力微寛一掬愁明日八分疲阿買詩饞元只在清眸次夕雨作用子虚韻奉懷次顔知魚軒小集夾道繒山聳蜃樓小軒終憶數條游月將人意十分滿雨入溪光一𣲖流静聽屐聲喧夜市旋挑燈灺醖春愁閉關不問隂晴事時怪𤣥花掠病眸別羣從十年勞遠夢今日又征鞍雨入花梢困風生麥浪寒飄零逢酒怯老大別家難去矣功名事終須把鏡看𤓰步呼去聲漸逐潮頭遠帆影低隨日脚斜已喜扁舟近𤓰步江鷗無數立寒沙將達行在所潮落江城暮帆開一葦輕雲屯六龍駐天近五星明率土朝方岳何年洗甲兵君王似光武折箠看昇平陳子尚博士休官還京口作此詩餞之勇退曾無屋數椽掛冠神武便飄然陶潛去家一百里張翰収名四十年平世深知還有幾少時健決已無前子尚昨主臨淄簿與部使者論不合徑去官侏儒飽食堪羞死莫浪狂言為著鞭西風江上荻花秋鱠玉頻年念昔逰世事真成一可慟身名那問二宜休公卿禮餞何為者僮僕歡迎有此不鬢影毿毿紛翠葆晩來鐘漏亦懷羞得家書國步猶艱棘不堪頻問家霜毛失翠葆蒿目亂𤣥花孤客知時節殊方度歲華干戈就休息歸理邵平𤓰觀瓊花千里隨河走濁流檣烏東下指迷樓春風簾幕今何在只有瓊花伴客愁即事和卓彦翼曈曨曉日上簾旌簾外幽禽作意鳴呼斷故鄉千里夢起來搔首問歸程即事造物勞人亦懵哉又驅疲馬上崔嵬經從野店初嘗筍行盡江村始見梅千里短書先夢寐半生多難足風埃桔橰俯仰成何事已念漁蓑歸去來次桐廬決決溪流不滿灘獨憐舟子上風灣日斜指㸃西村渡竹户茅牆趂碧山吏鞅縈人未許閒當游聊復到春山倡條冶葉無風味賴有寒梅醒病顔於潛道中首路潛溪驛鷄聲欲曙天籃輿衝宿霧棧閣寄層巔高下林端屋横斜石罅田野泉隨處有草木盡蒼然新城道中馬蹄隨意到回首隔南崗日落鳥猶語春歸花自香長紅媚幽谷新緑漲回塘假榻知何地昏鐘出上方宿葉璋橋庵舍渡澗穿林夕未休野人篝火引前騶驚從畧彴灘聲急喜見廜㢝草蓋修雲臥自驚魂夢冷星馳先惱肺肝愁乞身老我雙溪上記取端能賦遠遊水閣小憩雲氣昏昏雨脚垂客行終日倦犇馳竹間小閣臨清瀨俯檻觀魚立許時祈門道中遇雨了事癡人有底忙箯輿勃窣到南岡樵風槭槭羣狙喜山雨蕭蕭萬木僵谷底暗分冰澗落舍旁時度野梅香殊方歲晩多悲感歸老丘園此計長東西二林寺湓浦維舟訪梵宫香爐峰下暫從容重來不為二林景永遠禪師有舊蹤在昔得名齊連牆亦共蹊修篁同碧嶂寒溜合清溪閣影高低並鐘聲左右迷遊人俄省悟東即是林西遊人多入東林寺將謂西林景不如我䇿短笻行半日水聲松韻更清虚千秋嶺錢氏嘗築四壘以限江南北者盜發旁近復於此守禦山河四塞限中原籬落而今不復存豺虎晝行何日息但餘征戍滿荒村吳越江南絶壁間可憐争國似蝸蠻百年父老陶王化尚記流傳一醉顔次韻鄭維心臘月十六日有作國難更頻歲邉塵動四溟豺狼飽吞噬天地失清寜黄屋無安所霜笳不忍聽使臣歸路阻慟絶鬢星星朝廷歸叛將關塞失簽軍銅馬猶逋命沙蟲亦占羣上心存廟畧兵氣亂天文誰挽斜河水通宵洗赤氛血戰遮東道今誰廟食雙無人扞彊敵縱馬飲長江冦掠元干紀兵臨反誘降將軍自不武慚色上旌幢次韻避冦二首窮途厭遷次歲晩惜分攜茅舍荒村北柴門曲港西鷄豚蹔同社桃李舊成蹊那得干戈定浮家著兩溪宦遊成屢卻戎壘悵頻遭聞詔趨吳㑹經途事董逃心期紓國難力欲挽人豪漂泊多危涕真成失木猱游城山夜歸泛舟南溪杖藜尋勝款禪扃歸去扁舟伴月明卧樹低摧山脚轉跳魚撥刺艣牙驚烟埋橋影雙霓斷風熨溪光一鏡平聚落半空無市井兩三燈火短長更次韻李通直題慈相寺雪月亭曲檻飛甍界碧空盡供勝覧屬禪翁蒼藤翠木四圍外遠水平蕪一望中幽鳥林梢鳴不斷亂雲天末去無窮素娥青女今何在淮南子青女主霜雪歸步聊乗兩腋風扈御舟泊錢清江口值雨打窻悉窣連江雨吹柁嘔啞拍岸風篷底醉眼那得穏時聞鷄唱夢魂中法駕親巡海上還鈎陳萬騎列江干潮生風熟樓船過雨助洪濤失故灘過平望未辦扁舟掛綠蓑人間何處不風波終須徑為鱸魚去笠釣歸尋張志和平望乃張志和得道之地次吳江水闊風豪浪拍天魚龍戲舞墮饞涎尋常行處多飜覆看我孤舟得穏眠小邑蕭條兵火餘狐狸入市自相呼茅牆竹户斜陽裏十室生涯久已無冬至遇雪題明因寺僧房宦學差池已倦游一犁真欲老西疇天公為作豐年信更喜將軍入蔡州是日聞王師入杭遙想燕山落大花更堪直北渡龍沙六師挾纊懷輕煖取日誰能反翠華方允迪隠鸕鶿谷江子我子之劉希顔行簡皆往依焉為此詩寄贈脱葉驚飛海角秋君王虚佇急良籌列仙山澤底無用孺子滄浪渠不憂百鷙可能如一鶚二江知復帶雙流渺然相望暮雲碧兀坐蒲團搔白頭八月十七日扁舟渡錢塘江一言初欲寤明君去矣終縁丞相嗔鳬鴈江湖真我輩龍蛇山澤定何人市中未識馮延夀門外已呼祁孔賔尚有憂時心未歇西風吹淚濕綸巾沙觜波生柁脚開扁舟老去許歸來風帆一㸃日邊下雪浪千堆天際迴城郭荒蕪迷舊隠江山寂寞冩餘哀此心元自無機事寄語輕鷗莫見猜允迪招行簡卜居鸕鶿谷僕意羨之作詩送行兼以自見嚴陵灘下鸕鶿谷聞道元英舊隠廬鼻祖名高詩格在耳孫才傑宦情疎漫山松桂鴈行立入隖茅茨星散居知為劉郎賦招隠莫教花落到通渠少日長懷社稷憂怪來饒舌漫多仇風塵冉冉百年老霜雪蕭蕭兩鬢秋不辦癡床供一笑方營隠谷賦三休添丁䕶得金鴉觜佳處端能著我不維心過邵子非溪亭夜話有傷時感舊之作索余次韻官儀全復漢盟㑹競尊周郊野多戎壘衣冠半客游地偏朋舊鮮人老歲時遒莫厭經過數相看又麥秋朝廷䇿數馬冦盜谷量牛世亂思竒畫身閒喜勝流鵷鸞霄漢侶鳬鴈稻粱謀得趣皆為達那能陸盪舟聞道津亭集青燈夜色浮鸛鳴驚獨鶴魚伏避羣鶖月澹帆歸浦風腥網挂洲語深投匕立此意得無憂虎帳師頻衂民窮粟屢捜㑹須夷喪亂寧敢厭征求黄屋中天立彤弓幾日酬寸心終耿耿不獨為春愁心事空牢落身名盍罷休得閒羞彊聒避謗巧淹留老矣嗟如此誰歟問以不儻容親杖履不擬向丹丘余得守丹丘方欲上投閒之請劉希顔持節按縣招維心舟中小酌次維心韻大艑浮溪曲華旌暎道周勞農纔徹警問俗偶成游王事今云棘官稱古號遒正須哀疾苦輒莫詫防秋希顔按防秋事隨處喧銅馬何人炫木牛輕捐小山句急捍大江流行邁心疑醉周爰事喜謀招呼隠君子高浪兀虚舟故國真如寄餘生宛若浮巢鳩不䕶鵲池鳳肯容鶖老木低春水孤花帶晩洲杯行應酹我知復念幽憂山林懷獨往圖史縱旁捜此士俗間忌吾儕句裏求大篇終寡和小酌漫相酬脚踏溪流亂端能醒客愁大邦通間道小縣得中休交分傷離合王程惜去留索居垂老矣劇飲尚能不倦夜評今古誰憐貉一丘子虚航重湖之險遠過山中輒次維心韻以謝客裏傷為別相望歲一周冕旒存異顧去歲子虚䝉賜對天語稱奬丘壑老英游憂國心長折驚人語太遒年來有公事合眼注春秋小牕眼蠍虎敗壁上蝸牛老樹隂垂合前山翠欲流狂言違世用彊飯了身謀不謂輕千里能迂訪戴舟此客今那有迎門喜氣浮心閒清似鵠眼浄凛如鶖塵榻開蓬室風帆巻橘洲襟期適相契一笑發羣憂寳厯方重啟英才必盡捜題輿偶淹泊牓道㑹營求浪漫貧逾適經綸老未酬雲林得攜手切勿志窮愁暮雲凝遠碧覔句擬湯休不分千山隔才為十日留高風誰繼者清夢自驚不聞説星躔動何人識太丘次韻學士兄見一亭自稱居士擬香山隻影江湖得暫閒大隠可能追褦襶小亭聊欲對孱顔持盃有月同歌舞䇿杖無人共往還聞道修篁解新籜密遮門逕不須刪塵土敗名如敗敵雲山招隠似招降漫傾魯酒醒猶獨聊發吳謳調本雙誰念佳人在空谷自同漁父老清江它年對榻分餘地風雨蕭蕭夜打牕次韻學士兄述懷故國風烟素已諳結茅端欲占重嵐聚蚊那肯追金谷號虎真成賦石龕阨運經過度陽九幻生顛倒識朝三它年自有鷄豚約小阮新居卜道南葱麥推還井大春拂衣歸伴臥雲人胷中歴歴蟠三畧肘後時時校六淳已作移文排俗士更將要術混齊民知閒聊復求閒地歲晚功名恐逼身風實雲子六淳之葉仙藥也見漢武内傳次韻黄子虚所居隨緣堂應羨扁舟泛五湖隨緣卜築伴樵蘇青山衮衮成嘉遯華髪蕭蕭負壯圖松檜鶱騰元自植魚龍吟嘯巧相娱清宵背立巖前月大呌三高更疾呼次律兄餉魚魚不至而詩至頗類南海使君送酒輒成三絶一笑而已賜茗少分以報厚意慿虚公子騎鯨後烏有先生控鯉初可是凡魚亦仙去空餘一紙腹中書先生遠餉錦鱗鮮剥啄扣門驚阿連只有珠璣落牕几空教口角墮饞涎尚方小鳳睗精芽戲比瓊瑤報木𤓰夢境紛紛非實相往煩鈎起睡中蛇曉過鄰村推枕夢初斷籃輿踏露行歲登人意樂風急鴈行驚曲澗哀湍㵼危橋獨木横清霜莫欺客雲日自晶明即事鵲噪空庭曉霜明百尺樓連耞響晴日遺穗落平疇黄菊疎籬晚丹楓別岸秋怡情有底計開甕玉蛆浮竹樹參差合溪流半隠扉雨昏鳩婦閙風急鴈奴歸䇿杖循沙步褰裳到石磯游魚吾共樂身世自依違過梅知宫東軒舍南舍北花無數眼看游蜂上下狂風信晩來簾額動黄庭相對一爐香允迪遣書問訊并寄示與子我唱酬佳句猥及微蹤輒用廬字韻為二詩以報嘉恵泛愛何人枉素書銀鈎奕奕到田廬朋游久許貧方耐宦學空憐老更疎回鴈峰前應夢到放龜池上也齋居允迪得郡衡陽僕丹丘皆待遠次僕居龜溪方事投閒之請㑹允迪書到亦云相期保社同香火口禱功名乞與渠不從吏議汙丹書恩許懷章返故廬投老有緣知分溢排姦無術愧才疎勝流踴躍聞歸櫂妙語吹嘘慰索居懷望北轅心已折忍將時事付軒渠書懷三首應俗由來嬾謀身尚敢先栖栖從見嫉僕僕豈能賢駿馬常追日方舟可濟川人生各有趣心目慎相憐暗中人易記名下士非虚此道憑誰辦它時或自如真能食萬户定復愧三閭富貴雖吾有當令功可書事業貴不苟聲名難預期功非冝食肉道豈忘羮藜政恐儀無舌那論緯有髭漢庭今用少覽鏡獨何為劉希顔提舉見過出示卞山居二詩次其韻偪仄風塵際分攜歲月賒向來聞避地勝處偶為家對客談鋒鋭憂時酒量加中觴莫辭醉回首又天涯小別千山隔相看一笑温丹心獵風斾華髪粲霜根鴨鴨争呼伴鵶鵶自識村更須判劇飲落月倒窪尊張仲宗有詩懷歸因次其韻勉之相逢無日不懷歸又是春山聽子規休歎豺狼迷道路似聞貔虎仆旍旗那從薄俗求青眼還向高堂念白眉南望孤雲應目斷殊方歲月易推移南北山探梅俱未花維心從家圃折數枝以餉坐客蓋半開矣㑹次律兄有詩輒次韻山北山南雪意忙梅花未肯鬬寒芳懸知小圃争前發為折疎枝分外香故國年華驚晼晩老人心事伴摧藏更看陌上傳春信倚杖空懷遲暮傷次韻鄭維心探梅未花木落空山不著行寒梅長是占年芳未容霜女窺孤豔定恐花神嗇舊香竹杖穿林聊問訊槿籬縈路巧遮藏誰能折寄江南恨北客相看摠可傷聞道年時醉一觴野梅飄几薦餘芳兵塵不礙含生意花骨猶存底死香入夜從教月浮動争春空被雪埋藏慿君妙句先催發調䕶髙枝莫中傷復次韻呈維心拙澀不工當為抵掌岐亭幽夢墮微茫百草先春自不芳山雨壓低臨澗影天風吹下滿林香梨花少韻非儔匹竹葉多情故斂藏長記江橋閒立馬落英誰掃重情傷粲粲疎梅短短牆騷人長恨失遺芳低徊草棘精神透彷彿關山魂夢香月淡乍看清影亂春深終恐緑隂藏歲寒為爾添愁絶倚樹微吟亦自傷次韻維心憶梅野花飄盡江梅發為報先春一信芳近水疎林風格老故山歸路夢魂香雪霜貿貿添愁絶蜂蝶紛紛預屏藏折寄慿君呼健步生枝莫放手痕傷次韻行簡懷次律兄門對青山水繚牆隔畦花卉盡流芳澆胷快㵼鵞兒酒襲鼻長聞柏子香夜雨對牀成契闊晩雲歸岫識行藏抽身未試平戎畧空為憂時倍感傷邵子非謂予有天台之行見貽以詩次其韻巉巉老氣鬱青霞過我依然醉帽斜為説驚魂招楚些忍聞悲曲動胡笳扁舟犯雪來何許健筆凌雲語益嘉莫笑海山風引去要尋源上問桃花次韻劉希顔蠟梅二絶仙衣曳紫練裙黄天遣清臞勝國香月上小牕寒影動不禁風味惱剛腸剪成香蜜綴疎枝度臘争春已恨遲清夜無人花睡去小園風露更相宜次韻雪紫簫吹斷玉梅魂夢入江南幾處村半夜落英飛不定旋添清絶到柴門月下獨步娟娟微月小庭西月下幽人影自隨賴有寒梅伴愁絶一枝清艷耿疎籬次韻次律兄除夜述懷此身傳馬與時移過盡三餘又一歸野炬占風迷夜色農家除夜以火炬候風色占歲事村肴宿歲待晨晞鬢華老去能餘幾心賞春來轉覺非慚愧君恩許閒佚食蔬那比首陽薇餞歲鄰翁席屢移拍歌猶聽夜深歸尊浮凍螘霜逾重林噪寒鴉日未晞剰歎飛騰憐杜老見守歲詩過為孤憤陋韓非干戈滿眼傷時節遣戍長聞賦采薇次律兄以蘆菔見餉并有詩次其韻歲晩嘉蔬已向萎獨餘蘆菔老霜畦収隨芧栗供山谷贈比蘋蘩擷澗溪葅亂金釵入珍饌羮融玉糝脱汙泥程舂定覺人彊飯功校蹲鴟自不齊金釵事見荆楚歲時記次律兄以䑕盜防風感而作詩命某同賦嘉蔬靈卉兩紛紛小摘山花自出羣芽茁短根紅玉巻葉敷疎節翠旟分細看藥譜鐫遺録終擬騷經補缺文堪笑饑鼯穿敗篋寧知野彘力跑雲防風苗亦名山花野彘喜食之戲酬嘗草茶慣看留客費𤓰茶政羨多藏不示夸要使睡魔能偃草肯慚懽伯解迷花一旗但覺烹殊品雙鳳何須覔瑞芽待摘家山供茗飲與君盟約去驕奢某䝉學士兄相要陪賞芍藥花多白者月色相射光彩映發殆玉盤盂之苗裔耶維心有詩輒次其韻悵望揚州千朶盛數枝聊足慰淹留相逢月下陪真賞一醉花前得勝遊鑿落細斟金暈側盤盂斜颭玉光浮春衫並色渾無賴映帶霜毛笑隠侯溪亭夜坐波面搖風暑氣微秃巾來坐釣魚磯相看月墮行人盡只有流螢上下飛松架聨絡樛枝架短簷蒼髯緑骨尚依然袪除畏日心三伏領畧清風直四筵好在老龍蟠夭矯悞來孤鶴舞蹁躚那堪側雨敲牕夜貪聽颼颼自不眠代人作夀詩老人明處識斜河曾占充閭爽氣多蚤以才名凌屈宋戲將詩律鬬隂何丹臺舊綴神仙籍黄屋仍垂將相科禮絶座間公未晩且提鴻筆上鑾坡英氣超超不可親温然笑語便生春絳帷久屬宗師任紫橐方㕘侍從臣八面文章寧有敵一門忠孝信無倫山東出相公家事只擬尊前詠大椿張倅生日以詩為夀宿歲雕盤供五辛充閭佳氣已生春俊游自合陪金馬英骨人猶記石麟別乗重分千里政五湖追數十年身知公隠徳冝難老鳩杖看扶法從臣詩悼鄒仲容教授骨相自清臞居然澹滿軀高文凌鮑謝勝畧本孫呉鸑鷟期千仭驊騮殞半途傷心九泉恨那忍奠生芻徐縣丞挽章插架遺編滿依然手自臨瓌辭寧世用高調罕知音白髪浮湘意青衫忌鵩吟些招空往事魂斷舊家林蔣司成挽詞法駕天臨五學初曾聞重席絶諸儒雍容久載從臣橐晼晚猶分刺史符不使高材陪鼎鼐卻収清節傲江湖賤生無地從巾屨獨對遺篇想步趨召節西來屬老成乞身終欲返巖扃新書未奏三千牘舊説曾繙十二經漢室首推施氏易衞人端識孔悝銘儒宗學府今誰輩空使諸生記典刑曾逢原挽詞代劉侍郎落落江湖一偉人當年玉立映簪紳四朝耆舊推先達三國英雄出後塵金板袐謀空淟汨土門竒禍足悲辛懸知精爽猶堪畏嚼齒傳聞不滿齦驚聞義骨殞狐狸悵失中朝一吏師廣漢威名由擿伏寛饒直氣不容欺丹心共憤時多難白首相期論少卑滿眼西風空濺淚何心忍讀蔡邕碑安次山挽詞代劉侍郎都門惜別淚沾巾回首孤城草木春封豕遙聞食上國疾風懸料識忠臣程嬰已死終存趙揚子雖生輒美新青史高名知不朽遺榮猶賁土中身曉殿傳催玉筍班東風小立照衰顔臨分愧我江湖上伏節悲君矢石間往事凄凉千古恨舊交零落幾人還殊方更致生芻奠目斷高丘涕淚潸劉資政韐挽詞國恥忍言城下盟忽驚河洛失清寜心摧寳仗離宸極血濺轅門落將星請死自緣鳴越甲乞師誰為哭秦庭高名㑹與丘山重一誦遺箴一涕零志士長悲處死難唯公勇決一言間結纓季路空遺跡投閣揚雄亦厚顔義烈峥嶸昭國史忠魂寂寞閟家山隻鷄已負它年約下客傷心兩鬢斑挽詞二首職為蘋蘩謹門推黻冕華㷀嫠初鞠幼夀考竟肥家玉暗傳經簡金餘賜誥花斑衣無復戲遺恨徹天涯耄期何所樂有子使三呉方享千鍾洎俄成五鼎踰搆堂遺素幔祔域閟黄壚欲拜臨終像它年記結趺吳宜人挽詞夀富居然五福先簪纓況復世蟬聨斷機志節酬平日舉案風流記昔年上郡方䝉湯沐地諸郎應廢蓼莪篇送車千乗松門道㑹有雙飛鶴戾天長短句浣溪沙和鄭慶襲雪中作雲幕垂垂不掩關落鴻孤没有無間雪花欺鬢一年殘欲把小梅還鬭雪冷香嫌怕亂沉檀惱人歸夢繞江干花信催春入帝關玉霙爭臘去留間不禁風力又吹殘客舍不眠清夜冷縈愁一縷裊旃檀空庭月落斗闌干葛使君示書有元夕寒廳孤坐之歎昨日石林寄示所和江神子輒亦次韻和呈因以自見窮寂之態華燈高宴水精宮浪花中意無窮十載江湖重綰漢符銅應有青藜存徃事人縹緲佩丁東卧聽蕭寺響疎鐘渡谿風轉空濛月上孤牕鄰唱有漁翁追念使君清坐乆歌一發恨千重又和葉左丞石林魚龍戲舞近幽宫亂山中似途窮緑野堂深門敞獸鋪銅無限青揺攢峭壁花木老映西東消磨萬事酒千鍾一襟風鬢霜濛憂國平生堪笑已成翁唯有經綸心事在承密詔看重重龜谿集巻三欽定四庫全書龜谿集巻四宋沈與求撰
