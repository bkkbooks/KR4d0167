body:
  text: 啓狀附謝運使胡修撰舉改官啓浮沈州縣甘老簿書出入門墻誤緣翰墨更借扳援之勢遂成汲引之恩投足知歸撫心懷感伏念某江湖一介塵土半生叔夜粗疏顧豈堪於作吏次山浪漫蓋已懶於為官未能成洗耳之圖不免效折腰之態庸庸備位職號馬曹纍纍隨行事同牛走念是非之相亂致力命之兩疑借曰自媒正使誰譽比因修小記室之問乃得望大君子之光盼睞所加過為衆中之異聽聞或誤遽忘名下之虛公賜品題曲為道地意極丘山之重言逾布帛之溫退省空疏豈能稱塞兹蓋伏遇某官權衡一世水鏡九流發為月旦之評動合春秋之法弊帚無用提携遂享於千金駑馬有知鞭䇿更勤於十駕不忘委瑣亦玷揄揚某敢不欽誦格言勉圖薄效許以操修加名御當遵節義之大間謂其學問過優敢衒文章之小技庶幾激勵毋辱知憐賀年啓星回嗣歲月旅上春適三陽之類升宜五福之交會恭惟某官政先平易德懋中和遍歷劇煩煥若凝冰之釋一蘇疲瘵暖然挾纊之溫對越令辰受時純嘏遂被疇咨之命式登光輔之聯某心系門牆身迷州縣舉賀觴而莫及削慶牘以徒勤謝秀守苖郎中舉改官啓二紀服儒猶念呻吟之舊一官書獄豈堪流落之餘遽辱提撕重為榮耀伏念某受生多難涉世少徒偶從鍾釜之謀輒汚軒裳之列衒玉賈石夫豈本心乞酒得漿亦其定分亟捨絃歌之樂驟親敲撲之煩羣言譊譊爭沮幕中之辨獨行踽踽敢矜席上之珍乃使挂需頭之章終免為搖尾之態靜言特達重愧空疏此蓋伏遇某官隱德在時深忠許國牧人馭衆共師循吏之風流推賢與能自得上臣之識度優容寒素曲賜奬成某敢不銘肌感恩刻意為善庸庸末學儻有見於施為斷斷餘生庶無忘於報稱謝運使王待制舉改官啓三語就掾亟從莫府之趨一字興褒輒纍公車之薦荷恩已過揣分奚勝伏念某濩落散材媻跚蹇足貧交易厭揖窮鬼而告行拙迹難安拜天孫而請禱念兩求之皆失歎百慮之相攻髮已星星心徒炯炯一昨汰從黌舍還綴銓曹路隔九霄豈有修門之夢家存四壁未成下澤之遊挫針資糊口之謀束帶效折腰之役當塗知已或似寒蟬末路依人空慚社燕幸嫌名光堯褰帷之始喜形傾蓋之餘召置門墻使操翰墨然員多闕少時方會於省官而親老家貧勢固難於擇祿朅來書獄聊以代耕蓋由剡列之私既適便安之願更煩汲引彌見矜憐此蓋伏遇某官盛德容愚通才應變以成室屋兼收椳闑扂楔之微可羞王公近采蘋蘩蕰藻之賤故雖沈於下列亦不壅於上聞加惠寒生增榮孤宦某敢不希蹤先列抗志後陳抱槧磨鉛期不易儒者之事飲冰食蘗庶無負門下之知賀提刑啓伏審奉承溫詔臨按祥刑瞻擁傳之星馳知屬城之風靡餘光所屬歡意已孚恭惟某官藴識疏明懷才敏達溢為政事曽不愧於古人著在謀謨皆可行之天下及被承顔之寵遂紓造膝之私親被上恩就更使命威聲所徹但聞草木之知氛祲一消無復狐狸之問恐未遑於暖席遂已趣於賜環退省孤蹤獲歸餘芘萬事不理行賴於多聞六轡既均庶陪於後列欣榮之至敷敘曷周賀沈狀元啓伏審奉大庭之對擢居多士之先讎祕府之書進列羣仙之右寵踰疇昔聲振綿區恭惟歡慶竊以國家數路設科三歲下詔豈特循祖宗之法蓋將收豪傑之才紛然朋來至以萬計蔚為首選固多異人曾未有夢兆一飛恩加再見家聲踵復襲兩世之青氊宸藻親褒煥九天之丹檢付以圖書之職示為翰墨之儲名雖先登事豈前比伏惟某官文備衆體學總百家節槩軒昻鬱鬱棟梁之氣見聞淹洽滔滔江漢之流蚤也從四方之遊固已擅一時之譽朅來文陛獨冠英躔上興見晚之嗟士有先覩之快蓬山藝閣之直何足道哉金鑾玉堂之除可立待也某沉迷簿領荏苒歲時未敢幐書輕為贊喜之禮乃蒙削牘曲致撝謙之詞愧感既深名言罔既賀左丞啓伏審天綍疏恩台躔進次正泰階六符之象冠文昌八座之聨成命下傳善類相慶恭惟某官三代豪傑一時宗師夙懷經濟之圖深達彌綸之體晉公德望孰不問年齡之幾何賈傅才名豈止對鬼神之所以智略輻湊風采想聞自登政席之崇彌見勳盟之著九夷通道綽有成功三后協心舉無異議乃就升於左轄以增重於中臺帝眷既隆臣鄰益峻某登門最舊受顧已深聞天上之除音殆將起舞記日邊之歸路正復坐馳抃躍之私輸寫難盡賀張狀元啓伏以法駕親巡不廢詳延之問紛袍族議巳推絶類之才乃下臚傳果先科列伏惟慶慰恭以某官躬行篤實資稟魁閎久於湮淪獨高鄉曲之譽素所蓄積綽有廊廟之謀一朝遂冠於英豪諸老盡驚其剴切莫可尚已夫豈偶然主上痛悼往圖渴聞至論以為飲食嘗膽之日必有慟哭流涕之言特下詔音專求讜直禦戎三䇿殆興見晚之嗟寤主一言孰先名御獨之戒方將攄發舊學踐履亨塗庶幾寫平生憂國之心何止為今日決科之具屬兹晚歲竊伏下風未遑柔翰之修先辱珍函之貺感銘丹臆倍蓰常情賀凌先輩啓伏審奉承大對擢置上科拜命赤墀猶亞一龍之首題名翠琰遂居千佛之先用吉士乃邦家之光納讜言真社稷之福未遑馳問遽辱飛箋感愧之深敷宣罔既謝黃子虛學士啓伏審比膺詔旨追寵諌章黨石刋名忠節凛於當代書林進秩恩光溢於暮年幽憤既申勝流相慶伏惟某官仁言利溥義勇氣充蓋萬折而必東雖三已而無愠白日一照伯魚何辨於前誣高風四馳叔向自全於遺直時方扼於變亂上益思於典刑佇聞追鋒來副仄席眷言宦學久預交遊邂逅公朝舉揚正論喜極阻修於柔翰謙撝亟貺於珍函感愧之深名言罔既謝曾顯謨啓比者遍塵三院久汚紀綱之思進總一臺忽玷絲綸之命莫遂循牆之避更增據蒺之憂冒寵益深負慝彌重上意開納知犯顔逆指之非難國步阽危念疾首痛心而何補敢謂隆謙之眷過形褒大之詞披繹再三驚慚倍百此蓋某官多聞守約泛愛親仁緇衣好賢之誠德配先正青箱傳世之學名滿諸儒特煩揮翰之勤加賁登門之舊規存麗藻感發懦衷銘鏤之私敷陳曷既賀趙參政啓伏審進登舊弼參總繁機命下九天歡騰萬宇竊惟自古祻亂之國必生希世豪傑之才因時作興與民休息臨巨川而未濟方俟舟航扶大厦之將傾必資柱石副上此意非公而誰伏惟某官誠格天淵忠存廟社方嚴足以斷大事靜重足以經逺猷直道而行獨立不懼蹇蹇王臣之節更變故而彌堅赫赫師尹之瞻遭讒邪而益著擠之劇地凛然威名是致未央興夜半之思長安指日邊之路逮膺出綍不俟解鞍見管夷吾誰復效楚囚之泣用范武子自然知晉盜之奔爭覩設施預期戡定豈特疲氓之引領是為善類之傾心矧此孤蹤嘗叨異盼方念一麾而去國未能三賀以登門抃躍私誠倍萬常品知鎮江與户部姚侍郎先狀比者誤膺明命寵付便藩顧衰病之無庸豈堪煩劇賴知憐之有素遂託庇存即獲參承倍增欣抃知鎮江通用謝狀比者忽膺明命寵付便藩收迹山林之間方圖屛伏從事干戈之際豈克堪任揣分知難冒榮為懼此蓋某官推心忠厚迪行端良借餘論以噓枯致誤恩之起廢更蒙珍翰用賁孤蹤感愧之私敷陳罔既知鎮江與韓帥先狀比者誤膺明命寵付便藩久伏山林之間豈堪煩劇仰託節旄之下庶獲庇存屬鞬將謁於轅門削牘敢塵於記室依歸之素敷敘曷殫知鎮江回人賀啓比者忽膺明命寵付便藩收迹林泉之間方圖屏伏從事干戈之際豈克堪任揣分知難冒榮為懼此蓋某官壯猷排難雅量包荒借餘論以噓枯致誤恩之起廢江山如故方從仁里之遊雉堞相望更託善鄰之庇特貽珍翰益賁孤蹤知鎮江府到任謝宰執啓起之間館付以名城井邑丘墟未變創殘之俗江山襟帶猶為形勝之區宿師方折於遐衝謀帥乃推於庸品才雖靡稱恩則有歸此蓋伏遇某官柱石邦圖蓍龜國論以一夫不獲為重任以四方未靖為深憂雅量鎮浮屹立中朝之望元功定難力摧外敵之鋒蓋將扶大厦之顚故盡掩羣材之短遂令駑鈍亦纍埏鎔既奔命以之官庶收功而塞責然某衰羸多病褊急少思方當調發之煩未免催科之拙願寬銜勒覬脫簡書不失朝廷勞來之方是為門闌收録之報問候劉帥啓印紱相承猶接典刑之舊旌旗旁列遂依節制之雄嚮風每跂於前塵蒙霧自霑於餘潤願修竿牘少罄情悰伏惟某官韜略承家勳庸許國威望聳傳於四裔忠誠簡在於九重行總全師往清方夏平時外敵素知李廣之無雙即日中興必倚汾陽為第一是為社稷之衛宜擁神靈之休更冀妙嗇天和允答人望遡詠之切敷敘曷殫除尚書回人賀啓起領州麾未聞治狀趣還朝著忽拜召音仰蒙簡記之恩俯念衰羸之質輒嘗引疾庶欲投間成命莫回預積曠瘝之懼移書遽及過形褒借之私感愧之深敷宣罔既回孟參政啓羽檄上聞驚犬羊之入冦鑾輿順動總貔虎以親征宸謨悉出於萬全士氣殆逾於百倍苻堅之扣淝水聊與周旋佛貍之死卯年必期奔潰逮其卻走舉協初謀此蓋某官識際天人心存社稷參籌帷之祕資經逺之壯圖總留鑰之嚴倚居中之夙望致敵鋒之屢挫知國步之永安某猥以微才濫叨近列負櫜鞬而扈蹕奉引何功擁祓篲以造門趨承甚邇餘寒在候珍嗇是祈謝席參政啓比者叨奉制綸擢陪政路屬四郊多壘之際贊一日萬幾之煩薄技奚施嘗循牆而避命俞音既嗇終據蒺以拜恩綿力弗勝靦顔安寄此蓋某官宅心忠恕迪德謙虛延譽當朝每託吹噓之末論交晚歲更親矩矱之餘遂致微蹤遽膺重任辱賀緘之彌渥攄感臆以徒深銘鏤之私敷陳曷既謝前宰執啓比者叨奉制綸擢陪政路屬四郊多壘之際贊一日萬幾之繁薄技奚施嘗循牆而瀝懇俞音既嗇終據蒺以拜恩伏念某學昧通方才疏適變偶以片言之合驟蒙上聖之知念人物之眇然誰不如已處廊廟則駭矣人其謂何汗號莫回靦顔安寄兹蓋伏遇某官柱石王室股肱帝躬宏濟艱難務兼收於羣䇿旁招俊乂圖並輯於庶功藐是孤蹤越從下列即託埏鎔之末親聞矩矱之餘訖致妄庸誤膺光寵中存丹赤徒知當勉於夙宵外竭罷駑誠恐莫禆於塵露感銘之切敷敘曷周謝劉宣撫啓竊以羽檄四馳遽音日至天戈一指醜類宵奔成宗社莫大之勳振朝廷久衰之氣威行塞外歡動區中伏惟某官躬受傑才世資雄略吳漢若一敵國屢挫犬羊之鋒嫖姚比再冠軍益整貔貅之旅屬兹逆冦挾彼援師深入兩淮之間相持三月之久仰繄勝算盡伐狡謀曽無亡矢遺鏃之虞每有折馘執俘之捷符堅之扣淝水聊與周旋佛貍之死卯年果聞濳遁顧外敵之已卻諒中興之所基草木類人旌旗動色功存萬世方將固山河之盟位列上孤豈特聳干戈之衛自惟晚歲獲與殊休喜抃之私敷陳罔既回汪相公啓竊以門牆敻阻莫瞻華衮之尊使介俯臨荐辱珍函之寵退惟固陋渠敢奉承伏惟某官社稷元勳朝廷舊德屬上聖龍飛之日會中原雲擾之辰首定大橫之占克扶漢祚將啓中興之運復振周宗既攄經濟之謀聊遂燕間之樂收四方之能事每欲從赤松之遊明一士之宿寃獨追恨伯仁之死雖春秋責備於賢者然禮義何恤於人言過形引咎之詞彌見執謙之意載深紬繹倍切感銘春律寖暄琳宫多暇願精調於鼎食益加衛於生經回知福州張參政啓伏審祗膺休命顯答茂功升祕殿之隆名增介藩之勝勢伏惟慶慰恭以某官巨才周變厚德鎮浮入與政塗活國之謀具在出分戎閫干城之略益昭蓋身自任於安危故心每關於休戚屬時逆黨挾彼強鄰遽涉地以深侵擬投鞭而徑渡天臨萬騎至煩鑾輅之親征雲集千艘卒賴樓船之為助况委輸之狎至加籌䇿之上陳逮此班師宜先懋賞韓滉濟陜郊之餉絶歡動六軍常衮報閩嶠之政成寵歸三事顧嚮風之逾切辱流問之過勤感篆滋深名言曷既回李觀文啓伏審誕膺明命茂對閎休冠書殿之班聨正台司之體貌丕昭異數允協具瞻伏惟歡慰恭以某官盛德格天傑才經世凜凜公輔之望身退而道愈尊堂堂社稷之勳時危而節益著雖緑野遂晉公之樂而蒼生思謝傅之歸曾謂衆非尚謄多口日月在上風雨不渝塞翁之馬自還田者之牛安在坐復青氊之舊於我何加行歸黃閣之崇斯言可必某猥參近列逺映餘輝阻修賀燕之儀驟獲烹魚之素仰慚謙眷俯劇悸悰感佩之私敷宣罔既賀孟觀文啓伏審抗章宸極得請輔藩伏惟歡慰恭以某官亮節端朝純誠翊世有開濟之才以戡多難有深厚之德以鎮羣浮參斡萬幾備更六載顧勳勞之克著宜風采之聳聞楚粵塵清雖已掃潢池之習關河霧塞猶未奠神州之居方倚老成庶圖恢復遽辭榮於右府暫分命於左符書殿絶班邈連霄漢蓬山傑觀近隔濤江想偃斾之未遑恐賜環之已下退惟孤拙夙荷庇庥悵會合之多乖欽出處之全美依歸徒切敷敘曷周謝送生日詩狀伏蒙都騎見存大篇為貺曲記劬勞之日過形褒頌之詞伏讀嘉言敢忘重拜占斯干之吉夢愧此餘生誦汝墳之卒章居然永歎感銘之至敷敘曷周回路樞密謝復職啓伏審祗拜渥恩寵還峻職搢紳胥穆表著用光恭惟某官德懋儀形志先康濟歷艱難之多變恃直亮之一心越秉鴻樞居存勝算辰猶克壯將枕戈以立功名晝接方隆忽解組而辭富貴雖緑野之居甚樂然蒼生之望彌深比下明綸進聨祕殿蓋謂孔戣之去理或未宜必知季子之歸時乎有待尚阻瞻承之幸過蒙問勞之勤感佩滋多名言曷既回折樞密啓伏審進儀帷幄參斡樞機圖國步之敉寧孰堪大任契上心之簡在自屬真賢郵音播傳輿論欣穆恭惟某官才兼文武學際天人亮節孤風名素高于當世深謀至計志每切於生民自頃來歸即期登用數奉凝旒之對果膺虛席之求孔明之卧隆中身嘗不屈夷吾之在江左人以無憂必將發揮平日欲行之言用能經營方今未畢之事衆口所必斯言不誣退省衰蹤久叨末契甫投間於鄉社實託庇於門闌依鄉罙勤輸寫難既轉官許回授與兄謝宰執啓庀職無功叨被公朝之寵抗章有請願為私室之營仰承出綍之恩俯慰陟岡之念兄弟感泣父老歎咨伏念某起家寒微涉世迂濶進踰涯分自貽滿溢之虞退省愆違猶負顛隮之懼至若成書之奏御固已乞身而去朝敢謂第名例蒙朌賞念事為之靡稱控懇避而莫諧爰念急難冒陳迫切雨露之澤既霑被於同根雲漢之章復表揚於異數夫何僥幸有此遭逢兹蓋伏遇某官直道事君誠心好善性惇孝友用風勸於多方身任安危將日新於庶治過蒙矜惻乃獲褒俞方收迹於山樊第歸恩於陶冶銘鏤之至敷敘曷周賀張參政啓伏審進膺詔綍參斡事樞恢張逺圖將肅清於國步登用舊德首厭服於人心郵音播傳輿論欣穆伏惟某官才本人傑學為世師問望冠於三朝風采傾於四海論關休戚炳若蓍龜之明行蹈險夷挺然金石之操雖緑野之居甚樂而蒼生之望益深果下賜環趣覲行殿亟踐廟堂之舊倚平疆埸之虞江左之見夷吾已期剋復魯人之思季子皆喜來歸諒少展於謀猷即盡戡於禍亂書功不朽指日以須顧惟衰遲夙叨知眷念收迹江湖之上獲庇身陶冶之中抃躍私誠倍萬常品回賀正狀王正謹始人統開端惟時耆英宜享壽祉伏惟某官才周庶事學富多文方茂對於春祺諒亟還於天闕過蒙慶問第切感銘回趙相公啓比者濫膺詔綍參執政樞未遑坐席之安更躐朝班之峻寵私沓至控微懇而弗俞憂責併加撫衰蹤而靡稱懼形心骨愧溢面顔伏念某出自寒家本非逺器干祿之學曽不足以禔身負薪之言夫豈堪於謀國頃緣虛奬馴致徹官久貽尸素之譏甫遂歸田之幸聖恩未既遽因簪履以見收愚慮已殫無復絲毫之云補不圖兩月而閲三遷屬當郊壘之多曷贊帷籌之祕深知忝冒積負兢慙此蓋伏遇某官道合天民才優人傑功高社稷久登翊於睿謨望重搢紳專統盟於善類夙借吹噓之力曲為根柢之容遂使衰年復叨殊用崇墉在望尚稽感臆之陳寶翰流音亟辱慶緘之貺銘藏之至敷敘莫周與浙東安撫趙相公啓伏審某官上丞相之印辭榮廟堂分刺史之符作鎮藩服俶開盛府誕布寬條想風采之一新知歌謡之四出伏惟某官忠存社稷德冠天淵出扶邦運之危上簡帝心之眷沛然膏澤既得百姓之心赫爾威名方制四夷之命決䇿已定脫屣如遺之高謝於成功以大振於頽俗平津之開東閣翹材盡萃於一時裴度之守北門殊禮佇觀於它日公歸未晚人望如斯退省衰蹤久叨末契欽勇退之節雖逖想於高牙賦遄歸之詩即首迎於華衮依鄉之切敷敘曷殫知樞密院回前執政啓里巷投間方少休於疲曳巖廊圖舊俄復玷於寵休顧陳力之不能當試可而乃巳靡容控避祗負兢慙某􅑆啓寡聞尫羸多病昨以耝耰之質進與廟堂之遊過計拳拳雖有徙薪之慮空言落落卒無橫草之功恐孤奉於明恩期退藏於晚歲不圖逺外猶纍簡求惟樞機之臣職在甲兵之問未之學也豈能忘尸素之憂方且圖之何以濟艱危之會拊心惕若承命赧然伏惟某官云云致是迂愚復兹忝冒時哉不可失固欲勉於著鞭老矣無能為誠恐貽於覆餗尚祈告教少逭譴何猶稽柔牘之修遽辱珍函之貺謙光所逮朽質為榮愧感交深控陳難盡趙相公盛德冠時殊勳蓋世身雖勇退委萬鍾如脫屣之輕計或決行措四海若覆杅之固素緣知眷嘗贊設施韓宣撫劉宣撫忠貫神明功存社稷將制四夷之命共圖九廟之安李相公席參政盛德冠時傑才經世心存王室每敷納於嘉猷力挽人材專統盟於善類曲敦交際公賜揄揚孟留守厚德鎮浮殊勳翊世典刑所屬暫司留鑰之嚴體貌方隆將拜制麻之寵曲敦交際公賜揄揚李尚書直道立朝精忠許國曲敦交際之舊每借揄揚之私沈忠敏公龜溪集卷第十終
