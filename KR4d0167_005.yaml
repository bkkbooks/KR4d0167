body:
  text: 內制表附詔勑書口宣表內制詞文表賜嶽飛詔比得張浚奏知湖湘之冦悉已肅清紓朕顧憂良用欣愜非卿威名冠世忠略濟時先聲所臨人自信服則何以平積年嘯聚之黨於旬朝指顧之間不煩誅夷坐獲嘉靖使朕恩威兼暢厥功茂焉腹心之患既除進取之圖可議緬思規畫嘉歎不忘然恐招撫之初人懷反側更冝綏輯以安衆情措置得冝彼自馴擾必與卿計之熟矣或有陳請可具奏來車駕進發賜臨安府詔諭朕以諸將之兵分屯江上捍禦敵人暴露勞苦今將幸其營壘親撫勞之庶幾戮力一心以安宗社疆事稍定即議回鑾咨爾此邦之人當體朕意賜劉光世張俊詔得張浚奏比至太平建康閲視卿所部軍馬武藝精強士氣振發他時卻敵決取成功至於紀律嚴明秋毫無擾民旅和會上下安定繇卿訓督所致良用歎嘉故茲親筆奬諭想冝知悉賜李綱詔朕以大江之西俗輕而悍兵之寇無歲無之師旅荐興民益凋瘵肆圖舊弼往填臨之卿威名德望聳動一時風采想聞人自懾服起于間館作我價藩匪惟指顧之間一變潢池之習先聲所暨諒折遐衝朕之用卿審矣卿冝以安社稷為已任勿間中外勉為朕行不必數有請也故兹親筆詔諭卿其悉之賜吕頥浩詔朕以湖湘八州之地西通巴蜀為國上遊往連盜區一方騷動比者招輯雖巳略平而民俗剽輕或易生變允藉耆德往填撫之乃起卿燕間之中而屬以方面之事庶期談笑坐以銷萌慰彼黎元增重形勢而抗章固避殊咈于懷惟卿社稷元老身任安危必不以內外為間諒應聞命慨然引途故兹親筆詔諭卿冝悉之賜劉光世詔覽奏欲赴行在奏事必有為國經理之謀歸以告朕良用歎嘉朕意亦欲卿一來緣遣相臣浚往江上視師行日甚近又恐緣此滯留俟浚至彼卿可一面商量或更有所見具奏以聞固所望也卿冝悉之賜交趾郡王李陽煥曆日勑書朕正位凝命纂聖緒於纍朝治曆明時加王正於率土眷爾藩服為豫世臣適臨改歲之端冝膺頒朔之慶占耕期於農扈克謹民功奉貢職於象胥必遵侯度今賜卿紹興三年日曆一卷至可領也故茲示諭想冝知悉秋冷卿比好否遣書指不多及賜武泰軍官吏僧道耆夀等示諭勑書朕以郭仲荀將門華胄帥閫徑臣出則總護於戎行屢任瓜牙之重入則典司於禁衛見謂腹心之良再扈巖廊之居彌肅綴衣之列嘉乃忠節推其勇功肆開屏翰之雄盡復節旄之舊逖惟雅俗素服能名及聞廷號之朌必盡輿情之望今特授郭仲荀武泰軍節度使依前云云賜吳玠王彥關師古奬諭勑書朕乘歷運之中微屬方隅之多故兵塵數起邊候屢驚永懷秦雍之區久罹夷狄之禍暴骨滿野連城為墟興言霣心引望流涕式資驍鋭之將屏此腥羶庶使創殘之民脫於塗炭卿世家隴右氣稟山西攄忠憤於胸中燀威稜於塞外運竒合變並施九拒之謀鼓勇爭先悉用萬全之略潛軍一舉迸騎四馳折虜勢於方驕激士心而復振茲為社稷之衛良慰鼓鼙之思然念歲月倭遲風霜偃薄勤勩雖由於爾力咎責實歸於朕躬更奮鷹揚之師益殱蟻附之衆剋復疆土撫定黎氓赤囊之捷系傳功既存於廟祏丹書之誓永固福自及於子孫各堅乃誠勿忘朕訓賜朱勝非辭免右僕射恩命不允口宣卿功存應變德協鎮浮廷號肆朌朝僉允穆冝膺眷意往柄宰司賜郭仲荀辭免特授武泰軍節度使恩命不允口宣卿家傳韜略世載勳庸忠謹自將簡注惟舊復朌節鉞仍侍殿巖往服異恩益圖休烈今賜卿告想宜知悉賜孟庾辭免進通議大夫不允口宣卿總護戎行掃平冦虐褒功未稱避寵奚為其服恩章勿形遜牘賜邢煥除慶逺軍節度使充醴泉觀使辭免恩命不允口宣卿系出儒家恩聨戚里謙恭有守靜名御無譁齋鉞既朌廷紳允穆往承茂渥勿復牢辭上太上皇帝表臣御諱太上言籲天迫切久期鑾輅之還閲歲推遷猶闕寢門之問想百靈之奔衛致萬福之來宜中謝恭惟太上道君皇帝陛下道格神明仁霑動植釋位退託雖殊南內之居履時艱危未返北征之馭臣尚遲虞侍每積憂思民心徯於歸君彌極天旋之望帝命從於與子必諧晨省之祈臣無任上太上皇后表臣御諱太上言慈闈猶阻屢驚歲月之移夀斚莫陳每積晨昏之戀隂知天意密護聖躬中謝恭惟太上皇后殿下德庇六宫恩涵萬宇練衣出笥素存椒掖之規翟馭旋途應罷瑤池之集臣思深語咽望極涕零冨貴不足解憂致孝當嚴於大養疾痛則必反本祈恩式佇於遄歸臣無任代高麗國王王楷表二首臣某言仲秋漸涼恭惟皇帝陛下聖躬萬福臣某誠瞻誠祝頓首頓首竊念臣叨司蕃寄襲箕子之餘風瞻望宸居效封人之善祝臣無任臣某言今年六月十七日迪功郎吳敦禮至奉詔書一道者使指遄臻訓詞俯逮豈圖踈逖敢冒寵靈中謝恭惟皇帝陛下出震以應期乘乾而御變非后何戴民咸懷于有仁其命維新天亦佑于一德時雖屬于多故日可期於太平言念下蕃素陶聖化之屏之翰曾莫效於微勞為龍為光乃屢叨於異數頃馳賤介祗述貢儀可嗟一葦之航未能汔濟致使小邦之信不獲升聞深自凌兢莫遑啓處適以遭家之多難又稽繼歲以入朝敢期睿明灼見誠悃特講省存之典俾知眷遇之豐恩實非常報將安所復禹之績願克紹於先王曰商是常期不隳於舊職臣無任內中祈禱感應改謝道場開啓祝文伏以官占告異乾象示威妖實自於人興孽匪從於天作惕惟眇德肅事沖和荷眷顧於靈虛匿光芒於杳靄况撫艱難之運尚懷惴懼之誠庶保祥圖悉回咎證內中祈禱感應青詞伏以菲德賜圖期副天心之眷妖芒動色致干星象之臨深惟謫見之端聿懷銷復之慮忱誠密扣威命潛回發精祲於至和還次舍於常度更祈貺施益勵寅恭冬至御侍已下賀皇帝詞語伏以一氣潛萌驗群隂之退聽七日來復推五福之類升恭惟皇帝陛下躬履勤勞志成戡定緝熙庶政深得損益之宜陟降百工大明消長之分茂對舒長之旦式膺蕃衍之祥三靈顧歆萬宇寧謐妾叨塵禁侍獲奉宸慈測繡縷之初遲騰夀觴而胥抃表代賀元會表二首清臺紀候載臨七始之期路寢頒常丕講三朝之會惠均黎獻喜浹寰區中賀竊以輯五瑞於虞庭止稱群后辨九儀於周室爰及諸臣蓋將受萬國之朝因以上四方之計欲稽本始冝在端元恭惟皇帝陛下凝命紫清匹休黃序愛育萬物則仁行如春照臨百官則德進乎日故極舟車之所至皆奉琛賮以攸歸乃究皇儀聿宣帝澤庭實千品肅正守之臚傳陛戟百重壯周廬之羽衛威容備舉物采彰明遂修曠古之闕文以續纍朝之盛典臣繆當支郡方遠周行目想雲霄猶記鈞天之九奏身居湖海阻陪嵩嶽之三呼法座端臨懋講初元之會禁庭肅設並造大昕之朝折爼均慈康衢溢喜中賀竊以六年考五服之制度雖本周官三朝受萬國之貢珍實存漢法蓋體一元統始之義以識庶邦享上之誠冝在昌期克修令典恭惟皇帝陛下紹休􅊨纍聖席慶叢霄道樞得乎環中德澤施乎方外盛禮興樂與三代以同風執贄奉琛致九州之共貫因歸事於宰旅遂辨等於司儀時乘嗣歲之興詔即當陽之御陳百寮而贊群后臚句交傳尊中國而服四夷威容兼備臣濫馳使驛久去帝閽稱夀觴之九行想聞鼇抃閲庭實之千品阻綴鳬趨代賀收復杭州表狂冦逋誅馴致入郛之警偏師薄伐亟還按堵之居種類既殲流離悉復中賀竊以東南巨屏吳越舊封在昔割據之初未嘗用武維今休息之久豈復知兵故輕狡之連謀乘安平之弛備稍稽捕逐寖肆跳梁負匱擔囊始依慿於山谷揭竿斬木卒驚犯於潢池比及上聞聿頒中詔憫愚民之冒昧因重使以招徠猶冀竄藏方圖剪滅蟣蝨之癢脫或俟於爬搔雷霆之威顧豈勞於摧折縱於九拒舉以萬全適陳將鉞之嚴已復侯藩之舊恭惟皇帝陛下弛張文武出入聖神法日月之照臨體春秋之生殺蠢茲姦宄殘我善良欲空烏合之群肆遣鷹揚之旅果慿勝算克濟成功示恩信於一方燀威靈於四裔臣繆當支郡實控要塗首興備禦之謀嘗集散亡之旅逮承嚴召猶敢留行簞食壺漿樂致王師之饋鼎臑爼胾願𢋫皇武之歌雖阻預於稱觴亦庶同於擊壤代提舉常平謝到任表乘使傳之光華曾微報稱奉帝綸之溫厚更辱超踰寵至若驚感深以涕中謝伏念臣受材綿薄植性滯頑結髮讀書粗知於為已彈冠從仕常切於慕君乃忘習俗之是非但守家傳之清白激昂志操黽勉事為斷斷它技之猗無終慚意廣録録竒節之未有愈覺心勞頃被誤知驟叨煩使摘山煮海適當寶藏之興足國裕民已見宿儲之備陶冶悉歸於帝力斡旋何數於臣功敢謂矜憐曲加奬拔就躐將明之寄俾專朌斂之權原隰所經弗改馳驅之舊倉箱既溢第令取豫之均退省何人輒汚此選茲蓋伏遇皇帝陛下堯仁天大周道砥平恤隱逮鰥罔俾一夫之失所裒多益寡遂令萬物之得冝欲實德之周施眷微勞而畢録特捐異寵因勸庶工臣敢不肩此一心展其四體鑒覆車之前戒廣蔭樾之深恩雖曰涓塵庶可增於高厚譬如草木豈能謝於生成代謝賜出身表綴甘泉之班已塵法從賜奉常之第更擬賢科捧溫綍之粲然撫微軀而愧甚中謝伏念草茅末族韋布陳人蚤歷詞場曾無足用之學繼從官牒遽有多取之名恐淟涊於俗吏之為故激昻於儒者之事身迷簿領幾負平生耳熟絃歌猶驚昨夢忽被龍庭之異眷亟追鴈塔之英遊禮異詳延恩踰特起服章雖麗恍如脫於白丁詔墨未乾喜若登於黃甲何期暮齒乃遂初心此蓋伏遇皇帝陛下駕馭英豪撫綏黎庶下訪山林之隱逸旁咨軒冕之棄遺數路俱收寸長畢録察臣粗諳事任故加以次對之名憐臣稍涉藝文故清其出仕之目臣敢不深體至意益恢逺圖考究古人之書講明當世之務庶諱欽廟臣節以報主知代謝轉官表一首轉粟千艘曾微異績就官一列忽玷明綸恭承眷奬之私罙積超踰之愧中謝伏念臣受生艱拙奮迹羈孤讀書徒守於陳言初非利巳任職僅逃於常憲何以愈人頃蒙推擇之優薦領輸將之重會當師役方翦冦攘率饋餉以周行越江山之回阻服勤庀事蓋分守之當為奏凱第功豈寵光之敢覬例加殊賞誤及微勞此蓋伏遇皇帝陛下道妙曲成智深旁燭威稜遐暢既空蠅蚋之群褒典嗣頒已遍貔貅之旅乃眷飛芻之力亦疏增秩之榮臣敢不益侈帝恩具宣使指循名考實雖未知足國之謀宿道嚮方或庶幾報上之節代賀南郊禮成表三首泰疇奉祠昭事上帝端門肆赦敷錫庶民恩浹幽明歡均溥率中賀竊以天人相與莫尚於郊丘祖宗以來尤嚴於禋祀導迎至景謁款大神蓋將答四海之歡心豈特循三歲之故事恭惟皇帝陛下紹休纍聖席慶叢霄盛德升聞已極和同之妙彌文備舉故忘登降之勞禮既洽於精純澤遂疏於優渥臣屢膺煩使阻逺周行肹蠁潛通想巳瞻於鄉坐福釐旁暨愧莫預於駿奔泰壇竣事修三歲之親祠解澤流恩宥萬方之多罪凡居覆幬同極歡呼中賀竊以申陟配之嚴雖云舊典正合祀之失蓋自新儀彌文具而孝隆精意昭而福備乃施惠術爰及眚災伏惟皇帝陛下德合乾行功循祖武丕釐上帝之命志在寅恭承底蒸民之生務存寬大既定郊丘之卜肆均海宇之休臣猥以微軀繆當支郡駿奔於列阻依天日之光誕告所臨俾霑雲雨之潤緹室飛灰甫定一陽之卜紫壇升燎載嚴三歲之祠恩浹華夷慶均朝野中賀伏以宗祈推本陟配奉先千品具而禮乃行百神享而福所降斂時貺施茂對一人之休念此眚災誕敷四海之澤豈惟故事實乃殊休恭惟皇帝陛下凝命昊天同功烈祖既保定爾逺追歸美之言故安樂之克篤守成之志肆及婁豐之候聿修大報之儀惠術俯加和聲迭應臣濫塵扈從叨領輸將迹寄江湖結望雲之遐想分隨草木霑蒙露之餘滋代賀明堂宗祀禮成表寶御名光堯宏開肇正合宮之位齋輿夙駕聿修宗祀之儀慶浹人神歡均華夏中賀竊以頒朝布政於是有王者之堂嚴父配天所以教諸侯之孝創自黃帝逮及成周監二代而伻圖順四時而作則考冬官之記炳然制作之工歌我將之詩允矣威容之盛旋起三雍之議猶存五府之祠於皇祖宗首啓鴻博參稽六籍將革權時之冝追考九筵實待重熙之日恭惟皇帝陛下道隆稽古德懋奉先兼三王損益之文黜諸儒同異之論全謨駿發巨典勃興陽曜隂藏拓豐基於廣內天造地設占王氣於中都茲大饗于先王薦九州之美味肅雍顯相均釐已遍於臣鄰涓選休成霈澤遂周於寰宇臣叨從末宦逖聽鴻猷搢笏埀紳莫預駿奔之列扣瓴擊缶但𢋫歸美之音代賀天寧節表瑤光呈象錫一人有慶之符火德繼明開萬世無疆之福歡聲亘地和氣浹天中賀恭惟皇帝陛下德契分人道極妙物用端命于上帝能保惠于庶民雷厲風飛極號令之鼓舞金聲玉振備條理之始終丕承九廟之休茂對三靈之佑會逢良月允嫌名光堯誕辰四海梯航永奉人正之統千官劒佩交騰天保之歌臣屏迹江湖馳心軒陛望堯雲之紛郁莫預稱觴祝舜日之舒長唯知擊壤代謝侍講表趨詔江湖還置論思之列執經帷幄進陪勸講之聨叨恩每念於超踰瀝懇靡容於控避威顔密邇感涕縱橫中謝臣聞聖主輯稽古之勤實關政理儒臣共守成之樂專在藝文故立誦説之官時賜清間之燕終始典于學庸備多聞之求左右惟其人庶資一德之協况萬世親逢於大聖而群臣莫望於清光必有異能庶存故事臣學殖浮淺文思淹遲多病早衰久矣寖忘於舊業少徒寡耦介然唯恃於孤忠頃扈屬車之後塵嘗預外廷之末議空糜歲月無補絲毫拜州雖切於去國蓋深於眷戀遽膺召節重歷禁扃翺翔玉筍之班紬繹金華之業食殊庭之祠廪併冒新除對延閣之直廬猶驚昨夢顧寵光之若此嗟報稱之謂何此蓋伏遇皇帝陛下躬攬萬幾心遊衆妙文謨武烈治登三代之隆周誥商盤言合六經之懿然猶親御便坐延見邇臣深研上古之書博詢當世之務軫懷遺履輒命賜環臣敢不益戒庸行少酬睿眷盡精極慮顧何以增日月之光擲句分章恐於此窮溝澮之涸為吏部魏侍郎謝表奔命造朝會萬乘親巡之所叨恩拜職就七年舊立之班嘗試可而無功輒辭難而有請俞音終閟感涕空流中謝伏念臣章句之學而昧於適方田野之姿而拙於任劇昨荷朝廷之過用猥緣場屋之虛名齒髮已凋事功奚取念胡塵之俶擾傷國步之艱難方八駿啓塗既不獲執干戈而效臣節暨六龍御極又未能扈警蹕而贊帝謨愧耻塗顔憂憤切骨比膺迅召即戒疾驅冀殫毣毣之思少效拳拳之義雖枕戈待旦每誦斯言然坐井觀天了知何補敢謂奬憐之渥亟收流落之餘旋拜訓詞再二銓部屬師旅興行之際正人材淹滯之初名曰故官事非前日矧茲衰病豈克堪任茲蓋伏遇皇帝陛下神聖先知英武大度負扆而朝萬宇更延奕世之休折箠以笞四夷將靖中原之亂疇咨衆俊宏濟多艱凡蒙惟舊之求莫奪已成之命有如臣輩亦玷此恩臣敢不黽勉夙宵依附日月著鞭雖晚尚肩勵職之心借箸可前期盡報君之䇿為魏侍郎謝得宫觀表嬰疾告休自驚纍月祈哀引退尚憫餘生再仍延閣之班更食珍祠之廪銜恩僥幸撫事徊徨中謝伏念臣頃迫衰遲久投間散辦嚴上道起從一節之趨扶憊造朝願殫千慮之得而臣孤蹤晚達薄命終窮未施橫草之勞已抱負薪之歎庶期少間或能殉國而捐軀况值多虞豈忍臥家而避事悼初心而莫遂荷成命之已行滿盈招跖盩之災天其或者冒昧拜支離之賜臣猶知之此蓋伏遇皇帝陛下燀揚天威恢廓皇度憂勤政事講明興廢之端愛惜人材保全進退之節姑從所欲用恤其私臣敢不休養期年規圖後日畎畞不忘之意終戀蓋帷溝壑未填之身尚期鞭䇿為顔左丞謝賜生日生餼表綸言溫厚曲記始生品物便蕃特存故事荷雲天之施渥知螻蟻之命輕中謝伏念臣奮身衰遲遭世艱棘抵龜而決偶階扳附之榮驂乘而行蔑聞陪輔之效適屆劬勞之日更叨錫豫之私慶溢庭闈驚傳里巷此蓋伏遇皇帝陛下英威馭世雄武興邦恢張遠圖首啓腹心之密昭示至意獨全體貌之隆故捐此恩以華其老回念終身之慕豈廢麋捐興言末路之艱唯知感勵為顔左丞謝賜生日生餼笏記御府分珍加賁劬勞之日親庭拜貺益光衰朽之年此蓋伏遇皇帝陛下獨智沈幾深仁遍愛特朌寵數以勵臣鄰
