body:
  text: 表謝除御史中丞表一節造朝已玷持書之舊十行錫命遽叨執法之榮危悃上陳溫言狎至靦顔就列攬涕知慙中謝臣竊以風憲之司政事所繫臺綱正則百度舉國論定故羣慝消專務抨彈寧容畏忌必也深達治體更練事情本之以仁厚愛物之誠加之以正直事君之道身任衆怨屹如柱砥之鎮頽波言切上心沛若巨魚之縱大壑俾率其屬克大厥官伏念臣多病早衰少徒寡與叨蒙異眷祗罄孤忠危哉樓子之言將共扶於公道甚矣汲黯之戇嘗自觸於駭機一去天墀甫更歲籥召從下澤歸覲清光心驚仗馬之鳴初疑昨夢目駭臺烏之集復守故棲空貽尸素之譏敢有超遷之望忽傳明命驟躐峻班寵過食浮莫遂循牆之避位髙責重更深臨谷之憂此蓋伏遇皇帝陛下自誠而明能哲而惠羣䇿屈羣力並輯謀猷之良公事當公言兼收聽納之美察臣論每專於國計憫臣志獨緩於身謀出自親除就加器使臣敢不益堅素守仰稱殊私明目達聰方廣求言之路摩頂放踵盡是報恩之身謝賜對衣金帶鞍轡表衣裳出笥加寶帶之爛然觼軜在庭傳華韉之沃若叨光焜耀顧影徘徊中謝伏念臣才不逮中識非致逺念起家之寒甚驚卷髮之班如早對妻孥嘗動王章之泣晚懷鄉里寧忘馬援之言頃荷宸慈再紆召節故里靡容於懷紱舊班俄俾於乘驄寖冒寵私每踰分願此蓋伏遇皇帝陛下仁深約已禮厚好賢蕃飾庶邦不待無衣之請命駕馭多士使知有駜之在公特示匪頒以昭眷遇臣謹當依附日月黽勉夙宵負赤芾三百之譏偶先結綬竭駑馬十駕之力敢後著鞭謝除吏部尚書兼權翰林學士表柏臺五院之遊屢經冒進蘭省六卿之列首玷超除更被詔函兼陪辭禁寵榮併集愧懼交深中謝伏念臣涉學迂踈起家寒瑣寸心許國但知直道而行片言得君肯借遊談之助悼竒節之未有慚它技之猗無祗以孤忠數叨異數擇笏而賜李絳獨蒙曲誤之知前席而見賈生每奉清間之燕念殊恩之難報冝嚴譴之必加豈謂忽拜明緡驟躋華序從事銓衡之地力已弗勝寓直翰墨之林才將焉強靡容俯僂罙積戰兢此蓋伏遇皇帝陛下睿智先知英武大度勤於接下圖宣王復古之功寬以用中得成湯立賢之道矜憐狂直之末躐置畯髦之先臣敢不外竭罷駑中存丹赤上山濤之啓事何敢不公草陸贄之詔書終憂靡稱謝兼侍讀表軒墀載槖備甘泉之近班帷幄執經紹金華之絶業皆極儒臣之選悉繇睿主之知銜恩有加收涕無所中謝伏念臣資材戇甚誦數缺然學者以聖王為師歎清光之難望春秋乃天子之事懼微言之罕通豈圖申錫贊書更侍便坐討論三傳之旨參陪五學之遊莫遂循牆終冝避席此蓋伏遇皇帝陛下道侔天運德懋日躋左右惟其人輯搢紳於燕間之際終始典於學脫筆削於廢錮之餘致誤簡知與叨紬繹而臣丹心獨在華髮半空因事獻言雖欲殫千慮之得斷章取義豈能副多聞之求傴僂以還局蹐而已謝除職名宫觀表叨榮帥閫甫回南紀之行養疾祠宫復忝西清之直荷大恩之委曲撫孤迹之凌兢形影自隨涕洟交溢中謝伏念臣家世寒甚質狀眇然不虞朴拙之易危殆至迂踈而難合祗慿直道屢發狂言每期特立而獨行是致多仇而少豫向紓三組本繇上聖特達之知寖閲九遷彌處衆人必爭之地了無裨補積有罪愆間蒙賜對於燕朝數丏投間於散地逮膺重寄自列初心何敢徇於身謀誠恐乖於國事既寬威命亟下俞音望蓬萊之昔遊雖云引去指柴桑之舊隱儻遂來歸祿賜尚豐寵名益侈此蓋伏遇皇帝陛下皇明並照聖度兼容馭衆得官施之冝圖功乘事幾之會憐臣憃愚有守蓋嘗備腹心之臣察臣綿弱無堪不復責爪牙之事故捐異渥以佚殘骸臣敢不追悟昨非退安素分魂煢煢而去國莫效餘忠思毣毣而慕君庶存晚節賀冬至節表律隨候應驗一氣之濳萌卦以類通知七日之來復中賀恭惟皇帝陛下龎恩浹物剛德御時圖回每惜於分隂恢復靡忘於尺地法宫展寀將陳亞歲之儀神策延年必享後天之福臣屏居故里阻預周行測舜日之長徒傾葵藿望堯雲之近分隔泥塗謝知鎮江府到任表奉祠真館本避寵而投間試守名邦忽叨恩而任劇已布哀矜之詔庶銷愁恨之聲下聽民言皆知上德中謝伏念臣衰羸多病朴拙少文奮身無半面之交最為孤立遇主有一言之合亟被深知向塵耳目之司即受腹心之託雖觸犯忌諱每恃包容然排擊姦邪多招仇怨而臣忠在許國義難徇人逮升銓總之曹罙積顚隮之懼稍求散地俄奉俞音一自去於朝班已再更於年所形潛窮谷方追麋鹿之遊夢入修門空想鵷鸞之侣敢圖簡記復玷使令矧此凋殘之餘居然控扼之要江山猶昔雖云襟帶之存城郭已非但見丘墟之積志徒䇿勵才豈堪任此蓋伏遇皇帝陛下器使羣才陶成庶類念臣進繇親擢姑務保全於始終察臣退在自安更令揚歷於中外肉骨之恩逾厚糜軀之報益堅誠恐技窮敢辭責重謹當奉承德意勞還緣畝之民慿藉威靈和輯扞邊之士粗能辦職猶覬乞身謝除吏部尚書表擁麾臨郡靡聞治狀之優曳履還朝忽拜召音之迅班聯雖舊眷渥彌新中謝伏念臣奮迹孤生受知明主越從羈旅之次置在英遊之間六年于茲一節以守犯顔狂論仰翳全度之容率意妄行頻觸駭機之發頃違表著退即丘樊庶少避於滿盈亦茍逃於罪戾恩緣謀帥詔使牧民雖公家之利無不為粗識所嚮然軍旅之事未之學終愧斯言曾坐席之未溫已賜環之亟下自驚衰朽重歷禁嚴此蓋伏遇皇帝陛下信順尚賢聰明稽古多士雜遝皆洞照其肺肝羣胡跳梁已隂得其要領將開興運並用舊人如臣等夷亦在比數臣敢不激昻於事洗滌其衷涉世蹈憂患之途其身已老報君持忠義之節此志不移謝除兼侍讀表召節始頒已冠六卿之列除書繼下亟從五學之遊拜命便蕃撫躬局蹐中謝竊以顧問之職講讀為榮在漢褒絶業之功第參陪於貴戚至唐修更侍之令遂專用於耆儒洪惟本朝遠鑒前代御邇英之便坐延勸學之近臣貴德上賢本以示四方之好惡分章擲句又將質千載之是非必惟其人庶益於國伏念臣聞道最晚涉世甚迃頃蒙特達之知頻侍清間之燕考祖考已行之事每獲口陳誦春秋不刋之書終慚膚引矧茲蹇訥之素加以衰羸之餘復玷充員益難塞責此蓋伏遇皇帝陛下道惟天合德與日新能自得師者王豈清光之可望智而好問曰聖猶多聞之是求乃緣舊恩而及凡品臣敢不勉羞薄技務竭精思收之桑榆心歉東隅之失出於涯涘魂驚北海之觀辭免除參知政事表任重人微敢殫危悃恩隆命確未錫俞音更陳迫切之辭仰瀆蓋髙之聽中謝伏念臣章句之學拙於濟時田野之資昧於謀國徒以四海至孤之迹曲荷九重特達之知遍歷高華曽微補發比膺召命復長銓曹方日俟於譴何遽參陪於機政况風塵之警未息郊壘滋多而宵旰之慮益深朝綱猶紊柬求誤及稱塞愈難伏望皇帝陛下遍察猷為先求望實公回宸渥別授時英雖獨智之有臨宅心奚隱茍衆聽之無咈反汗何嫌謝除參知政事表召還朝著久懷未報之恩擢與政塗忽拜已成之命顧丹悰之屢控念淵聽之莫回寵極而憂感深以懼中謝伏念臣起家農圃託業詩書寖驚麋鹿之姿進躐鵷鸞之序落落難合恃直道而靡它皓皓易汚撫危蹤而甚栗每聞九重嘗膽之誓妄發一介嬰鱗之言見謂小忠曲蒙殊奬雖中外之使令莫效而初終之眷遇不衰欲竭微勞敢遺餘力詎意聖神之求舊遽先豪􆇓而用臣驟置廟堂參陪帷幄况四郊多壘之際贊一日萬機之繁搜粟練兵適欲靖方隅之亂圖事揆䇿又將振朝廷之威孰謂薄才能勝重任莫遂循牆之請更深據蒺之思勉奉溫言實形慙汗此蓋伏遇皇帝陛下恢張庶政延攬羣才憐臣孤立於時素受腹心之託察臣多閲於事庸備股肱之求亟下異除悉從英斷臣敢不依附日月警戒夙宵同寅協恭深懲比德之害砥名礪節上副康功之圖謝賜牙簡金帶表使騎星馳歡傳里巷賜奩天降光動搢紳中謝伏念臣卷曲散材拘攣末學少希柱頰迎爽氣於朝來晚厭折腰揖清風於颯至豈謂奇孤之迹每蒙曲誤之知束帶以朝久汙近列擇笏而賜嘗拜異恩更緣不次之除復冒非常之寵便蕃所寄俯傴奚勝此蓋伏遇皇帝陛下德洽九圍文飾萬象輯康功以綏區夏粲徽數以厚臣鄰遂致孱庸亦叨華煥臣敢不退循紐約深戒倒持服映輕裘自足託臨戎之狀制踰文竹固冝堅擊賊之心謝賜生日羊酒等表使馭星馳詔函天降寵將飫賜榮賁私庭伏念臣系緒寒微技能淺薄親蒙殊奬叨與繁機一節不渝雖每虞於顚沛千鍾弗洎終永念於劬勞適紀左門之弧更拜上臺之餽藐無足稱悸不自任茲蓋伏遇皇帝陛下隆禮養賢至誠接下眷言體貌用為邇列之光式是匪頒不廢彞章之渥臣敢不益推朴學深戒素餐責食功於後圖酬恩何有佩移忠之先訓畢命以之辭免扈從轉官表褒典超踰敢傾危悃寵辭敦勉尚嗇俞音中謝伏念臣猥以薄材誤蒙殊用屬羽書之紛奏扈革輅以親征協贊宸謀既乏徙薪之䇿肅清邊警又無橫草之功躐進崇階坐叨異賞雖聖恩之過厚在愚分以難安忝冒何名人言必至控陳未力天聽莫回再犯雷霆之威更殫螻蟻之懇伏望皇帝陛下推仁從欲體道觀能念帷幄之近聯已為榮耀收絲綸之成命庶免顚隮儻私願之獲伸亦公器之增重謝扈從轉官表靈旗電掃克成卻敵之功清蹕天旋爰舉酬勞之典固辭弗獲冒受奚堪中謝竊以逆臣逋誅久寬鈇鉞黠虜借助復動干戈邊遽初聞宸謨已決乘六師之共憤屈萬乘以親征貔貅鼓行蛇豕奔北既獻俘而奏凱冝告廟而䇿勳臣於其間一無所補猥緣近列濫進崇階此蓋伏遇皇帝陛下比迹堯仁同符湯勇威加敵國更收不殺之恩禮厚臣鄰寧畀無名之賞儻因徽數用勸羣工而臣巽懦弗強迂踈何取修車攻復古之政雖許與聞從奉天定難之臣則為忝竊尚圖微效庶答鴻私謝賜御書車攻詩表使鑣馳騖俯傳天語之溫宸翰鶱騰上應奎文之爛光生篋笥榮動搢紳中謝伏念臣猥以凡才叨蒙異奬每奉萬幾之暇數窺一札之工至若採石鼓之遺篇灑銀鉤之妙迹因辭見意更踰宵雅之肄三與世作程彌識帝書之第一敢圖珍賜遽及孤生此蓋伏遇皇帝陛下盛德日新多能天縱將芟夷於大難以紹開於中興憫周室之詩亡四夷未靖笑宋武之字大八法不傳故於遊戲筆墨之間不忘恢復境土之事憐臣衰鈍賁此寵休臣謹當襲藏私門傳寶來裔泛洪源而俟舟楫逺符遇主之榮因田獵而選車徒庶禆復古之政謝賜生日禮物表臺饋俯朌特示朝彞之渥詔函荐至誕昭帝眷之優恩重命輕感深涕溢中謝伏念臣家世寒甚資材蔑然叨被誤知濫塵近列雖有憂時之志欲罄愚衷曽無經國之謀可禆聖略居慚尸素已胸退間適及劬勞之辰敢拜便蕃之賜載陳懇款上瀆睿明更紆雲漢之章終施雨露之澤餘生何幸首路為榮此蓋伏遇皇帝陛下禮厚養賢仁深及物憐臣久陪帷幄嘗參預於股肱念臣將遠軒墀遂曲全於體貌肆於是日因寵其私臣敢不仰認至懷堅持素守大恩難報固已愧於初心微軀可捐更當期於晚節謝除職名宫觀表引分投間肺肝屢罄蒙恩賜可體貌益加厚餼廩於珍祠峻班聯於祕殿拊躬僥幸去國徊徨中謝伏念臣受生么微振迹踈外親逢堯舜之明主願為稷卨之良臣寖被異知遽聞大政任遇極矣報效蔑然懷方隅多故之憂未能徇國起丘園獨往之願何忍潔身而臣性本憃愚論多迂濶不足陪廟堂之末議何以綴帷幄之近聯俯仰而思進退以懼恭惟仁聖保全之賜每在孤危顚沛之時用恃殊私冒陳誠懇顧豢安之何敢寧螫毒之是虞祗荷天慈曲從人欲雖到家百里實異柴桑之折腰然受粟三鍾殆似支離之攘臂感淪骨髓愧溢靣顔此蓋伏遇皇帝陛下禮厚使臣仁深恕物察臣愚衷斷斷第盡事君之小心憐臣過計拳拳詎咈濟時之大略故全終始之眷以為出處之榮臣敢不追數昨非堅持晚節鳬鴈來去甫遂江湖之遊狗馬死生曷舍蓋帷之戀車駕巡幸平江府起居表靈旗討罪前薄淮濆清蹕撫師進臨吳會天聲震疊士氣奮張中謝竊以強狄怙衆而慿陵叛臣乘時而僭竊禍亂之酷星籥殆踰於十周戡定之難宸算靡忘於一日蓄威以俟慮勝而行枕戈而復晉讎人懷此志折箠而興漢祚天與其時乃卜盛秋之期大恢前歲之舉師出以律后來其蘇恭惟皇帝陛下勇智正於萬邦孝悌光于四海痛兩宫之未返戀極晨昏憫百姓之無辜憂深宵旰茲慰雲霓之望不憚霜露之勞將致中興亟修大養邦圖再造克臻九廟之安國步一清自格三靈之祐臣頃以弱質叨備近聯輒自去秋屢陳大計謂用兵當四靣而出恐審敵在一年之間疏牘具存冕旒開納雖眷遇之私備至而尸素之愧彌深引分乞身銜恩去國訪散人之遺迹已甘終老於丘樊望屬車之後塵猶記首陪於羈靮第存丹赤早見升平轉官許回授與兄謝表陟岡之念仰徹於聰明出綍之言俯加於眷奬乃回公渥以遂私情中謝伏念臣一遠天墀十移月籥齒衰攖疾分冝屏於丘園器溢挻災誠恐填於溝壑空守不移之志長懷未報之恩曽謂微勞遽叨殊寵顧事為之彌稱控避懇而莫諧爰念急難冒陳迫切雨露之澤既霑被於同根雲漢之章復表揚於異數兄弟感泣父老歎咨夫何差池有此僥幸茲蓋伏遇皇帝陛下堯舜孝悌文武憂勤賞以懋功圖日新於庶治化惟美俗用風勸於多方是致願私果蒙褒允臣敢不體認德意佩服訓詞白首相依喜益敦手足之愛丹心猶在誓將期頂踵之捐辭免除同知樞密院事表寵命驟加方懷震惕愚誠冒貢未賜矜從敢忘犯上之誅更罄由衷之懇中謝伏念臣頃以弱質叨汚近聮驚歲序之荐更寖妨賢路悼事功之蔑著上負聖知所冝養疾於丘園遂請辭榮於廊廟仰繄全度俯佚殘骸豈圖仄席之求未忍遺簪之棄召趨宣室之對擢奉露門之遊一望清光再蒙殊用念進讀清間之職猶懼濫居顧本兵樞要之司詎容虛受上既關於國體下必致於人言伏望皇帝陛下曲軫天慈特回淵聽察臣空踈已試之技固自無庸憐臣尫殘既老之身豈能有補追還成命別選異才儻忘反汗之嫌必免曠官之悔謝賜生日禮物表衰遲無補復玷於近司眷渥有加更叨於蕃錫適丁變故尚軫慈憐中謝伏念臣初乏事功久尸榮祿孝養弗洎劬勞之感何窮恩紀未酬疲曳之軀已老甫及門弧之旦重慙臺餉之儀兩居其官三拜此賜茲蓋伏遇皇帝陛下推誠接下隆禮使臣圖任而責成功寵賚以將厚意致身如此報國云何佩先訓之義方罔敢失墜慕前修之忠節盍至糜捐謝除同知樞密院事表進陪帝學方趨召節之嚴參秉國樞俄被制綸之渥牢辭弗獲冒處徒慙中謝伏念臣頃以譾能誤膺殊眷擢置群賢之右與聞庶政之幾過計拳拳每欲謹後車之戒空言落落豈能濟前箸之籌更拘俎豆之聞終昧甲兵之間技乃止此才則使然恐孤負於明時思退休於晚歲敢意寵私之未憖亟從間外而見收遽傳趣行便朝賜對授以本兵之任贊夫經武之圖然臣已試何功既老焉用血誠甚瀆汗號莫回雖駑馬十駕之勤非敢後也而鉛刀一割之利其可再乎傴僂拜恩趑趄就列此蓋伏遇皇帝陛下堯仁天大湯德日新延攬英雄務兼收於羣䇿恢復境土期盡雪於大讎遂致衰遲亦叨圖任臣敢不益勵誠節旁咨智謀依日月之光固難施於爝火感風雲之會將少效於秋毫辭免除知樞密院事表寵命頻仍已駭聞於朝著愚衷激切遂冒瀆於宸聰載錫溫言尚稽俞旨中謝伏念臣寅緣拙直被遇聖神識本昧於經綸言多涉於迂濶比自召歸帷幄擢贊樞機執羈靮以從雖與近臣而在列習金革之事則非平日之所長深懼充員馴致曠職敢謂眷私之渥驟升等級之崇併閲三遷甫更兩月蓋大恩稠疊矜遺簪之復收而小器滿盈思覆餗之當戒縱欲勵捐軀之節詎能忘誤國之憂承命驚惶撫心戰掉是敢控陳草芥之賤懇干犯斧鉞之嚴誅伏望皇帝陛下聖度曲全皇明下燭察臣愚陋之質未有報償憐臣衰病之身弗克負荷亟收誤奬博選真賢儻獲就於舊班庶免貽於大戾謝知樞密院事表庀官右府靡容坐席之溫出綍中宸遽躐朝班之峻寵光沓至感涕交流中謝伏念臣性質滯頑器能淺薄徒緣異奬更踐要塗直道難行閲風波之屢變大恩未報悼蒲栁之先衰顧忝冒之非冝獲屏藏之為幸比膺召節復贊事樞病骨支離愈不勝於䇿勵聖謀宏逺將焉副於詢求蚤夜以思進退惟谷豈謂歷時未幾身命已加初無尺寸可紀之勞越在二三同列之右聞者甚愕心其獨憂既控避之弗諧祗驚慙而罔措此蓋伏遇皇帝陛下堯舜孝弟禹湯憂勤至性過人方盡宅憂之制沈幾先物不忘復古之圖如臣孱愚亦在推擇臣敢不恪思其職勉稱所蒙事君盡忠之心造次於是為國復讎之計死生以之庶效涓塵少酬天地沈忠敏公龜溪集卷第六終
